# Romeo and Juliet Quest Routine
# Quest Requirements: None (F2P)
# Items Needed: None (Cadava berries obtained during quest)
# Starting Location: Varrock Square (Romeo)
# Quest Points: 5

name: "Romeo and Juliet"
type: quest
difficulty: novice
quest_points: 5

# Locations used
locations:
  varrock_square:
    x: 3211
    y: 3422
    plane: 0
    description: "Varrock Square - Romeo location"

  juliet_house_ground:
    x: 3159
    y: 3426
    plane: 0
    description: "Juliet's house (west Varrock) - ground floor"

  juliet_house_upstairs:
    x: 3158
    y: 3425
    plane: 1
    description: "Juliet's house - upstairs bedroom"

  varrock_church:
    x: 3254
    y: 3477
    plane: 0
    description: "Varrock Church - Father Lawrence"

  apothecary:
    x: 3197
    y: 3404
    plane: 0
    description: "Apothecary shop in southwest Varrock"
    validated: true  # Confirmed 2026-01-27

  cadava_bush:
    x: 3277
    y: 3374
    plane: 0
    description: "Cadava bushes southeast of Varrock (SAFE: east of Dark Wizards)"
    validated: true  # Confirmed 2026-01-27

# Step-by-step routine
steps:
  # ========== PHASE 1: START QUEST ==========
  - id: 1
    phase: "start_quest"
    action: GOTO
    args: "3211 3422 0"
    description: "Walk to Varrock Square"
    location: varrock_square
    await_condition: "location:3211,3422"
    timeout_ms: 120000

  - id: 2
    phase: "start_quest"
    action: INTERACT_NPC
    args: "Romeo Talk-to"
    description: "Talk to Romeo to start quest"
    await_condition: "dialogue"
    timeout_ms: 15000
    notes: "await dialogue (2026-07-19) so the drain below doesn't check-first
      on a not-yet-open dialogue and no-op."

  - id: 3
    phase: "start_quest"
    action: CLICK_CONTINUE
    description: "Exhaust Romeo's opener monologue (blind fixed-count)"
    repeat: 8
    delay_before_ms: 800
    notes: "H-9 FIX (2026-07-19): was a single unconditional CLICK_CONTINUE,
      which cannot drain Romeo's multi-page opener -- an unexhausted monologue
      silently blocks the next GOTO/interact (ROUTINE_SCHEMA.md (i)). Uses a
      BLIND fixed-count repeat, NOT repeat_until:no_dialogue -- per the
      live-validated tutorial_island/05_cooking_to_quest_guide.yaml LANE-2
      correction (2026-07-19), a monologue transiently reports dialogue
      open=false BETWEEN pages (DEFECT-24), so a check-first no_dialogue loop
      exits after one press. Extra CLICK_CONTINUE presses after the dialogue
      closes are inert (ClickContinueCommand no-ops when no continue button is
      visible). Romeo asks you to deliver a message to Juliet."

  # ========== PHASE 2: TALK TO JULIET ==========
  - id: 4
    phase: "juliet"
    action: GOTO
    args: "3159 3426 0"
    description: "Walk to Juliet's house in west Varrock"
    location: juliet_house_ground
    await_condition: "location:3159,3426"
    timeout_ms: 120000

  - id: 5
    phase: "juliet"
    action: INTERACT_OBJECT
    args: "Staircase Climb-up"
    description: "Climb stairs to Juliet's room"
    await_condition: "plane:1"

  - id: 6
    phase: "juliet"
    action: GOTO
    args: "3158 3425 1"
    description: "Walk to Juliet"
    location: juliet_house_upstairs
    await_condition: "location:3158,3425"
    timeout_ms: 30000
    notes: "await added 2026-07-19 (H-9): the GOTO had no await, so the talk-to
      below could fire mid-walk."

  - id: 7
    phase: "juliet"
    action: INTERACT_NPC
    args: "Juliet Talk-to"
    description: "Talk to Juliet"
    await_condition: "dialogue"
    timeout_ms: 15000

  - id: 8
    phase: "juliet"
    action: CLICK_CONTINUE
    description: "Exhaust Juliet's dialogue (blind fixed-count)"
    repeat: 8
    delay_before_ms: 800
    notes: "H-9 FIX (2026-07-19): blind fixed-count drain (was single
      CLICK_CONTINUE); see step 3's note for why not repeat_until:no_dialogue.
      Juliet tells you about Father Lawrence."

  - id: 9
    phase: "juliet"
    action: INTERACT_OBJECT
    args: "Staircase Climb-down"
    description: "Go back downstairs"
    await_condition: "plane:0"

  # ========== PHASE 3: TALK TO FATHER LAWRENCE ==========
  - id: 10
    phase: "father_lawrence"
    action: GOTO
    args: "3254 3477 0"
    description: "Walk to Varrock Church"
    location: varrock_church
    await_condition: "location:3254,3477"
    timeout_ms: 120000

  - id: 11
    phase: "father_lawrence"
    action: INTERACT_NPC
    args: "Father_Lawrence Talk-to"
    description: "Talk to Father Lawrence"
    await_condition: "dialogue"
    timeout_ms: 15000
    notes: "NPC name uses underscore. await dialogue added 2026-07-19 (H-9)."

  - id: 12
    phase: "father_lawrence"
    action: CLICK_CONTINUE
    description: "Exhaust Father Lawrence's dialogue (blind fixed-count)"
    repeat: 8
    delay_before_ms: 800
    notes: "H-9 FIX (2026-07-19): blind fixed-count drain (was single
      CLICK_CONTINUE); see step 3's note for why not repeat_until:no_dialogue.
      He tells you about the Apothecary and cadava berries."

  # ========== PHASE 4: GET CADAVA BERRIES ==========
  # DANGER: Dark Wizards at stone circle (~3224, 3370) - level 7, aggressive!
  # ROUTE: South through Varrock south gate, then east along south wall
  # The south gate is at ~(3217, 3375) - must exit city before heading east
  - id: 13a
    phase: "cadava_berries"
    action: GOTO
    args: "3217 3375 0"
    description: "Go through Varrock south gate"
    notes: "Must exit city through south gate before heading east to cadava bushes"
    validated: true  # Confirmed 2026-02-09
    await_condition: "location:3217,3375"
    timeout_ms: 120000

  - id: 13b
    phase: "cadava_berries"
    action: GOTO
    args: "3235 3375 0"
    description: "Head east outside south wall"
    validated: true  # Confirmed 2026-02-09
    await_condition: "location:3235,3375"
    timeout_ms: 60000

  - id: 13c
    phase: "cadava_berries"
    action: GOTO
    args: "3255 3372 0"
    description: "Continue east toward cadava bushes"
    validated: true  # Confirmed 2026-02-09
    await_condition: "location:3255,3372"
    timeout_ms: 60000

  - id: 13
    phase: "cadava_berries"
    action: GOTO
    args: "3268 3371 0"
    description: "Walk to cadava bushes (SE of Varrock)"
    location: cadava_bush
    notes: "Cadava bush at (3268, 3370). Stay east of x=3240 to avoid Dark Wizard aggro."
    validated: true  # Confirmed 2026-02-09
    await_condition: "location:3268,3371"
    timeout_ms: 60000

  - id: 14
    phase: "cadava_berries"
    action: INTERACT_OBJECT
    args: "Cadava_bush Pick-from"
    description: "Pick cadava berries from bush"
    await_condition: "has_item:Cadava berries"
    notes: "Object name is 'Cadava_bush' with underscore. One berry per bush."
    validated: true  # Confirmed 2026-02-09

  # ========== PHASE 5: GET POTION FROM APOTHECARY ==========
  # DANGER: Return route must retrace east path! NEVER go directly west!
  # Dark Wizards at (~3224, 3370) will kill low-level accounts instantly
  - id: 15a
    phase: "apothecary"
    action: GOTO
    args: "3255 3372 0"
    description: "Head west along safe route (south of wall)"
    notes: "Retrace the safe path - stay south of Varrock wall"
    await_condition: "location:3255,3372"
    timeout_ms: 60000

  - id: 15b
    phase: "apothecary"
    action: GOTO
    args: "3235 3375 0"
    description: "Continue west toward south gate"
    await_condition: "location:3235,3375"
    timeout_ms: 60000

  - id: 15c
    phase: "apothecary"
    action: GOTO
    args: "3217 3375 0"
    description: "Back through Varrock south gate"
    validated: true  # Confirmed 2026-02-09
    await_condition: "location:3217,3375"
    timeout_ms: 60000

  - id: 15d
    phase: "apothecary"
    action: GOTO
    args: "3210 3395 0"
    description: "Head north inside city toward Apothecary"
    await_condition: "location:3210,3395"
    timeout_ms: 60000

  - id: 15
    phase: "apothecary"
    action: GOTO
    args: "3197 3404 0"
    description: "Walk to Apothecary in southwest Varrock"
    location: apothecary
    validated: true  # Confirmed 2026-01-27
    await_condition: "location:3197,3404"
    timeout_ms: 60000

  - id: 16
    phase: "apothecary"
    action: INTERACT_NPC
    args: "Apothecary Talk-to"
    description: "Talk to Apothecary"

  - id: 17
    phase: "apothecary"
    action: CLICK_DIALOGUE
    args: "Talk about something else"
    description: "Select dialogue option to access quest dialogue"
    notes: "Must navigate to this option - regular shop dialogue doesn't work"
    validated: true  # Confirmed 2026-01-27

  - id: 18
    phase: "apothecary"
    action: CLICK_DIALOGUE
    args: "Talk about Romeo & Juliet"
    description: "Ask about the quest potion"
    validated: true  # Confirmed 2026-01-27

  - id: 19
    phase: "apothecary"
    action: CLICK_CONTINUE
    description: "Continue dialogue until the Cadava potion is received"
    repeat_until: "has_item:Cadava potion"
    repeat_until_timeout_ms: 3000
    max_iterations: 15
    notes: "H-8 FIX (2026-07-19): was a single CLICK_CONTINUE + a passive
      await_condition:has_item:Cadava potion, which could never advance the
      multi-page exchange on its own and would hang to timeout. Now CLICKs
      repeatedly until the potion appears (Grammar 1 has_item in repeat_until).
      Game auto-detects berries in inventory."
    validated: true  # Confirmed 2026-01-27

  # ========== PHASE 6: GIVE POTION TO JULIET ==========
  - id: 20
    phase: "juliet_potion"
    action: GOTO
    args: "3159 3426 0"
    description: "Return to Juliet's house"
    location: juliet_house_ground
    await_condition: "location:3159,3426"
    timeout_ms: 120000

  - id: 21
    phase: "juliet_potion"
    action: INTERACT_OBJECT
    args: "Staircase Climb-up"
    description: "Climb stairs to Juliet's room"
    await_condition: "plane:1"

  - id: 22
    phase: "juliet_potion"
    action: GOTO
    args: "3158 3425 1"
    description: "Walk to Juliet"
    location: juliet_house_upstairs
    await_condition: "location:3158,3425"
    timeout_ms: 30000
    notes: "await added 2026-07-19 (H-9): GOTO had no await, so the talk-to
      below could fire mid-walk."

  - id: 23
    phase: "juliet_potion"
    action: INTERACT_NPC
    args: "Juliet Talk-to"
    description: "Talk to Juliet with potion"

  - id: 24
    phase: "juliet_potion"
    action: CLICK_CONTINUE
    description: "Continue through the cutscene until the potion is consumed"
    repeat_until: "no_item:Cadava potion"
    repeat_until_timeout_ms: 4000
    max_iterations: 20
    notes: "H-8 FIX (2026-07-19): was a single CLICK_CONTINUE + passive
      await_condition:no_item:Cadava potion (60s), which could not drain the
      long cutscene and hung to timeout. Now CLICKs repeatedly until the potion
      leaves the inventory (up to ~80s across 20 iterations). Long cutscene --
      Juliet drinks potion, family mourns."

  # ========== PHASE 7: COMPLETE QUEST WITH ROMEO ==========
  - id: 25
    phase: "complete_quest"
    action: TELEPORT_HOME
    description: "Teleport to Lumbridge (cutscene may trap you)"
    notes: "Indoor navigation can fail, teleport is reliable"

  - id: 26a
    phase: "complete_quest"
    action: GOTO
    args: "3235 3300 0"
    description: "Walk north from Lumbridge toward Varrock"
    await_condition: "location:3235,3300"
    timeout_ms: 120000

  - id: 26b
    phase: "complete_quest"
    action: GOTO
    args: "3254 3350 0"
    description: "Continue north, stay EAST of Dark Wizards"
    notes: "Dark Wizards at (3210-3235, 3360-3385) - stay east!"
    await_condition: "location:3254,3350"
    timeout_ms: 120000

  - id: 26
    phase: "complete_quest"
    action: GOTO
    args: "3260 3400 0"
    description: "Waypoint north past Dark Wizards"
    notes: "AVOID (3200, 3350) - that's Dark Wizard territory!"
    await_condition: "location:3260,3400"
    timeout_ms: 120000

  - id: 27
    phase: "complete_quest"
    action: GOTO
    args: "3211 3422 0"
    description: "Walk to Varrock Square"
    location: varrock_square
    await_condition: "location:3211,3422"
    timeout_ms: 120000

  - id: 28
    phase: "complete_quest"
    action: INTERACT_NPC
    args: "Romeo Talk-to"
    description: "Talk to Romeo"
    await_condition: "dialogue"
    timeout_ms: 15000

  - id: 29
    phase: "complete_quest"
    action: CLICK_CONTINUE
    description: "Exhaust the final cutscene dialogue (blind fixed-count)"
    repeat: 15
    delay_before_ms: 900
    notes: "M-7 FIX (2026-07-19): blind fixed-count drain (was single
      CLICK_CONTINUE + a 60s timeout that did nothing to advance the scene);
      higher count for the longer end cutscene. See step 3's note for why not
      repeat_until:no_dialogue. Crypt scene - Romeo meets Phillipa instead!"

# Rewards
rewards:
  - quest_points: 5

# Notes for automation
automation_notes:
  - "DANGER ZONE: Dark Wizards at stone circle (3210-3235, 3360-3385) - level 7, aggressive!"
  - "Safe routes: Stay EAST (x>3240) or NORTH (y>3390) when traveling near SE Varrock"
  - "NPC names use underscores: Father_Lawrence"
  - "Object names use underscores for multi-word: Cadava_bush -> use 'Cadava bush'"
  - "Dialogue navigation: Use space key to continue, click_text for options"
  - "Indoor navigation: Scan environment first, open doors manually"
  - "Cutscenes teleport player - use TELEPORT_HOME to recover if stuck"
  - "Quest has two cutscenes: Juliet drinking potion, Romeo in crypt"

# Execution log (filled during runtime)
execution_log: []
