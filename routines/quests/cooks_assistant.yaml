# Cook's Assistant Quest Routine
# Quest Requirements: None
# Items Needed: Bucket of milk, Pot of flour, Egg (all obtainable during quest)
# Starting Location: Lumbridge Castle Kitchen

name: "Cook's Assistant"
type: quest
difficulty: novice
quest_points: 1

# Quest item requirements
items_needed:
  - bucket_of_milk
  - pot_of_flour
  - egg

# Locations used
locations:
  lumbridge_kitchen:
    x: 3208
    y: 3216
    plane: 0
    description: "Lumbridge Castle kitchen, Cook location"

  lumbridge_bank:
    x: 3208
    y: 3220
    plane: 2
    description: "Lumbridge Castle bank (top floor)"

  cow_pen:
    x: 3253
    y: 3270
    plane: 0
    description: "Cow pen east of Lumbridge (for milk)"

  chicken_coop:
    x: 3180
    y: 3288
    plane: 0
    description: "Chicken coop north of Lumbridge (for egg)"

  windmill:
    x: 3166
    y: 3306
    plane: 0
    description: "Lumbridge windmill (for flour)"

  wheat_field:
    x: 3162
    y: 3293
    plane: 0
    description: "Wheat field south of windmill"

# Step-by-step routine
steps:
  # ========== PHASE 0: TRAVEL TO START ==========
  - id: 0
    phase: "preparation"
    action: GOTO
    args: "3208 3220 2"
    description: "Walk to Lumbridge Castle bank (top floor) before opening it - starting position unknown/unverified"
    location: lumbridge_bank
    await_condition: "location:3208,3220"
    timeout_ms: 120000
    notes: "Cross-checked against woodcutting_lumbridge.yaml and cooking_lumbridge.yaml, both of which use this exact 3208,3220,plane2 coordinate as their validated Lumbridge bank GOTO target."

  # ========== PHASE 1: PREPARATION ==========
  - id: 1
    phase: "preparation"
    action: BANK_OPEN
    description: "Bank items to make inventory space"
    location: lumbridge_bank
    notes: "Need empty inventory for quest items"

  - id: 2
    phase: "preparation"
    action: BANK_DEPOSIT_ALL
    description: "Deposit all items"
    expected_result: "Empty inventory"

  - id: 3
    phase: "preparation"
    action: BANK_WITHDRAW
    args: "Bucket 1"
    description: "Withdraw bucket for milk"
    notes: "If no bucket, buy from general store or find spawn"

  - id: 4
    phase: "preparation"
    action: BANK_WITHDRAW
    args: "Pot 1"
    description: "Withdraw pot for flour"
    notes: "If no pot, spawn in Lumbridge kitchen"

  - id: 5
    phase: "preparation"
    action: BANK_CLOSE
    description: "Close bank interface"

  # ========== PHASE 2: START QUEST ==========
  - id: 6
    phase: "start_quest"
    action: GOTO
    args: "3208 3216 0"
    description: "Walk to Lumbridge kitchen"
    location: lumbridge_kitchen
    await_condition: "location:3208,3216"
    timeout_ms: 120000

  - id: 7
    phase: "start_quest"
    action: INTERACT_NPC
    args: "Cook Talk-to"
    description: "Talk to Cook to start quest"
    await_condition: "dialogue"
    timeout_ms: 15000
    notes: "await dialogue added 2026-07-19 (M-7) so the drains below start on an
      open conversation."

  # M-7 FIX (2026-07-19): the three CLICK_DIALOGUE option picks below (8/8b/8c)
  # previously ran back-to-back with NO interleaved continue drains -- if any
  # intermediate narrative page renders, the next option's text is not present
  # and CLICK_DIALOGUE silently no-ops, stalling the quest-accept (everything
  # downstream then runs pointlessly). Each option pick is now preceded by a
  # short BLIND CLICK_CONTINUE drain that clears any narrative page so the option
  # list is showing; continues are inert if the options are already up
  # (ClickContinueCommand no-ops when no continue button is visible). Blind
  # fixed-count, not repeat_until:no_dialogue (DEFECT-24 mid-monologue
  # false-close -- see restless_ghost.yaml step 15 / 05_cooking LANE-2).
  - id: 7b
    phase: "start_quest"
    action: CLICK_CONTINUE
    repeat: 3
    delay_before_ms: 700
    description: "Drain any Cook opener page before the first option"

  - id: 8
    phase: "start_quest"
    action: CLICK_DIALOGUE
    args: "What's wrong?"
    description: "Ask the Cook what's wrong"
    expected_result: "Cook explains the problem"

  - id: 8a
    phase: "start_quest"
    action: CLICK_CONTINUE
    repeat: 3
    delay_before_ms: 700
    description: "Drain the Cook's explanation before the next option"

  - id: 8b
    phase: "start_quest"
    action: CLICK_DIALOGUE
    args: "I'm always happy to help a cook in distress."
    description: "Agree to help the Cook"
    expected_result: "Quest progresses"

  - id: 8b2
    phase: "start_quest"
    action: CLICK_CONTINUE
    repeat: 3
    delay_before_ms: 700
    description: "Drain any narrative page before the accept option"

  - id: 8c
    phase: "start_quest"
    action: CLICK_DIALOGUE
    args: "Actually, I know where to find this stuff."
    description: "Accept the quest"
    expected_result: "Quest started"

  - id: 8d
    phase: "start_quest"
    action: CLICK_CONTINUE
    repeat: 3
    delay_before_ms: 700
    description: "Drain the post-accept dialogue"

  # ========== PHASE 3: GET EGG ==========
  - id: 9
    phase: "get_egg"
    action: GOTO
    args: "3180 3288 0"
    description: "Walk to chicken coop north of Lumbridge"
    location: chicken_coop
    await_condition: "location:3180,3288"
    timeout_ms: 120000

  - id: 10
    phase: "get_egg"
    action: PICK_UP_ITEM
    args: "Egg"
    description: "Pick up egg from ground"
    await_condition: "has_item:Egg"
    timeout_ms: 15000
    expected_result: "Egg in inventory"
    notes: "Egg spawns inside chicken coop fence. await added 2026-07-19 (M-7)
      to verify pickup before travelling on."

  # ========== PHASE 4: GET MILK ==========
  - id: 11
    phase: "get_milk"
    action: GOTO
    args: "3253 3270 0"
    description: "Walk to cow pen east of Lumbridge"
    location: cow_pen
    await_condition: "location:3253,3270"
    timeout_ms: 120000

  - id: 12
    phase: "get_milk"
    action: USE_ITEM_ON_NPC
    args: "Bucket Dairy cow"
    description: "Use bucket on dairy cow to get milk"
    await_condition: "has_item:Bucket of milk"
    timeout_ms: 15000
    expected_result: "Bucket of milk in inventory"
    notes: "Dairy cow has 'Milk' option, not regular cows. await added
      2026-07-19 (M-7) to verify the milk before travelling on."

  # ========== PHASE 5: GET FLOUR ==========
  - id: 13
    phase: "get_flour"
    action: GOTO
    args: "3162 3293 0"
    description: "Walk to wheat field south of windmill"
    location: wheat_field
    await_condition: "location:3162,3293"
    timeout_ms: 120000

  - id: 14
    phase: "get_flour"
    action: INTERACT_OBJECT
    args: "Wheat Pick"
    description: "Pick wheat from field"
    await_condition: "has_item:Grain"
    timeout_ms: 15000
    expected_result: "Grain in inventory"
    notes: "await added 2026-07-19 (M-7) to verify the grain before entering the windmill."

  - id: 15
    phase: "get_flour"
    action: GOTO
    args: "3166 3306 0"
    description: "Walk to windmill"
    location: windmill
    await_condition: "location:3166,3306"
    timeout_ms: 60000

  - id: 16
    phase: "get_flour"
    action: INTERACT_OBJECT
    args: "Large door Open"
    description: "Enter windmill"

  - id: 17
    phase: "get_flour"
    action: CLIMB_LADDER_UP
    description: "Climb to top floor of windmill"
    repeat: 2
    notes: "Need to climb 2 ladders to reach hopper"

  - id: 18
    phase: "get_flour"
    action: USE_ITEM_ON_OBJECT
    args: "Grain Hopper"
    description: "Put grain in hopper"
    await_condition: "no_item:Grain"
    timeout_ms: 15000
    notes: "await added 2026-07-19 (M-7): grain is consumed into the hopper;
      verify it left the inventory before operating the controls."

  - id: 19
    phase: "get_flour"
    action: INTERACT_OBJECT
    args: "Hopper controls Operate"
    description: "Operate hopper to grind grain"

  - id: 20
    phase: "get_flour"
    action: CLIMB_LADDER_DOWN
    description: "Climb back to ground floor"
    repeat: 2

  - id: 21
    phase: "get_flour"
    action: USE_ITEM_ON_OBJECT
    args: "Pot Flour bin"
    description: "Use pot on flour bin to collect flour"
    await_condition: "has_item:Pot of flour"
    timeout_ms: 15000
    expected_result: "Pot of flour in inventory"
    notes: "await added 2026-07-19 (M-7) to verify the flour before returning to the Cook."

  # ========== PHASE 6: COMPLETE QUEST ==========
  - id: 22
    phase: "complete_quest"
    action: GOTO
    args: "3208 3216 0"
    description: "Return to Lumbridge kitchen"
    location: lumbridge_kitchen
    await_condition: "location:3208,3216"
    timeout_ms: 120000

  - id: 23
    phase: "complete_quest"
    action: INTERACT_NPC
    args: "Cook Talk-to"
    description: "Talk to Cook with all items"
    await_condition: "dialogue"
    timeout_ms: 15000

  - id: 24
    phase: "complete_quest"
    action: CLICK_CONTINUE
    repeat: 6
    delay_before_ms: 800
    description: "Drain the completion dialogue (blind fixed-count)"
    notes: "M-7 FIX (2026-07-19): added a completion drain -- the turn-in step
      had no dialogue exhaustion at all. Blind fixed-count (extra presses inert)."
    expected_result: "Quest complete!"

# Rewards
rewards:
  - quest_points: 1
  - cooking_xp: 300
  - access_to_cook_range: true
  - sardine: 1

# Execution log (filled during runtime)
execution_log: []
