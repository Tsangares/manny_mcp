# Cow Killer Combat Training
# Created using MCP workflow tools

name: "Cow Killer Combat Training"
type: combat
skill: combat
target_level: 30

# Equipment needed
equipment_needed:
  - weapon: "Bronze sword or better"
  - armor: "Any combat armor (optional)"

# Locations
locations:
  lumbridge_cow_pen:
    x: 3253
    y: 3266
    plane: 0
    description: "Cow pen east of Lumbridge Castle"

  lumbridge_bank:
    x: 3208
    y: 3220
    plane: 2
    description: "Lumbridge Castle bank"

# Training routine
steps:
  # ========== PHASE 1: EQUIPMENT CHECK ==========
  - id: 1
    phase: "preparation"
    action: GOTO
    args: "3208 3220 2"
    description: "Go to bank"
    location: lumbridge_bank
    await_condition: "location:3208,3220"
    timeout_ms: 120000

  - id: 2
    phase: "preparation"
    action: BANK_OPEN
    description: "Open bank"

  - id: 3
    phase: "preparation"
    action: EQUIP_BEST_MELEE
    description: "Equip best available melee gear from bank"
    notes: "Automatically finds and equips best weapons/armor"

  - id: 4
    phase: "preparation"
    action: BANK_DEPOSIT_ALL
    description: "Deposit everything except equipment"
    expected_result: "Empty inventory with gear equipped"

  - id: 5
    phase: "preparation"
    action: BANK_CLOSE
    description: "Close bank"

  # ========== PHASE 2: COMBAT TRAINING ==========
  - id: 6
    phase: "combat"
    action: GOTO
    args: "3253 3266 0"
    description: "Walk to cow pen"
    location: lumbridge_cow_pen
    await_condition: "location:3253,3266"
    timeout_ms: 120000

  - id: 7
    phase: "combat"
    action: KILL_LOOP
    args: "Cow none 100"
    description: "Kill 100 cows for combat XP"
    timeout_ms: 3600000
    notes: "Automatically attacks, waits for kill, finds next target, repeats.
      timeout_ms explicit (fixed 2026-07-18, see chicken_killer_training.yaml
      for the full explanation): KILL_LOOP blocks synchronously until
      max_kills, so the 30s default would make run_routine.py give up and
      exit long before 100 kills finish. This is the LAST step of the linear
      pass (required for a KILL_LOOP* step -- ROUTINE_SCHEMA.md (e.1)); the
      flat loop below re-runs the batch."
    expected_result: "Combat XP gained, 100 cows defeated"

# ========== REMOVED 2026-07-19 (H-7): KILL_COW_GET_HIDES step ==========
# The old step 8 ran `KILL_COW_GET_HIDES` with timeout_ms:3600000, but that
# command has NO kill-count arg (KillCowGetHidesCommand.java runs until manually
# stopped). After exactly 1h, run_routine.py gave up and reported the step
# failed -- while the plugin kept killing cows UNSUPERVISED indefinitely. Unlike
# KILL_LOOP/KILL_LOOP_CONFIG it is NOT covered by the DEFECT-26 active_loop
# polling fix, so the watchdog/run-ledger protection died with the runner. It
# also made step 7's KILL_LOOP non-terminal (validator warning). Removed per the
# triage report's short-term recommendation; a max-kills arg for
# KILL_COW_GET_HIDES is a plugin-side follow-up. For cowhide money-making with a
# real kill cap + banking, use routines/money_making/cowhide_banking.yaml (uses
# KILL_LOOP_CONFIG, which IS active_loop-managed).

# Flat loop: after a 100-kill batch, re-run from step 6 (walk to pen + KILL_LOOP)
# so training continues across batches. Bounded by `--loops N` on the CLI (the
# only real pass cap -- ROUTINE_SCHEMA.md (d)/(f)); skips the one-time
# bank/equip steps 1-5. No Grammar-2 stop atom fits "combat level" (combat is
# not a single trainable skill -- ROUTINE_SCHEMA.md (c) has only <skill>_level),
# so pass count is the intended bound here.
loop:
  enabled: true
  repeat_from_step: 6

# Combat settings
combat_settings:
  combat_style: "Aggressive"  # For attack XP
  food: "Optional - cows are low level"
  prayer: "Not needed"
  restore_health_at: 50

# Notes
notes: |
  Pure combat training via KILL_LOOP (no looting; fastest XP/hour, no
  inventory management). Runs 100-kill batches, repeating from step 6 until
  `--loops N` is exhausted.

  For combat + cowhide money-making (the old "mode 2", removed 2026-07-19 per
  H-7 because KILL_COW_GET_HIDES is uncapped/unmanaged), use
  routines/money_making/cowhide_banking.yaml instead -- it uses
  KILL_LOOP_CONFIG with a real kill cap, loot config, and banking.

  Created with MCP tools:
  - list_available_commands(category="combat")
  - Found specialized KILL_COW commands
  - validate_routine_deep() confirmed all commands exist
