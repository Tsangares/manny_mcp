# Hill Giants Travel Routine
# Navigate from GE to Hill Giants dungeon
# VALIDATED: 2026-01-18

name: "Hill Giants Travel"
description: "Travel from GE to Hill Giants via brass key shortcut"
type: navigation

# NOTE: osrspathfinder.com API was returning 500 errors on 2026-01-18
# Manual navigation may be required if pathfinder is down

locations:
  ge_bank:
    x: 3164
    y: 3487
    plane: 0

  brass_key_hut_outside:
    x: 3115
    y: 3449
    plane: 0
    note: "Stand here before opening door"

  brass_key_door:
    x: 3115
    y: 3450
    plane: 0
    object_id: 1804
    type: WallObject

  ladder_down:
    x: 3116
    y: 3452
    plane: 0
    object_id: 17384

  hill_giants_dungeon:
    x: 3116
    y: 9851
    plane: 0

steps:
  - id: 1
    action: GOTO
    args: "3115 3449 0"
    description: "Walk to brass key hut (may need manual help if pathfinder down)"
    await_condition: "location:3115,3449"
    timeout_ms: 60000

  - id: 2
    action: INTERACT_OBJECT
    args: "door Open"
    description: "Open brass key door"
    delay_after_ms: 2000

  - id: 3
    action: INTERACT_OBJECT
    args: "ladder Climb-down"
    description: "Climb down to dungeon"
    delay_after_ms: 3000

  - id: 4
    action: KILL_LOOP
    args: "Hill_Giant Swordfish 500"
    description: "Start killing Hill Giants"
    timeout_ms: 14400000
    notes: "Food fixed 2026-07-18: the previous `Hill_Giant 500` parsed '500'
      as the food name (KillLoopCommand.java:95-97 -- 2nd positional arg is
      FOOD, not kill count), so food management silently never worked and the
      HP safety-stop floor was the unmanaged 50% branch instead of the
      food-managed 30% floor. Hill Giants hit hard enough that food is
      clearly intended, not `none`; this file itself has no banking step, but
      the sibling routines that feed into it (routines/combat/
      hill_giants_resupply.yaml, routines/combat/hill_giants_restock.yaml)
      both withdraw Swordfish specifically for this trip, and
      hill_giants_restock.yaml's own notes say to follow up with
      `KILL_LOOP Hill_Giant Swordfish 500` -- so Swordfish is used here to
      match the established inventory this routine assumes on entry.
      timeout_ms explicit (fixed 2026-07-18, see chicken_killer_training.yaml
      for the full explanation): KILL_LOOP blocks synchronously until
      max_kills, so the 30s default would make run_routine.py give up and
      exit long before 500 kills finish. 4hr ceiling given the larger kill
      count; returns as soon as the plugin actually responds."

# ISSUES DISCOVERED:
# - Pathfinder API (osrspathfinder.com) can return 500 errors
# - Local A* fallback has poor map coverage for GE area
# - May need manual intervention for GOTO from GE
