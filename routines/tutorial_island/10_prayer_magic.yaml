# Tutorial Island - Part 10: Account Guide, Prayer & Magic (final section)
# STATUS: PARTIALLY VALIDATED -- BLOCKED at the Brother Brace prayer section
# (steps 12/15). The Account Guide section and the chapel approach are
# transcribed/validated, but a live blocker found 2026-07-19 stops an
# end-to-end run: Brother Brace (id 3319) PACES a 2-3 tile radius and ~10
# INTERACT_NPC/CLICK_NPC attempts from every adjacent tile all returned "I
# can't reach that!" (resolve->click latency lands on his vacated tile). The
# prayer section past step 12 -- and therefore the Magic section and mainland
# exit downstream of it -- is NOT re-validated on this jar. See the "OPEN
# BLOCKER" note above step 8 (~:153) for detail; a pacing-NPC-aware retry that
# re-resolves the live tile per attempt is needed before this runs unattended.
# (The earlier Driver #4 "CHAPEL/PRAYER SECTION PASSED" / Driver #5 "ISLAND
# COMPLETE" notes predate the 2026-07-19 blocker and no longer hold end-to-end.)
#
# This routine handles the final sections:
# 1. Account Guide section (account management explanation)
# 2. Brother Brace section (prayer explanation, chapel)
# 3. Magic Instructor section (Wind Strike on chicken)
# 4. Mainland dialogue + Ironman decline + Home Teleport -> Lumbridge
#
# CRITICAL FIX -- DEFECT-13 (journal Driver #5, defects log:283-292):
# **TeleportHomeCommand and CastSpellCommand both target widget 14286855 for
# "Home Teleport" -- that widget is actually the MINIGAME Teleport icon.**
# `CAST_SPELL Home_Teleport` and `TELEPORT_HOME` BOTH FAIL on this jar. The
# CONFIRMED correct widget (via live SCAN_WIDGETS Teleport) is **14286854**
# ("Lumbridge Home Teleport", canvas 554,305 40x40). Step 33 below uses
# `CLICK_WIDGET 14286854` directly -- do NOT use CAST_SPELL/TELEPORT_HOME for
# the mainland exit until the plugin-side id is fixed.
#
# Engine predicates used below (dialogue/no_dialogue/location/plane) are all
# implemented in mcptools/tools/monitoring.py -- see 04_woodcutting_firemaking.yaml
# for the reference repeat_until pattern this file mirrors throughout.

name: "Tutorial Island - Account Guide, Prayer & Magic"
type: tutorial
phase: 10

# Key NPCs
npcs:
  account_guide:
    name: "Account Guide"
    id: 3310
    location: {x: 3126, y: 3124, plane: 0}
  brother_brace:
    name: "Brother Brace"
    id: 3319
    location: {x: 3126, y: 3107, plane: 0}
  magic_instructor:
    name: "Magic Instructor"
    id: 3309
    location: {x: 3141, y: 3088, plane: 0}  # CONFIRMED, Driver #5 (defects log:269 "resumed at (3141,3088)")

# Key Locations
locations:
  account_guide_room: {x: 3125, y: 3124, plane: 0}
  chapel_outdoor_waypoint: {x: 3128, y: 3110, plane: 0}  # CONFIRMED, Driver #4 (defects log:254 "GOTO 3128 3110 crossed 13 tiles of outdoor path fine")
  chapel: {x: 3125, y: 3107, plane: 0}
  chapel_exit_door: {x: 3122, y: 3102, plane: 0}  # From prior-session note: "leads west, need to go through it to reach Magic area"
  magic_area: {x: 3141, y: 3088, plane: 0}
  lumbridge_spawn: {x: 3221, y: 3218, plane: 0}  # CONFIRMED, Driver #5 (defects log:263 "Player is on the mainland: Lumbridge (3221, 3218, plane 0)")

# Key Widgets
widgets:
  account_management_tab: 35913777  # Action: "Account Management"
  prayer_tab: 35913797              # Action: "Prayer"
  magic_tab: 35913798               # Action: "Magic" - opened during tutorial
  wind_strike_spell: 14286859       # CORRECTED live 2026-07-19 (newbakshesh, shadow-nav jar):
                                    # Wind Strike is widget 14286859 (group 218 child 3, text
                                    # "<col=00ff00>Wind Strike</col>", hasListener), NOT 14286856.
                                    # SpellWidgetHelper.getSpellWidgetId("Wind Strike") returns the
                                    # stale 14286856, so CAST_SPELL_NPC Wind_Strike FAILS ("Spell
                                    # widget 14286856 not found") -- see step 25 for the manual cast.
  lumbridge_home_teleport: 14286854 # CONFIRMED CORRECT (Driver #5 + re-confirmed live 2026-07-19:
                                    # SCAN_WIDGETS -> group 218 child 3 "Lumbridge Home Teleport").
                                    # Canvas 554,305 40x40. Only castable at the FINAL step (see step 32).
  # DO NOT USE 14286855 -- that is "Minigame Teleport", not Home Teleport (DEFECT-13).
  # Dialogue-option parent (group 219): 14352385. Options are DYNAMIC children -- select via
  # CLICK_CHILD_WIDGET <14352385> <child#>, NOT CLICK_DIALOGUE (which clicks by raw bounds and
  # lands in the 3D viewport = "Walk here", closing the menu). Live-found 2026-07-19.

steps:
  # ===================== Phase 1: Account Guide =====================
  - id: 1
    description: "Walk to door in front of Account Guide room"
    action: GOTO
    args: "3124 3124 0"
    delay_before_ms: 500
    await_condition: "location:3124,3124"
    timeout_ms: 60000
    notes: "Must walk to door position before clicking"

  - id: 2
    description: "Open door to Account Guide room"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 1000
    notes: "Door at (3125, 3124) -- CONFIRMED, Driver #4"

  - id: 3
    description: "Talk to Account Guide"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"

  - id: 4
    description: "Advance Account Guide dialogue"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Multiple space presses through intro"

  - id: 5
    description: "Open Account Management tab"
    action: CLICK_WIDGET
    args: "35913777"
    delay_before_ms: 1000
    notes: |
      Driver #4 used a raw canvas coordinate click (~597,477) as a workaround
      this run because account_management is not in TabOpenCommand's list --
      but coordinate clicks are explicitly disallowed for Tutorial Island
      (widget_reference.yaml: "Coordinate-based clicking causes server
      disconnections"). Kept as the pre-existing validated widget ID
      (35913777) instead; not contradicted by this run.

  - id: 6
    description: "Talk to Account Guide again"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"

  - id: 7
    description: "Complete Account Guide dialogue"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Many space presses through explanation"

  # ===================== Phase 2: Exit to Chapel =====================
  # CHOKEPOINT — RECIPE VALIDATED LIVE 2026-07-19 (Track live-lane, DEFECT-23 jar).
  # History (Track E phase-1b, 2026-07-18): from the south account-guide antechamber
  # (player parked ~3123-3124,3111-3113) NAV-DIRECT oscillates and reports
  # "[NAV-DIRECT] Stuck at (x,y), N tiles from target" for EVERY direct target
  # (chapel 3126,3107; outdoor 3128,3110). Root cause found live 2026-07-19: the
  # antechamber is a walled box whose ONLY forward exit is a CLOSED interior Door
  # at (3125,3124). The prior oscillation was the follower failing against that
  # closed door + the DEFECT-7 short-hop no-op, NOT a general maze.
  #
  # VALIDATED WALK-THROUGH RECIPE (each GOTO uses DEFECT-23 `exact` mode, which
  # landed ON-tile every time — hop 0/1: e.g. "[NAV-EXACT] On target tile
  # (3129,3124,0) after 0 hop(s)"):
  #   a. GOTO 3124 3124 0 exact           # settle onto the tile W of the interior door
  #   b. INTERACT_OBJECT Door Open        # opens Door (3125,3124); player steps through,
  #                                       #   door auto-closes behind (TI quirk)
  #   c. GOTO 3129 3124 0 exact           # east-door approach — clean arrival
  #   d. INTERACT_OBJECT Door Open        # opens east exit Door (3130,3124) -> OUTSIDE
  #   e. GOTO 3128 3110 0 exact           # outdoor waypoint (validated on-tile)
  #   f. GOTO 3130 3107 0 exact           # chapel EAST approach (validated)
  # This clears the documented chapel-exit blocker end-to-end (player reaches the
  # chapel interior, adjacent to Brother Brace).
  #
  # ⚠️ OPEN BLOCKER (NEW, found live 2026-07-19, downstream of the above):
  # Brother Brace (id 3319, ~3125,3106) PACES a 2-3 tile wander radius. Every
  # INTERACT_NPC/CLICK_NPC from an orthogonally-adjacent tile (tried W 3124,3106;
  # E 3126,3106; diag 3126,3105/3126,3107) returns the game message "I can't reach
  # that!" — the resolve→mouse-move→click latency (remote/diort IPC) lands on his
  # vacated tile. ~10 attempts across INTERACT_NPC + CLICK_NPC all failed. The
  # prayer section past step 12 is NOT re-validated on this jar; needs a
  # pacing-NPC-aware interact (retry that re-resolves the NPC's live tile per
  # attempt) before it can run unattended.
  - id: 8
    description: "Walk to east door"
    action: GOTO
    args: "3129 3124 0"
    delay_before_ms: 500
    await_condition: "location:3129,3124"
    timeout_ms: 60000

  - id: 9
    description: "Open door to outside"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 1000
    notes: "Door at (3130, 3124) -- Driver #4 confirmed exiting here"

  - id: 10
    description: "Walk toward chapel (confirmed outdoor waypoint)"
    action: GOTO
    args: "3128 3110 0"
    await_condition: "location:3128,3110"
    timeout_ms: 60000
    delay_before_ms: 500
    notes: "CONFIRMED, Driver #4: crossed 13 tiles of outdoor path fine (GOTO reported 'failed' at 1-off -- DEFECT-10, treat as advisory and verify via location await)"

  - id: 11
    description: "Walk to chapel"
    action: GOTO
    args: "3130 3107 0"
    delay_before_ms: 500
    await_condition: "location:3130,3107"
    timeout_ms: 60000

  # ===================== Phase 3: Brother Brace (Prayer) =====================
  - id: 12
    description: "Talk to Brother Brace"
    action: INTERACT_NPC
    args: "Brother_Brace Talk-to"
    await_condition: "dialogue"

  - id: 13
    description: "Advance Brother Brace intro dialogue"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  - id: 14
    description: "Open Prayer tab"
    action: CLICK_WIDGET
    args: "35913797"
    delay_before_ms: 1000
    notes: "TAB_OPEN does not cover this on Tutorial Island (defects log:256-257) -- direct widget click used instead"

  - id: 15
    description: "Talk to Brother Brace again"
    action: INTERACT_NPC
    args: "Brother_Brace Talk-to"
    await_condition: "dialogue"

  - id: 16
    description: "Complete Brother Brace dialogue (friends-list steps auto-credit during continues)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  # ===================== Phase 4: Exit to Magic Area =====================
  - id: 17
    description: "Walk to chapel exit door"
    action: GOTO
    args: "3122 3102 0"
    delay_before_ms: 500
    await_condition: "location:3122,3102"
    timeout_ms: 60000
    notes: "Door leads west toward the Magic area"

  - id: 18
    description: "Exit chapel through door"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 1000

  - id: 19
    description: "Walk to Magic Instructor area"
    action: GOTO
    args: "3141 3088 0"
    await_condition: "location:3141,3088"
    timeout_ms: 60000
    delay_before_ms: 500
    notes: "CONFIRMED, Driver #5: Magic Instructor found here after a mid-run crash/relaunch"

  # ===================== Phase 5: Magic Instructor (Wind Strike) =====================
  - id: 20
    description: "Talk to Magic Instructor"
    action: INTERACT_NPC
    args: "Magic_Instructor Talk-to"
    await_condition: "dialogue"

  - id: 21
    description: "Advance Magic Instructor intro dialogue (receive Air/Mind runes)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Receive Air rune x4 and Mind rune x4"

  - id: 22
    description: "Open Magic tab"
    action: CLICK_WIDGET
    args: "35913798"
    delay_before_ms: 1000
    notes: "Tutorial prompts to open magic tab"

  - id: 23
    description: "Talk to Magic Instructor again"
    action: INTERACT_NPC
    args: "Magic_Instructor Talk-to"
    await_condition: "dialogue"

  - id: 24
    description: "Advance dialogue (instructor explains Wind Strike)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  - id: 25a
    description: "Approach the chicken pen (CAST_SPELL_NPC needs proximity/LOS)"
    action: GOTO
    args: "3138 3091 0"
    await_condition: "location:3138,3091"
    timeout_ms: 60000
    delay_before_ms: 500
    notes: "Chickens pen ~3138-3141,3092-3096. Confirmed live 2026-07-19."

  - id: 25b
    description: "Select Wind Strike spell (CORRECTED widget 14286859)"
    action: CLICK_WIDGET
    args: "14286859"
    delay_before_ms: 800
    notes: |
      CAST_SPELL_NPC Wind_Strike is BROKEN on this jar: SpellWidgetHelper maps
      "Wind Strike" -> 14286856 (stale), and the command aborts with "Spell
      widget 14286856 not found". Select the spell directly via 14286859 (the
      live-verified Wind Strike widget) instead. Magic tab must be open (step 22).

  - id: 25c
    description: "Cast the selected spell on a chicken"
    action: CLICK_NPC
    args: "Chicken"
    delay_before_ms: 800
    notes: |
      With Wind Strike on the cursor, CLICK_NPC Chicken clicks the NPC bounds =
      "Cast Wind Strike -> Chicken" (verified live: log shows Option:"Cast"
      Target:"Wind Strike -> Chicken"). INTERACT_NPC Chicken "Cast" does NOT work
      -- findNPCByNameAndAction scans the NPC's STATIC composition actions, and
      the dynamic "Cast" entry (spell-on-cursor) isn't among them. One successful
      cast fires the "Learning the Ropes" completion scroll. Re-run 25b+25c up to
      ~3x if the first click misses (chicken paces).

  # ===================== Phase 6: Final dialogue, Ironman decline, mainland exit =====================
  # FULLY RE-VALIDATED LIVE 2026-07-19 (newbakshesh, shadow-nav jar). Two hard-won corrections
  # vs Driver #5's notes:
  #   (A) OPTION SELECTION: CLICK_DIALOGUE "Yes"/"No" DOES NOT WORK here. It clicks by raw widget
  #       bounds, which map into the 3D viewport ("Walk here") -> the option menu closes, the player
  #       walks, and the instructor loops back to "Do you want to go to the mainland?". Use
  #       CLICK_CHILD_WIDGET on the group-219 option parent 14352385 instead (dynamic children).
  #   (B) HOME TELEPORT TIMING: 14286854 is blocked ("You cannot teleport from Tutorial Island just
  #       yet!") until the FULL dialogue chain finishes and the game shows "use your Home Teleport
  #       spell. This will take you to the mainland" (Home Teleport icon flashes). Only then does it fire.
  #   Also: the "Learning the Ropes" completion SCROLL (after the wind-strike cast) and several
  #   panes are NOT reported in the state file's dialogue block -- drive them blind with KEY_PRESS
  #   space / KEY_PRESS escape and verify by screenshot, not by `no_dialogue`.
  # Confirmed exit sequence: talk -> "all finished" (continue) -> mainland menu (child 1 = Yes)
  #   -> "Were you planning to become an Ironman?" (continue) -> ironman menu (child 3 = decline)
  #   -> info continues -> "use your Home Teleport spell" -> CLICK_WIDGET 14286854 -> arrive (3221,3218).

  - id: 26
    description: "Talk to Magic Instructor (after Wind Strike cast)"
    action: INTERACT_NPC
    args: "Magic_Instructor Talk-to"
    await_condition: "dialogue"
    notes: "If a 'Learning the Ropes' completion scroll is still up, KEY_PRESS escape first (it is a modal, not reported in state)."

  - id: 27
    description: "Advance the instructor intro ('Well, you're all finished here now...')"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Stops when the mainland Yes/No menu appears (state reports it as player_chat/empty -- DEFECT-6)."

  - id: 28
    description: "Answer 'Do you want to go to the mainland?' -- Yes (dynamic child 1)"
    action: CLICK_CHILD_WIDGET
    args: "14352385 1"
    delay_before_ms: 1000
    notes: |
      Group-219 option parent 14352385; child 1 = 'Yes.', child 2 = 'No.'
      CLICK_DIALOGUE "Yes" FAILS (clicks through to the world -> menu re-loops).
      Verify by re-scanning group 219: after this fires, options change to the
      3-entry Ironman menu.

  - id: 29
    description: "Advance to the Ironman menu ('Were you planning to become an Ironman?')"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  - id: 30
    description: "Decline Ironman -- 'No, I'm not planning to do that.' (dynamic child 3)"
    action: CLICK_CHILD_WIDGET
    args: "14352385 3"
    delay_before_ms: 1000
    notes: |
      Ironman menu children: 1='What's an Ironman?', 2='Yes, I do want to become
      an Ironman.', 3="No, I'm not planning to do that.". Child 3 declines.
      Player line then reads "No, I'm not planning to do that." Confirmed live.

  - id: 30b
    description: "Exhaust info continues until 'use your Home Teleport spell' instruction"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: |
      Several pages ("When you get to the mainland...", "look for this icon...
      Lumbridge Guide"). The state file reports dialogue closed BETWEEN pages,
      so a no_dialogue loop may exit early -- if the overlay still says "speak to
      the Magic Instructor", press space a few more times. Done when the overlay
      reads "When you're ready, use your Home Teleport spell" and the Home
      Teleport icon flashes.

  - id: 31
    description: "Re-open Magic tab before Home Teleport (tab may have closed)"
    action: CLICK_WIDGET
    args: "35913798"
    delay_before_ms: 1000

  - id: 32
    description: "Cast Lumbridge Home Teleport (DEFECT-13 fix: widget click, NOT CAST_SPELL/TELEPORT_HOME)"
    action: CLICK_WIDGET
    args: "14286854"
    await_condition: "location:3221,3218"
    timeout_ms: 30000
    delay_before_ms: 500
    notes: |
      DO NOT use `CAST_SPELL Home_Teleport` or `TELEPORT_HOME` here -- both
      target the wrong widget (14286855, "Minigame Teleport") on this jar
      (DEFECT-13, defects log:285-292). 14286854 is the CONFIRMED correct
      "Lumbridge Home Teleport" widget (re-confirmed live 2026-07-19).
      Cast animation observed ~16-18s live (arrival at 3221,3218 after ~18s),
      so timeout raised to 30s. ONLY fires after step 30b's "use your Home
      Teleport spell" instruction -- earlier it returns "You cannot teleport
      from Tutorial Island just yet!".

# PITFALLS DISCOVERED:
# 1. Door navigation: walk to a tile directly in front of the door, then INTERACT_OBJECT Door Open
# 2. Account Management tab widget ID: 35913777 (not in TAB_OPEN's supported list)
# 3. Prayer tab widget ID: 35913797 (also not in TAB_OPEN's supported list)
# 4. Magic tab widget ID: 35913798
# 5. Dialogue advancement: KEY_PRESS space + repeat_until: no_dialogue (self-terminating)
# 6. Wind Strike CAST (CORRECTED 2026-07-19): CAST_SPELL_NPC is BROKEN (SpellWidgetHelper maps
#    "Wind Strike" -> stale 14286856 -> "Spell widget not found"). Manual: CLICK_WIDGET 14286859
#    (select) then CLICK_NPC Chicken (cast). INTERACT_NPC Chicken "Cast" fails (static-action scan).
# 7. Dialogue OPTIONS (CORRECTED 2026-07-19): use CLICK_CHILD_WIDGET 14352385 <child#>, NOT
#    CLICK_DIALOGUE (bounds-click lands in the 3D viewport = walk-away, menu re-loops):
#    - mainland "Do you want to go to the mainland?": child 1 = Yes
#    - ironman "Were you planning to become an Ironman?": child 3 = "No, I'm not planning to do that."
# 8. KEY_PRESS space is the universal dialogue-advance fallback (defects log:337-338) --
#    CLICK_CONTINUE fails on some plain-message/level-up-style panes (DEFECT-8), space does not.
# 9. DEFECT-13 (CRITICAL): Home Teleport must be CLICK_WIDGET 14286854, never
#    CAST_SPELL/TELEPORT_HOME (both hardcode the wrong widget 14286855).
# 10. Chapel exit door at (3122, 3102) leads west toward the Magic area.

# WORKING PATTERNS:
# - Account Management / Prayer / Magic tabs: CLICK_WIDGET <id> (not in TAB_OPEN's list)
# - Dialogue advancement: KEY_PRESS space + repeat_until: no_dialogue
# - Door interaction: GOTO to door position, then INTERACT_OBJECT Door Open
# - Dialogue options: on THIS jar's mainland/ironman panes, CLICK_DIALOGUE bounds-
#   clicks land in the 3D viewport (walk-away); use CLICK_CHILD_WIDGET per the
#   fix at steps ~:321-324 (M-15 corrected 2026-07-19 -- the old "works even when
#   options[] is empty" claim contradicted that fix and invited a regression).
# - Spell casting on NPC: CAST_SPELL_NPC Wind_Strike is BROKEN on this jar's
#   Magic-Instructor chicken (pitfall #6, steps 25a-25c) -- use manual
#   CLICK_WIDGET 14286859 + CLICK_NPC instead (M-15 corrected 2026-07-19; the old
#   CAST_SPELL_NPC recommendation contradicted that pitfall).
# - Home Teleport (mainland exit): CLICK_WIDGET 14286854 -- NOT CAST_SPELL Home_Teleport

# FINAL DESTINATION:
# - Lumbridge (3221, 3218, plane 0) -- CONFIRMED, Driver #5, "ISLAND COMPLETE"
# - Nearby NPCs on arrival: Adventurer Jon, Lumbridge Guide, Ironman tutor
