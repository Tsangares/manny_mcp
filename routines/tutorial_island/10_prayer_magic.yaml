# Tutorial Island - Part 10: Account Guide, Prayer & Magic (final section)
# STATUS: Account Guide + Account Management tab + east-door exit FIXED and
# honest-gated 2026-07-20 (attempt #8, incident below, commit 63fa2b5). The
# Brother Brace (Prayer)/Magic Instructor/mainland-exit phases were left
# "still-open" by 63fa2b5's own note (see journals/2026-07-20_tutorial_
# attempt8_judeaislam_llama.md, "Open items" #3) -- THAT NOTE IS NOW CLOSED
# by this pass. Everything after the east-door exit (WAIT >=550) now carries
# honest varp WAIT gates (570/610/620/650/670/671/680/1000) mirroring the
# Account Guide phase's own pattern, plus two live-validated mechanism fixes:
#
#   D6 (Wind Strike false-march): attempt #8 run 20260720T023314Z found this
#   section had ZERO varp gates past the east door. When the Wind Strike cast
#   missed, the routine had no way to know and marched straight through the
#   rest of the dialogue chain to Home Teleport, which rejected it
#   ("You cannot teleport from Tutorial Island just yet!") because varp was
#   still stuck at 650. The manual recovery receipt (CLICK_WIDGET 14286859
#   then CLICK_NPC Chicken, first try, 650->670) is the SAME mechanism this
#   file already encoded (steps 31b/31c, corrected live 2026-07-19) -- so the
#   fix here is not a new cast mechanism, it's the missing verification: a
#   soft WAIT>=670 (on_failure: continue) after the first cast attempt that
#   falls through to the existing 31d/31e retry cast, followed by a strict
#   WAIT>=670 (on_failure: abort) after the retry -- retry-then-abort, so a
#   genuine miss halts the chain instead of racing to Home Teleport uncredited.
#
#   D7 (mainland/ironman menu CLICK_CHILD_WIDGET regression): run
#   20260720T023314Z found `CLICK_CHILD_WIDGET 14352385 <child#>` reports
#   success but does not register on this jar (screenshot-confirmed the menu
#   never changed); number-key selection also no-oped. The screenshot-guided
#   workaround that DID work was a raw CLICK_AT on the option text: (263,400)
#   for the mainland "Yes." option, (263,441) for the ironman-decline "No,
#   I'm not planning to do that." option. Encoded below in place of
#   CLICK_CHILD_WIDGET, with a resolution-dependent-coordinates warning (see
#   each step's notes) -- a Java-side fix for the widget click path is
#   ticketed separately; revisit and prefer CLICK_CHILD_WIDGET again once
#   that lands.
#
# Both defects and every varp receipt cited above are from
# journals/2026-07-20_tutorial_attempt8_judeaislam_llama.md, run
# 20260720T023314Z (commit ffb3ad2 for the journal itself).
#
# The Brother Brace pacing-NPC blocker (below) remains open and out of scope
# for this pass, same as before.
#
# INCIDENT (attempt #8, runs 20260720T021142Z + 20260720T023314Z, supervisor
# ground truth): the old step 5 did `CLICK_WIDGET 35913777` (Account
# Management tab) as a hardcoded widget id. That id DOES NOT EXIST on the
# current jar -- the click was a SILENT NO-OP (CLICK_WIDGET reports "sent"
# regardless), varp 281 stalled at 530, and the section's later east-door
# clicks were tutorial-blocked by an invisible queued modal ("You need to
# talk to the Account Guide before you are allowed to proceed through this
# door.") that never surfaces in the dialogue export.
#
# THE FIX -- what actually worked, hand-driven live with receipts:
#   talk to Account Guide (varp 530->531)
#   -> click the FLASHING Account Management tab: log-confirmed working
#      mechanism was a canvas click at (597,477) whose menu OPTION read
#      verbatim "Account Management" (varp 531->532)
#   -> final talk round, 16 dialogue pages drained (532->540)
#   -> east door open + immediate plain through-walk (540->550, player
#      lands outside at ~3134,3124)
# Encoded below as: `mcp_tool: click_widget` with `args: {action: "Account
# Management"}` (step "Open Account Management tab", Phase 2) instead of a
# hardcoded id -- see that step's notes for why this is the chosen mechanism
# over a guessed new id or a raw coordinate click. Every stage transition
# above now has an honest `WAIT tutorial_progress:>=N` gate (Grammar 1,
# ROUTINE_SCHEMA.md (c)) instead of an assumption, so a wrong/failed action
# aborts the chain (strict_steps) instead of silently marching a desynced
# game into Brother Brace/Magic/mainland.
#
# Also discovered live (context only, NOT fixed in this YAML -- a Java-side
# defect being ticketed separately): an "I can't reach that!" modal renders
# in chatbox widget group 162, is invisible to the dialogue export, and
# makes subsequent clicks register as Cancel. If a future run wedges with no
# visible cause, suspect this.
#
# This routine handles the final sections:
# 1. Account Guide section (account management explanation)
# 2. Brother Brace section (prayer explanation, chapel)
# 3. Magic Instructor section (Wind Strike on chicken)
# 4. Mainland dialogue + Ironman decline + Home Teleport -> Lumbridge
#
# CRITICAL FIX -- DEFECT-13 (journal Driver #5, defects log:283-292):
# **TeleportHomeCommand and CastSpellCommand both target widget 14286855 for
# "Home Teleport" -- that widget is actually the MINIGAME Teleport icon.**
# `CAST_SPELL Home_Teleport` and `TELEPORT_HOME` BOTH FAIL on this jar. The
# CONFIRMED correct widget (via live SCAN_WIDGETS Teleport) is **14286854**
# ("Lumbridge Home Teleport", canvas 554,305 40x40). The mainland-exit step
# below uses `CLICK_WIDGET 14286854` directly -- do NOT use CAST_SPELL/
# TELEPORT_HOME for the mainland exit until the plugin-side id is fixed.
#
# Engine predicates used below (dialogue/no_dialogue/location/plane/
# tutorial_progress) are all implemented in mcptools/tools/monitoring.py --
# see 08_combat.yaml / 09_banking_to_account_guide.yaml for the reference
# WAIT-gate pattern this file now mirrors throughout.

name: "Tutorial Island - Account Guide, Prayer & Magic"
type: tutorial
phase: 10

# Key NPCs
npcs:
  account_guide:
    name: "Account Guide"
    id: 3310
    location: {x: 3126, y: 3124, plane: 0}
  brother_brace:
    name: "Brother Brace"
    id: 3319
    location: {x: 3126, y: 3107, plane: 0}
  magic_instructor:
    name: "Magic Instructor"
    id: 3309
    location: {x: 3141, y: 3088, plane: 0}  # CONFIRMED, Driver #5 (defects log:269 "resumed at (3141,3088)")

# Key Locations
locations:
  account_guide_room: {x: 3125, y: 3124, plane: 0}
  account_guide_door: {x: 3125, y: 3124, plane: 0}          # west/interior door, antechamber -> Account Guide room
  east_door: {x: 3130, y: 3124, plane: 0}                    # east door, Account Guide room -> outside
  east_door_outside: {x: 3134, y: 3124, plane: 0}            # LIVE RECEIPT (attempt #8, runs 20260720T021142Z/023314Z): through-walk landing tile after the east-door crossing, varp 540->550
  chapel_outdoor_waypoint: {x: 3128, y: 3110, plane: 0}  # CONFIRMED, Driver #4 (defects log:254 "GOTO 3128 3110 crossed 13 tiles of outdoor path fine")
  chapel: {x: 3125, y: 3107, plane: 0}
  chapel_exit_door: {x: 3122, y: 3102, plane: 0}  # From prior-session note: "leads west, need to go through it to reach Magic area"
  magic_area: {x: 3141, y: 3088, plane: 0}
  lumbridge_spawn: {x: 3221, y: 3218, plane: 0}  # CONFIRMED, Driver #5 (defects log:263 "Player is on the mainland: Lumbridge (3221, 3218, plane 0)")

# Key Widgets
widgets:
  # account_management_tab: NO LONGER A HARDCODED ID -- widget 35913777 does
  # NOT EXIST on the current jar (attempt #8 incident, see header). The tab
  # click below uses `mcp_tool: click_widget` with `args: {action: "Account
  # Management"}` (live-scanned, group 160 minimap tab icons) instead. Do
  # NOT reintroduce a hardcoded id here without a fresh live receipt.
  prayer_tab: 35913797              # Action: "Prayer"
  magic_tab: 35913798               # Action: "Magic" - opened during tutorial
  wind_strike_spell: 14286859       # CORRECTED live 2026-07-19 (newbakshesh, shadow-nav jar):
                                    # Wind Strike is widget 14286859 (group 218 child 3, text
                                    # "<col=00ff00>Wind Strike</col>", hasListener), NOT 14286856.
                                    # SpellWidgetHelper.getSpellWidgetId("Wind Strike") returns the
                                    # stale 14286856, so CAST_SPELL_NPC Wind_Strike FAILS ("Spell
                                    # widget 14286856 not found") -- see the Magic phase for the manual cast.
  lumbridge_home_teleport: 14286854 # CONFIRMED CORRECT (Driver #5 + re-confirmed live 2026-07-19:
                                    # SCAN_WIDGETS -> group 218 child 3 "Lumbridge Home Teleport").
                                    # Canvas 554,305 40x40. Only castable at the FINAL step (see mainland-exit phase).
  # DO NOT USE 14286855 -- that is "Minigame Teleport", not Home Teleport (DEFECT-13).
  # Dialogue-option parent (group 219): 14352385. Options are DYNAMIC children -- select via
  # CLICK_CHILD_WIDGET <14352385> <child#>, NOT CLICK_DIALOGUE (which clicks by raw bounds and
  # lands in the 3D viewport = "Walk here", closing the menu). Live-found 2026-07-19.


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  # ===================== Phase 1: Account Guide (talk #1) =====================
  # Defensive re-open: 09_banking_to_account_guide.yaml already crosses this
  # SAME door and lands the player at (3126,3124), but Tutorial Island doors
  # auto-close ~5-7s after Open (DOOR-CROSSING v2, MANNY_OVERSEER.md) -- a
  # section restart or any gap before this file's own first step can find it
  # closed again. Doors are IDENTICAL objects with others documented nearby
  # (09b pitfall #1), so the exact seat + location-await is what pins the
  # next Open to THIS door, not a decoy.
  - id: 1
    description: "Seat at the Account Guide door threshold (exact-mode seat, defensive re-open)"
    action: GOTO
    args: "3124 3124 0 exact"
    await_condition: "location:3124,3124"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: "Mirrors 09_banking_to_account_guide.yaml step 1 -- same door (3125,3124)."

  - id: 2
    description: "Open door to Account Guide room (defensive -- door may have auto-closed)"
    action: INTERACT_OBJECT
    args: "Door Open 3125 3124"
    delay_before_ms: 1000
    notes: |
      Door at (3125, 3124) -- CONFIRMED, Driver #4. DOOR-CROSSING v2: no
      delay_after padding -- minimize the gap before the through-walk (next
      step) so the crossing lands during the still-open window.
      COORDINATE-QUALIFIED (attempt #12 fix, 2026-07-20, jar >= 421c03e9,
      manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier"):
      `3125 3124` is this file's own `account_guide_door` location (declared
      above, same door 09_banking_to_account_guide.yaml step 2 opens) --
      added as belt-and-suspenders on top of the step-1 exact seat after
      09_banking.yaml's sibling entry door was found to resolve to the wrong
      "Door" among 5 in range (journals/2026-07-20_tutorial_attempt12_
      malikreyes_llama.md).

  - id: 3
    description: "Through-walk PAST the threshold, 4 tiles east on the y=3124 row (plain GOTO, not onto the door tile)"
    action: GOTO
    args: "3128 3124 0"
    await_condition: "location:3128,3124"
    timeout_ms: 60000
    on_failure: "retry:2"
    notes: |
      DOOR-CROSSING v2: plain through-walk, never exact onto the door tile
      itself (exact's per-hop 'Walk here' refiner is BLOCKED once the door
      re-closes).

      RETARGETED (3126,3124)->(3128,3124) after attempt #16. The old 2-tile
      target sat inside plain GOTO's `distance <= 3` no-op radius
      (GotoCommand.java:152) and was believed MASKED by step 4's NPC interact
      pathing through the door. Attempt #16 FALSIFIED that: the GOTO
      false-passed with no movement, the Account_Guide Talk-to fired out of
      range with no dialogue, and the honest varp >=531 gate aborted (run
      receipt: journals/2026-07-20_tutorial_attempt16_malikreyes_llama.md).
      New target (3128,3124) is distance 4 from the seat (3124,3124) -- a real
      click is issued -- and is the same interior tile 9b's through-walk
      (fbde0cc) validated live in the same attempt: on the walkable y=3124 row,
      2 tiles east of the NPC (3126,3124), 2 short of the east door (3130).
      Step 4's Talk-to then paths 2 tiles back west to the NPC.

  - id: 4
    description: "Talk to Account Guide (first round)"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"
    on_failure: "retry:2"

  - id: 5
    description: "Advance Account Guide intro dialogue (until the Account Management tab starts flashing)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Short intro before the flashing tab appears -- not the 16-page explanation (that's the second talk, Phase 3)."

  - id: 6
    description: "VERIFY the first Account Guide talk registered -- varp advanced to 531"
    action: WAIT
    await_condition: "tutorial_progress:>=531"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt (attempt #8, runs 20260720T021142Z + 20260720T023314Z,
      supervisor ground truth): talking to Account Guide advances varp 281
      from 530 to 531. Honest abort if the talk didn't register (strict_steps
      stops the chain instead of marching a desynced game into the tab click).

  # ===================== Phase 2: Account Management tab (THE FIX) =====================
  - id: 7
    description: "Open Account Management tab"
    mcp_tool: click_widget
    args:
      action: "Account Management"
    on_failure: "retry:2"
    notes: |
      REPLACES the stale `CLICK_WIDGET 35913777` (attempt #8 incident, see
      file header): that hardcoded widget id does NOT EXIST on the current
      jar -- CLICK_WIDGET reports "sent" regardless (silent no-op), varp
      stalled at 530, and the east-door clicks downstream were
      tutorial-blocked by an invisible queued modal.

      CHOSEN MECHANISM, in the directive's own preference order:
        (a) a CURRENT valid hardcoded id with a live receipt -- NONE EXISTS;
            do not guess a replacement id.
        (b) a menu/action-based click primitive -- USED HERE. The live
            receipt's working click was a canvas click at (597,477) whose
            menu OPTION read verbatim "Account Management". `mcp_tool:
            click_widget` with `args: {action: "Account Management"}`
            (handle_click_widget, mcptools/tools/routine.py:602) is the
            canonical action-based click primitive: it runs `SCAN_WIDGETS
            "Account Management"` live (matches on each widget's `actions[]`
            array server-side, ScanWidgetsCommand.java addWidgetInfo
            matchesAction check -- group 160 "Minimap (tab icons on Tutorial
            Island)" is one of the default-scanned groups, exactly where a
            flashing tutorial tab icon lives), then does an atomic CLICK_AT
            at the LIVE-SCANNED widget's bounds center (or CLICK_WIDGET-by-id
            if bounds aren't canvas-safe, DEFECT-29 guard). This is NOT a
            raw/guessed coordinate click (which widget_reference.yaml bans
            for Tutorial Island -- "coordinate-based clicking causes server
            disconnections") -- it is the same fresh-scan-then-click path
            already proven for `mcp_tool: click_widget` with `text: "Worn
            Equipment"` in 08_combat.yaml step 5. Robust to widget-id drift
            because it never hardcodes an id.
        (c) a raw canvas coordinate click (597,477) as a last resort -- NOT
            NEEDED, (b) is available and doctrinally preferred.
      Citing run ids: attempt #8, runs 20260720T021142Z + 20260720T023314Z.

  - id: 8
    description: "VERIFY the Account Management tab click registered -- varp advanced to 532"
    action: WAIT
    await_condition: "tutorial_progress:>=532"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt: clicking the flashing Account Management tab advances
      varp 281 from 531 to 532. This is the gate that would have caught the
      old stale-id no-op immediately instead of stalling silently through
      the rest of the section.

  # ===================== Phase 3: Account Guide (talk #2, full explanation) =====================
  - id: 9
    description: "Talk to Account Guide again (full account-management explanation)"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"
    on_failure: "retry:2"

  - id: 10
    description: "Complete Account Guide dialogue -- blind Space drain"
    action: KEY_PRESS
    args: "space"
    repeat: 18
    delay_before_ms: 600
    notes: |
      Live receipt: 16 dialogue pages drained (varp 532->540). Was
      `repeat_until: no_dialogue` -- DEFECT-31/DEFECT-24 (see 08_combat.yaml
      step 3): repeat_until check-first no-ops on a modal/false-closed page,
      so it can under-drain a long explanation. Blind fixed-count instead,
      sized for the receipt's 16 pages plus margin (mirrors 08_combat.yaml's
      dagger-handover drain sizing). Extra presses after dialogue closes are
      inert on Tutorial Island.

  - id: 11
    description: "VERIFY the full Account Guide explanation credited -- varp advanced to 540"
    action: WAIT
    await_condition: "tutorial_progress:>=540"
    timeout_ms: 15000
    on_failure: "abort"
    notes: "Live receipt: the second talk + 16-page drain advances varp 281 from 532 to 540."

  # ===================== Phase 4: East door exit (door-crossing v2) =====================
  - id: 12
    description: "Seat at the east door threshold (exact-mode seat)"
    action: GOTO
    args: "3129 3124 0 exact"
    await_condition: "location:3129,3124"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: "East door at (3130,3124), leads outside. Exact seat pins the next Open to this door (doors are identical objects, 09b pitfall #1)."

  - id: 13
    description: "Open east door to outside"
    action: INTERACT_OBJECT
    args: "Door Open 3130 3124"
    delay_before_ms: 1000
    notes: |
      DOOR-CROSSING v2: no delay_after padding -- minimize the gap before
      the through-walk (next step) so the crossing lands during the
      still-open window.
      COORDINATE-QUALIFIED (attempt #12 fix, 2026-07-20, jar >= 421c03e9,
      manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier"):
      `3130 3124` is this file's own documented `east_door` location above
      -- added as belt-and-suspenders on top of the step-12 exact seat, same
      identical-objects doctrine that fixed 09_banking.yaml's entry door
      (journals/2026-07-20_tutorial_attempt12_malikreyes_llama.md).

  - id: 14
    description: "Through-walk PAST the threshold to outside (plain GOTO, not onto the door tile)"
    action: GOTO
    args: "3134 3124 0"
    await_condition: "location:3134,3124"
    timeout_ms: 60000
    on_failure: "retry:2"
    notes: |
      DOOR-CROSSING v2 rework (attempt #8 incident, see file header): the
      OLD version of this section walked to a pre-door waypoint (3128,3110)
      as its first post-door hop, which is 05b/09b's forbidden pattern of
      GOTO'ing at/near the door tile as the crossing step itself. Live
      receipt (runs 20260720T021142Z/023314Z): the working crossing is a
      PLAIN GOTO straight to (3134,3124), the confirmed outside landing
      tile, immediately after Open -- never exact onto the door tile (exact
      mode's per-hop "Walk here" refiner is BLOCKED once the door
      re-closes, spinning to a ~53s timeout).

  - id: 15
    description: "VERIFY the east-door crossing credited -- varp advanced to 550"
    action: WAIT
    await_condition: "tutorial_progress:>=550"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt: the east-door crossing advances varp 281 from 540 to
      550 (the Prayer/Brother Brace boundary -- see
      09_banking_to_account_guide.yaml header for the wiki stage name). This
      is the last receipt-covered stage; everything below (chapel approach,
      Brother Brace, Magic, mainland exit) is unchanged from the prior
      2026-07-19 pass and carries its own status notes.

  - id: 16
    description: "Walk toward chapel (confirmed outdoor waypoint)"
    action: GOTO
    args: "3128 3110 0"
    await_condition: "location:3128,3110"
    timeout_ms: 60000
    delay_before_ms: 500
    notes: "CONFIRMED, Driver #4: crossed 13 tiles of outdoor path fine (GOTO reported 'failed' at 1-off -- DEFECT-10, treat as advisory and verify via location await)"

  - id: 17
    description: "Walk to chapel"
    action: GOTO
    args: "3130 3107 0"
    delay_before_ms: 500
    await_condition: "location:3130,3107"
    timeout_ms: 60000

  # ===================== Phase 5: Brother Brace (Prayer) =====================
  # ⚠️ OPEN BLOCKER (found live 2026-07-19, STILL OPEN -- out of scope for
  # this pass): Brother Brace (id 3319, ~3125,3106) PACES a 2-3 tile wander
  # radius. Every INTERACT_NPC/CLICK_NPC from an orthogonally-adjacent tile
  # (tried W 3124,3106; E 3126,3106; diag 3126,3105/3126,3107) has returned
  # "I can't reach that!" -- the resolve->mouse-move->click latency
  # (remote/diort IPC) lands on his vacated tile. ~10 attempts across
  # INTERACT_NPC + CLICK_NPC all failed on that pass. The `repeat: 8` below
  # re-resolves the live tile on each attempt as a mitigation, but a
  # pacing-NPC-aware retry (re-resolve immediately before each individual
  # click, not just before each of 8 attempts) is the durable fix, not yet
  # built. `on_failure: abort` so a miss doesn't march prayer-uncredited
  # into Magic/mainland.
  - id: 18
    description: "Talk to Brother Brace (pacing NPC — repeat re-resolves live tile; abort so a miss doesn't march prayer-uncredited into magic/mainland)"
    action: INTERACT_NPC
    args: "Brother_Brace Talk-to"
    await_condition: "dialogue"
    repeat: 8
    timeout_ms: 5000
    delay_before_ms: 600
    on_failure: abort

  - id: "18b"
    description: "VERIFY the Brother Brace talk registered -- varp advanced to 570"
    action: WAIT
    await_condition: "tutorial_progress:>=570"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt (attempt #8, run 20260720T023314Z): reaching the chapel and
      opening dialogue with Brother Brace advances varp 281 from 550 to 570.
      `dialogue` alone (step 18's await) confirms SOME dialogue opened, not
      necessarily this one -- this gate confirms it was actually credited
      before the blind intro-drain below.

  - id: 19
    description: "Advance Brother Brace intro dialogue"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  - id: 20
    description: "Open Prayer tab"
    action: CLICK_WIDGET
    args: "35913797"
    delay_before_ms: 1000
    notes: "TAB_OPEN does not cover this on Tutorial Island (defects log:256-257) -- direct widget click used instead"

  - id: 21
    description: "Talk to Brother Brace again (pacing NPC — repeat re-resolves live tile; abort so a miss doesn't march prayer-uncredited into magic/mainland)"
    action: INTERACT_NPC
    args: "Brother_Brace Talk-to"
    await_condition: "dialogue"
    repeat: 8
    timeout_ms: 5000
    delay_before_ms: 600
    on_failure: abort

  - id: 22
    description: "Complete Brother Brace dialogue (friends-list steps auto-credit during continues)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"

  - id: "22b"
    description: "VERIFY the prayer phase completed -- varp advanced to 610"
    action: WAIT
    await_condition: "tutorial_progress:>=610"
    timeout_ms: 15000
    on_failure: "abort"
    notes: "Live receipt (attempt #8, run 20260720T023314Z): the Prayer tab open + full Brother Brace dialogue drain advances varp 281 from 570 to 610 (~10s of dialogue driving live)."

  # ===================== Phase 6: Exit to Magic Area =====================
  - id: 23
    description: "Walk to chapel exit door"
    action: GOTO
    args: "3122 3102 0"
    delay_before_ms: 500
    await_condition: "location:3122,3102"
    timeout_ms: 60000
    notes: "Door leads west toward the Magic area"

  - id: 24
    description: "Exit chapel through door"
    action: INTERACT_OBJECT
    args: "Door Open 3122 3102"
    delay_before_ms: 1000
    notes: |
      Door at this file's own documented `chapel_exit_door` location
      (3122,3102, declared above -- also step 23's own GOTO target).
      COORDINATE-QUALIFIED (attempt #12 fix, 2026-07-20, jar >= 421c03e9,
      manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier"):
      added as belt-and-suspenders, same identical-objects doctrine that
      fixed 09_banking.yaml's entry door (journals/2026-07-20_tutorial_
      attempt12_malikreyes_llama.md); no live receipt yet documents a decoy
      "Door" near the chapel exit specifically, but the class-wide sweep
      applies the qualifier to every un-qualified Door/Ladder/Gate interact
      in these three files regardless.

  - id: "24b"
    description: "VERIFY the chapel-exit door crossing credited -- varp advanced to 620"
    action: WAIT
    await_condition: "tutorial_progress:>=620"
    timeout_ms: 15000
