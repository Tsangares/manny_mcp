# Tutorial Island - Part 10a: Account Guide (varp 530 -> 550)
# STATUS: SECTION SPLIT 2026-07-20 (attempt #18, malikreyes/llama, run
# 20260720T060923Z, commit f8b3d7b -- see harvested defect below). This file
# KEEPS the 10_prayer_magic.yaml filename (git history) but is now ONLY the
# Account Guide half: Phases 1-4 (west-door defensive re-seat/open/through-walk,
# the two Account Guide talks + the Account Management tab click, the east-door
# exit). It drives varp 281 from 530 (entry, after 09_banking_to_account_guide
# .yaml) to 550 (the Prayer/Brother Brace boundary). Everything AFTER the east
# door -- Brother Brace (Prayer), the chapel exit, the Magic Instructor (Wind
# Strike), the Ironman decline, and the mainland Home Teleport -- now lives in
# the new sibling file 10b_prayer_magic_boat.yaml (entry varp 550).
#
# WHY THE SPLIT (attempt #18 harvested defect -- section 10 was not
# resume-idempotent): attempt #18 was the FIRST run ever to *start* section 10
# at varp 550 (a mid-section resume, logged in at the chapel-side park
# (3124,3105)). The OLD combined file re-ran its Phase 1-4 Account Guide
# ceremony unconditionally, so step 1's exact re-seat at (3124,3124) -- the
# west-door threshold, INSIDE the bank building -- was targeted from OUTSIDE,
# south/east of the building. The pathfinder wedged at (3127,3129) against the
# building's north wall (5 tiles from target, wall between); all 8/8 exact hops
# right-clicked empty "Cancel" menus (blocked-tile signature) and honestly
# aborted (DEFECT-27 + strict_steps). The primitives were honest; the routine's
# resume geometry was the defect. Runs entering at varp 530 from the west seat
# (attempts #16/#17) never hit this because step 1's seat was reachable from
# inside. THE FIX (this split): the master chain now gates 10a at varp 550, so
# a resume at >=550 SKIPS 10a entirely (its 531/532/540/550 credit is already
# banked) and enters 10b at the OUTDOOR chapel approach (open-ground plain GOTO,
# reachable from any 550 park). This mirrors the master chain's section-gate
# resume-idempotency already proven for 05/05b, 08a/08b, 09a/09b.
#   Receipt: journals/2026-07-20_tutorial_attempt18_malikreyes_llama.md,
#   screenshot journals/images/2026-07-20_malikreyes_attempt18_s10_step1_
#   reseat_wedge.png.
#
# ---- This half's own hard-won fixes (all PRESERVED verbatim below) ----
#
# INCIDENT (attempt #8, runs 20260720T021142Z + 20260720T023314Z, supervisor
# ground truth): the old Account Management tab click was `CLICK_WIDGET
# 35913777` as a hardcoded widget id. That id DOES NOT EXIST on the current jar
# -- the click was a SILENT NO-OP (CLICK_WIDGET reports "sent" regardless),
# varp 281 stalled at 530, and the section's later east-door clicks were
# tutorial-blocked by an invisible queued modal ("You need to talk to the
# Account Guide before you are allowed to proceed through this door.") that
# never surfaces in the dialogue export.
#
# THE FIX -- what actually worked, hand-driven live with receipts:
#   talk to Account Guide (varp 530->531)
#   -> click the FLASHING Account Management tab: log-confirmed working
#      mechanism was a canvas click at (597,477) whose menu OPTION read
#      verbatim "Account Management" (varp 531->532)
#   -> final talk round, 16 dialogue pages drained (532->540)
#   -> east door open + immediate plain through-walk (540->550, player
#      lands outside at ~3134,3124)
# Encoded below as: `mcp_tool: click_widget` with `args: {action: "Account
# Management"}` (step 7) instead of a hardcoded id -- see that step's notes for
# why this is the chosen mechanism over a guessed new id or a raw coordinate
# click. Every stage transition above now has an honest `WAIT
# tutorial_progress:>=N` gate (Grammar 1, ROUTINE_SCHEMA.md (c)) instead of an
# assumption, so a wrong/failed action aborts the chain (strict_steps) instead
# of silently marching a desynced game into the east door / 10b.
#
# Also discovered live (context only, NOT fixed in this YAML -- a Java-side
# defect being ticketed separately): an "I can't reach that!" modal renders in
# chatbox widget group 162, is invisible to the dialogue export, and makes
# subsequent clicks register as Cancel. If a future run wedges with no visible
# cause, suspect this.
#
# Engine predicates used below (dialogue/no_dialogue/location/
# tutorial_progress) are all implemented in mcptools/tools/monitoring.py --
# see 08_combat.yaml / 09_banking_to_account_guide.yaml for the reference
# WAIT-gate pattern this file mirrors throughout.

name: "Tutorial Island - Account Guide (varp 530 -> 550)"
type: tutorial
phase: 10

# Key NPCs
npcs:
  account_guide:
    name: "Account Guide"
    id: 3310
    location: {x: 3126, y: 3124, plane: 0}

# Key Locations
locations:
  account_guide_room: {x: 3125, y: 3124, plane: 0}
  account_guide_door: {x: 3125, y: 3124, plane: 0}          # west/interior door, antechamber -> Account Guide room
  east_door: {x: 3130, y: 3124, plane: 0}                    # east door, Account Guide room -> outside
  east_door_outside: {x: 3134, y: 3124, plane: 0}            # LIVE RECEIPT (attempt #8, runs 20260720T021142Z/023314Z): through-walk landing tile after the east-door crossing, varp 540->550. Also 10b's east-door candidate start.

# Key Widgets
widgets:
  # account_management_tab: NO LONGER A HARDCODED ID -- widget 35913777 does
  # NOT EXIST on the current jar (attempt #8 incident, see header). The tab
  # click below uses `mcp_tool: click_widget` with `args: {action: "Account
  # Management"}` (live-scanned, group 160 minimap tab icons) instead. Do
  # NOT reintroduce a hardcoded id here without a fresh live receipt.
  # Prayer/Magic tab + Wind Strike + Home Teleport widgets moved to
  # 10b_prayer_magic_boat.yaml (they belong to the phases 5-8 this split moved).

# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  # ===================== Phase 1: Account Guide (talk #1) =====================
  # Defensive re-open: 09_banking_to_account_guide.yaml already crosses this
  # SAME door and lands the player at (3126,3124), but Tutorial Island doors
  # auto-close ~5-7s after Open (DOOR-CROSSING v2, MANNY_OVERSEER.md) -- a
  # section restart or any gap before this file's own first step can find it
  # closed again. Doors are IDENTICAL objects with others documented nearby
  # (09b pitfall #1), so the exact seat + location-await is what pins the
  # next Open to THIS door, not a decoy.
  #
  # RESUME NOTE (attempt #18 fix): this step-1 exact re-seat at (3124,3124) is
  # reachable ONLY from INSIDE/west of the bank building (the 530-entry flow
  # from 09b). On a mid-section resume at varp 550 the player is OUTSIDE and
  # this seat is unreachable (wedged attempt #18 at the north wall). That case
  # is now handled by the master chain gating 10a at 550 -- a resume at >=550
  # SKIPS this whole file and starts at 10b's outdoor chapel approach. Do NOT
  # rely on this seat being reachable from a 550 park.
  - id: 1
    description: "Seat at the Account Guide door threshold (exact-mode seat, defensive re-open)"
    action: GOTO
    args: "3124 3124 0 exact"
    await_condition: "location:3124,3124"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: "Mirrors 09_banking_to_account_guide.yaml step 1 -- same door (3125,3124)."

  - id: 2
    description: "Open door to Account Guide room (defensive -- door may have auto-closed)"
    action: INTERACT_OBJECT
    args: "Door Open 3125 3124"
    delay_before_ms: 1000
    notes: |
      Door at (3125, 3124) -- CONFIRMED, Driver #4. DOOR-CROSSING v2: no
      delay_after padding -- minimize the gap before the through-walk (next
      step) so the crossing lands during the still-open window.
      COORDINATE-QUALIFIED (attempt #12 fix, 2026-07-20, jar >= 421c03e9,
      manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier"):
      `3125 3124` is this file's own `account_guide_door` location (declared
      above, same door 09_banking_to_account_guide.yaml step 2 opens) --
      added as belt-and-suspenders on top of the step-1 exact seat after
      09_banking.yaml's sibling entry door was found to resolve to the wrong
      "Door" among 5 in range (journals/2026-07-20_tutorial_attempt12_
      malikreyes_llama.md).

  - id: 3
    description: "Through-walk PAST the threshold, 4 tiles east on the y=3124 row (plain GOTO, not onto the door tile)"
    action: GOTO
    args: "3128 3124 0"
    await_condition: "location:3128,3124"
    timeout_ms: 60000
    on_failure: "retry:2"
    notes: |
      DOOR-CROSSING v2: plain through-walk, never exact onto the door tile
      itself (exact's per-hop 'Walk here' refiner is BLOCKED once the door
      re-closes).

      RETARGETED (3126,3124)->(3128,3124) after attempt #16. The old 2-tile
      target sat inside plain GOTO's `distance <= 3` no-op radius
      (GotoCommand.java:152) and was believed MASKED by step 4's NPC interact
      pathing through the door. Attempt #16 FALSIFIED that: the GOTO
      false-passed with no movement, the Account_Guide Talk-to fired out of
      range with no dialogue, and the honest varp >=531 gate aborted (run
      receipt: journals/2026-07-20_tutorial_attempt16_malikreyes_llama.md).
      New target (3128,3124) is distance 4 from the seat (3124,3124) -- a real
      click is issued -- and is the same interior tile 9b's through-walk
      (fbde0cc) validated live in the same attempt: on the walkable y=3124 row,
      2 tiles east of the NPC (3126,3124), 2 short of the east door (3130).
      Step 4's Talk-to then paths 2 tiles back west to the NPC.

  - id: 4
    description: "Talk to Account Guide (first round)"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"
    on_failure: "retry:2"

  - id: 5
    description: "Advance Account Guide intro dialogue (until the Account Management tab starts flashing)"
    action: KEY_PRESS
    args: "space"
    repeat_until: "no_dialogue"
    notes: "Short intro before the flashing tab appears -- not the 16-page explanation (that's the second talk, Phase 3)."

  - id: 6
    description: "VERIFY the first Account Guide talk registered -- varp advanced to 531"
    action: WAIT
    await_condition: "tutorial_progress:>=531"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt (attempt #8, runs 20260720T021142Z + 20260720T023314Z,
      supervisor ground truth): talking to Account Guide advances varp 281
      from 530 to 531. Honest abort if the talk didn't register (strict_steps
      stops the chain instead of marching a desynced game into the tab click).

  # ===================== Phase 2: Account Management tab (THE FIX) =====================
  - id: 7
    description: "Open Account Management tab"
    mcp_tool: click_widget
    args:
      action: "Account Management"
    on_failure: "retry:2"
    notes: |
      REPLACES the stale `CLICK_WIDGET 35913777` (attempt #8 incident, see
      file header): that hardcoded widget id does NOT EXIST on the current
      jar -- CLICK_WIDGET reports "sent" regardless (silent no-op), varp
      stalled at 530, and the east-door clicks downstream were
      tutorial-blocked by an invisible queued modal.

      CHOSEN MECHANISM, in the directive's own preference order:
        (a) a CURRENT valid hardcoded id with a live receipt -- NONE EXISTS;
            do not guess a replacement id.
        (b) a menu/action-based click primitive -- USED HERE. The live
            receipt's working click was a canvas click at (597,477) whose
            menu OPTION read verbatim "Account Management". `mcp_tool:
            click_widget` with `args: {action: "Account Management"}`
            (handle_click_widget, mcptools/tools/routine.py:602) is the
            canonical action-based click primitive: it runs `SCAN_WIDGETS
            "Account Management"` live (matches on each widget's `actions[]`
            array server-side, ScanWidgetsCommand.java addWidgetInfo
            matchesAction check -- group 160 "Minimap (tab icons on Tutorial
            Island)" is one of the default-scanned groups, exactly where a
            flashing tutorial tab icon lives), then does an atomic CLICK_AT
            at the LIVE-SCANNED widget's bounds center (or CLICK_WIDGET-by-id
            if bounds aren't canvas-safe, DEFECT-29 guard). This is NOT a
            raw/guessed coordinate click (which widget_reference.yaml bans
            for Tutorial Island -- "coordinate-based clicking causes server
            disconnections") -- it is the same fresh-scan-then-click path
            already proven for `mcp_tool: click_widget` with `text: "Worn
            Equipment"` in 08_combat.yaml step 5. Robust to widget-id drift
            because it never hardcodes an id.
        (c) a raw canvas coordinate click (597,477) as a last resort -- NOT
            NEEDED, (b) is available and doctrinally preferred.
      Citing run ids: attempt #8, runs 20260720T021142Z + 20260720T023314Z.

  - id: 8
    description: "VERIFY the Account Management tab click registered -- varp advanced to 532"
    action: WAIT
    await_condition: "tutorial_progress:>=532"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt: clicking the flashing Account Management tab advances
      varp 281 from 531 to 532. This is the gate that would have caught the
      old stale-id no-op immediately instead of stalling silently through
      the rest of the section.

  # ===================== Phase 3: Account Guide (talk #2, full explanation) =====================
  - id: 9
    description: "Talk to Account Guide again (full account-management explanation)"
    action: INTERACT_NPC
    args: "Account_Guide Talk-to"
    await_condition: "dialogue"
    on_failure: "retry:2"

  - id: 10
    description: "Complete Account Guide dialogue -- blind Space drain"
    action: KEY_PRESS
    args: "space"
    repeat: 18
    delay_before_ms: 600
    notes: |
      Live receipt: 16 dialogue pages drained (varp 532->540). Was
      `repeat_until: no_dialogue` -- DEFECT-31/DEFECT-24 (see 08_combat.yaml
      step 3): repeat_until check-first no-ops on a modal/false-closed page,
      so it can under-drain a long explanation. Blind fixed-count instead,
      sized for the receipt's 16 pages plus margin (mirrors 08_combat.yaml's
      dagger-handover drain sizing). Extra presses after dialogue closes are
      inert on Tutorial Island.

  - id: 11
    description: "VERIFY the full Account Guide explanation credited -- varp advanced to 540"
    action: WAIT
    await_condition: "tutorial_progress:>=540"
    timeout_ms: 15000
    on_failure: "abort"
    notes: "Live receipt: the second talk + 16-page drain advances varp 281 from 532 to 540."

  # ===================== Phase 4: East door exit (door-crossing v2) =====================
  - id: 12
    description: "Seat at the east door threshold (exact-mode seat)"
    action: GOTO
    args: "3129 3124 0 exact"
    await_condition: "location:3129,3124"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: "East door at (3130,3124), leads outside. Exact seat pins the next Open to this door (doors are identical objects, 09b pitfall #1)."

  - id: 13
    description: "Open east door to outside"
    action: INTERACT_OBJECT
    args: "Door Open 3130 3124"
    delay_before_ms: 1000
    notes: |
      DOOR-CROSSING v2: no delay_after padding -- minimize the gap before
      the through-walk (next step) so the crossing lands during the
      still-open window.
      COORDINATE-QUALIFIED (attempt #12 fix, 2026-07-20, jar >= 421c03e9,
      manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier"):
      `3130 3124` is this file's own documented `east_door` location above
      -- added as belt-and-suspenders on top of the step-12 exact seat, same
      identical-objects doctrine that fixed 09_banking.yaml's entry door
      (journals/2026-07-20_tutorial_attempt12_malikreyes_llama.md).

  - id: 14
    description: "Through-walk PAST the threshold to outside (plain GOTO, not onto the door tile)"
    action: GOTO
    args: "3134 3124 0"
    await_condition: "location:3134,3124"
    timeout_ms: 60000
    on_failure: "retry:2"
    notes: |
      DOOR-CROSSING v2 rework (attempt #8 incident, see file header): the
      OLD version of this section walked to a pre-door waypoint (3128,3110)
      as its first post-door hop, which is 05b/09b's forbidden pattern of
      GOTO'ing at/near the door tile as the crossing step itself. Live
      receipt (runs 20260720T021142Z/023314Z): the working crossing is a
      PLAIN GOTO straight to (3134,3124), the confirmed outside landing
      tile, immediately after Open -- never exact onto the door tile (exact
      mode's per-hop "Walk here" refiner is BLOCKED once the door
      re-closes, spinning to a ~53s timeout).

  - id: 15
    description: "VERIFY the east-door crossing credited -- varp advanced to 550 (LAST STEP of 10a)"
    action: WAIT
    await_condition: "tutorial_progress:>=550"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Live receipt: the east-door crossing advances varp 281 from 540 to
      550 (the Prayer/Brother Brace boundary -- see
      09_banking_to_account_guide.yaml header for the wiki stage name). This
      is the terminal step of THIS file (10a) and its progress_gate in
      00_master.yaml. Everything after the east door (chapel approach,
      Brother Brace, Magic, mainland exit) now lives in
      10b_prayer_magic_boat.yaml, which the chain runs next (and which a
      resume at >=550 enters directly, skipping this whole file).

# PITFALLS DISCOVERED (10a scope):
# 1. Door navigation: exact seat on the threshold (location-await confirmed),
#    then INTERACT_OBJECT Door Open, then a PLAIN through-walk PAST the
#    threshold -- never exact onto the door tile itself (DOOR-CROSSING v2).
#    Every Door interact in this file is also coordinate-qualified (attempt
#    #12 fix, 2026-07-20, jar >= 421c03e9: `Door Open <x> <y>` targets the
#    object nearest that point) as belt-and-suspenders on top of the seat --
#    09_banking.yaml's sibling entry door resolved to the wrong "Door" among
#    5 in range when un-qualified (journals/2026-07-20_tutorial_attempt12_
#    malikreyes_llama.md).
# 2. Account Management tab: widget 35913777 is STALE on the current jar
#    (attempt #8 incident) -- use `mcp_tool: click_widget` with
#    `args: {action: "Account Management"}` instead of any hardcoded id.
# 3. Dialogue advancement: KEY_PRESS space. `repeat_until: no_dialogue` is
#    fine for short intros; a long multi-page explanation (16+ pages) should
#    be a blind fixed-count `repeat` instead (DEFECT-31/24 check-first no-op
#    on a modal/false-closed page).
# 4. Step-1 re-seat (3124,3124) is reachable ONLY from inside/west of the bank
#    building. On a resume at varp >=550 the player is outside and it wedges
#    (attempt #18) -- handled by the master gating 10a at 550 so a 550 resume
#    skips this file and enters 10b's outdoor approach directly.

# After this routine: player outside at ~(3134,3124), varp 281 >= 550. The
# chain continues into 10b_prayer_magic_boat.yaml (Brother Brace / Prayer,
# chapel exit, Magic Instructor / Wind Strike, Ironman decline, mainland Home
# Teleport -> Lumbridge).
