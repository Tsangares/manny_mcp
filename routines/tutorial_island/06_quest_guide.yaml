# Tutorial Island - Part 6: Quest Guide
# STATUS: VALIDATED
#
# This routine handles the Quest Guide section:
# 1. Navigate from Cooking area to Quest Guide building
# 2. Talk to Quest Guide
# 3. Open Quest Journal tab
# 4. Talk to Quest Guide again
# 5. Continue to mining section (ladder down)

name: "Tutorial Island - Quest Guide"
type: tutorial
phase: 6


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  - id: 1
    description: "Walk to Quest Guide building area"
    action: GOTO
    args: "3086 3110 0"
    notes: "From cooking exit (3072, 3090), walk toward Quest Guide. PLAIN mode (reverted from `exact` 2026-07-19, parity with 05_cooking_to_quest_guide): exact hard-fails on partial arrival and seals the player; plain self-corrects."

  - id: 2
    description: "Walk to Quest Guide building door"
    action: GOTO
    args: "3086 3126 0"
    delay_before_ms: 3000

  - id: 3
    description: "Open Quest Guide building door"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 2000

  # PROXIMITY GATE (parity with 05_cooking_to_quest_guide 9b, attempt #5 fix
  # 2026-07-19): state-gate the arming talk instead of firing it on fixed step
  # order. Confirm the player is actually AT the guide (~3086,3126) before the
  # Talk-to; HOLD via on_failure: retry:2 and, if the guide is genuinely
  # unreachable, ABORT honestly rather than arming from across the map.
  - id: 3b
    description: "Proximity gate: confirm AT the Quest Guide before arming (state-gated)"
    action: GOTO
    args: "3086 3125 0 exact"
    await_condition: "location:3086,3125"
    timeout_ms: 60000
    delay_after_ms: 1000
    on_failure: "retry:2"

  - id: 4
    description: "Talk to Quest Guide"
    action: INTERACT_NPC
    args: "Quest_Guide Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 2000
    on_failure: "retry:2"

  - id: 5
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 2000

  - id: 6
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 7
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 8
    description: "Open Quest Journal tab"
    action: CLICK_WIDGET
    args: "35913794"
    delay_before_ms: 1000
    notes: |
      Widget ID: 35913794 = (548 << 16) | 66
      CLICK_WIDGET only takes widget ID, not action strings

  - id: 9
    description: "Click Quest Guide dialogue option"
    action: CLICK_WIDGET
    args: "15138820"
    delay_before_ms: 2000
    notes: |
      CRITICAL: After opening Quest tab, a dialogue appears with options:
      - "Quest Guide" (widget 15138820)
      - "Click here to continue"
      Must click "Quest Guide" option to proceed.

  - id: 10
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 11
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 12
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 13
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 14
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 15
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  # POSITION-PIN before the ladder (finding #2a): seat on the ladder's surface
  # tile so the range-based Climb-down is issued adjacent, not from across the
  # room ("I can't reach that!" silent-SUCCESS was the attempt-#1 06-resume bug).
  # LADDER RE-PIN (2026-07-19, parity with 05_cooking_to_quest_guide 12d/12e):
  # (3088,3119) is the ladder tile itself and is BLOCK_MOVEMENT_FULL (collision
  # dump: FULLBLOCK) -- pinning onto it ejects the player outside the south wall
  # and Climb-down returns "I can't reach that!". The only walkable adjacent tile
  # is (3088,3120), north of the ladder, interior. Route there via the interior
  # y=3120 row (seat west first, then step east) to stay inside the house.
  - id: 15b
    description: "Seat on interior tile west of ladder (exact-arrival)"
    action: GOTO
    args: "3086 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3086,3120"
    timeout_ms: 60000

  - id: 15c
    description: "Step onto the ladder's only walkable adjacent tile, north of it (exact-arrival)"
    action: GOTO
    args: "3088 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3088,3120"
    timeout_ms: 60000

  # GROUND-TRUTH LADDER GATE (parity with 05_cooking_to_quest_guide 12f, attempt
  # #5 fix 2026-07-19): verify the ladder is ARMED (varp 281 >= 250) before the
  # Climb-down. If not armed the click silently no-ops (attempt #5 clicked a dead
  # ladder 3x); on_failure: abort STOPS here at a named step instead.
  - id: 15d
    description: "verify ladder armed (varp 281 >= 250)"
    action: WAIT
    await_condition: "tutorial_progress:>=250"
    timeout_ms: 15000
    on_failure: "abort"

  - id: 16
    description: "Climb down ladder to mining section"
    action: INTERACT_OBJECT
    args: "Ladder Climb-down"
    delay_before_ms: 1000
    delay_after_ms: 2000
    await_condition: "location:3088,9520"
    timeout_ms: 30000
    notes: |
      Descent await location:3088,9520 (parity with 05b step 13): confirms the
      y-jump into the underground mining area (~3088,9520, still plane 0 -- NO
      plane change on this descent). If the gate was open this satisfies; if not,
      the 15d WAIT gate above already aborted before we reach here.
      Ladder leads to underground mining tutorial area.
      NOTE: this 06 file is DEPRECATED (not in the master chain -- see
      00_master.yaml; the merged 05_cooking_to_quest_guide.yaml owns the ladder
      now). Kept only as the standalone Quest-Guide dialogue reference.

# PITFALLS DISCOVERED:
# 1. CLICK_WIDGET only takes widget ID - not action strings
# 2. CLICK_CONTINUE doesn't exist - use KEY_PRESS Space
# 3. await_condition and repeat_until cause timeouts - removed
# 4. CRITICAL: After opening Quest tab, a dialogue with options appears:
#    - Must click "Quest Guide" option (widget 15138820) NOT "Click here to continue"
#    - Only after completing this dialogue does the ladder become usable
#    - Check tutorial hint (widget group 263) to verify progress

# After this routine:
# Player in underground area, ready for 07_mining_smithing.yaml
