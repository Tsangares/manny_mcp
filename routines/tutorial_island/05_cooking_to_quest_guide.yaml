# Tutorial Island - Part 5: Cooking Exit to Quest Guide
# STATUS: REPAIRED 2026-07-19 (attempt #5 diagnosis — cooking-exit bridge GOTOs
#         restored to `exact`, reproducing the attempt-#1 passing config 402950b)
#
# This routine handles the navigation from the Cooking section to Quest Guide building.
# CRITICAL: The path from cooking exit requires going WEST (onto the door tile) first,
# then NORTH along the western edge in short hops. Direct north paths are blocked by
# invisible fences and NAV-DIRECT cannot dogleg west-through-door-then-north.
#
# EXACT-MODE RESTORE (2026-07-19, attempt #5 diagnosis): the cooking-exit leg GOTOs
# (steps 1,3,4,5,6,7,8) carry the ` exact` suffix AGAIN. History, corrected:
#   * Attempt #1 (punitpun) PASSED this leg first-contact — and it ran commit 402950b,
#     which had these GOTOs in `exact` mode (NOT plain; the earlier header claim that
#     attempt #1 used plain GOTOs was wrong — verified against the git blame/run time).
#   * The blast lane-2 regression run and attempt #5 (karldakilla) BOTH wedged on PLAIN
#     mode: `GOTO 3072 3090 0` (plain) left the player at (3074,3091), 2 tiles EAST of
#     the x=3072 corridor, and every northward hop then failed
#     "[NAV-LOOKAHEAD] Player didn't move ... path blocked by wall/obstacle". Root cause
#     is the DEFECT-7 short-circuit (GotoCommand.java:152): plain GOTO reports SUCCESS
#     without moving whenever it is already within 3 tiles, so `GOTO 3072 3090` never
#     steps the player the 2 tiles WEST onto the corridor; the follower then A*-hugs the
#     wall from the wrong (east) side and stalls, repeatedly re-detecting the (now open)
#     door WallObject at (3072,3090) as the blocker.
#   * The attempt-#3 walled-pocket that motivated the plain REVERT (070d159) was NOT
#     caused by exact mode — it was the progress-gate skip (05_cooking gate 120, which
#     section 04 already reached at 130) that ran 05b with the player OUTSIDE the kitchen
#     at a wrong start tile. That gate bug was fixed AFTER the revert (commit 31504fb,
#     gate 120->170). With the player correctly INSIDE (attempt #5 cooked in, door opened
#     16:53), exact-arrival seats x=3072 in ≤8 short hops within its 5-tile refine range
#     (NavigationHelpers.stepOntoExactTile) — exactly how attempt #1 crossed cleanly.
# The `location:X,Y` awaits (3-tile Chebyshev tolerance, ROUTINE_SCHEMA.md (c)) stay as
# secondary confirms; exact GOTO now guarantees the literal tile before they check.
# The ladder-pin legs (12d/12e, tile 3088,3120) are also `exact` (range-gated Climb-down).
#
# Previous section: 04_woodcutting_firemaking.yaml (ends with baking bread)
# Next section: 06_quest_guide.yaml (now merged into this file)

name: "Tutorial Island - Cooking to Quest Guide"
type: tutorial
phase: 5

# Key Locations (VALIDATED)
locations:
  cooking_exit_door: {x: 3072, y: 3090, plane: 0}    # Door to exit cooking building
  cooking_door_approach: {x: 3073, y: 3090, plane: 0}  # MUST settle here FIRST before opening door
  quest_guide_door: {x: 3086, y: 3126, plane: 0}
  quest_guide_npc: {x: 3084, y: 3121, plane: 0}
  ladder_down: {x: 3088, y: 3119, plane: 0}  # Surface side of the ladder; climbing down lands underground (see 07_mining_smithing.yaml, y~9500, still plane 0)

# Navigation waypoints (VALIDATED - onto door tile then short north hops)
# NOTE: not a schema key read by the executor (steps below walk this exact route)
#   {x: 3073, y: 3090, note: "Settle in front of cooking exit door"}
#   {x: 3072, y: 3090, note: "Step ONTO the door tile after opening"}
#   {x: 3072, y: 3096, note: "North hop 1 (<=10 tiles)"}
#   {x: 3072, y: 3106, note: "North hop 2"}
#   {x: 3072, y: 3112, note: "North hop 3"}
#   {x: 3080, y: 3120, note: "Toward Quest Guide building"}
#   {x: 3086, y: 3125, note: "At Quest Guide door"}

widgets:
  quest_journal_tab: 35913794  # Opens quest journal


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  # CRITICAL: settle IN FRONT of door before trying to open it
  - id: 1
    description: "Walk to cooking exit door and settle (exact-arrival)"
    action: GOTO
    args: "3073 3090 0 exact"
    await_condition: "location:3073,3090"
    timeout_ms: 60000
    delay_after_ms: 1500
    notes: |
      CRITICAL: Must settle directly in front of door before INTERACT_OBJECT works.
      The delay_after_ms lets arrival settle so the door interact registers (proven
      manual recipe -- an un-settled arrival makes the Open click miss).
      The door at (3072, 3090) leads OUT of the cooking building toward Quest Guide.

  - id: 2
    description: "Open cooking exit door"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 1000
    delay_after_ms: 1000

  - id: 3
    description: "Step ONTO the door tile (west corridor) once it is open (exact-arrival)"
    action: GOTO
    args: "3072 3090 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3090"
    timeout_ms: 60000
    notes: |
      Head WEST onto the door tile before any north hop; NAV-DIRECT cannot dogleg
      through the door. THIS IS THE WEDGE-FIX HOP. In PLAIN mode the DEFECT-7 short-
      circuit (GotoCommand.java:152: distance <= 3 => SUCCESS without moving) leaves the
      player at (3074,3091), 2 tiles EAST of x=3072, and every north hop then wall-stalls
      (attempt #5 / blast lane-2). `exact` skips that short-circuit and refines the 2
      tiles west ONTO x=3072 (stepOntoExactTile, ≤8 hops within a 5-tile range) — the
      same seat that let attempt #1 (commit 402950b, exact) cross this leg cleanly.

  - id: 4
    description: "North hop 1 along west edge (exact-arrival, stays on x=3072)"
    action: GOTO
    args: "3072 3096 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3096"
    timeout_ms: 60000
    notes: |
      Exact so the hop lands ON x=3072 and stays in the corridor; a plain hop can
      short-circuit ~3 tiles out and drift back east off the wall line.

  - id: 5
    description: "North hop 2 along west edge (exact-arrival)"
    action: GOTO
    args: "3072 3106 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3106"
    timeout_ms: 60000

  - id: 6
    description: "North hop 3 along west edge (exact-arrival)"
    action: GOTO
    args: "3072 3112 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3112"
    timeout_ms: 60000

  - id: 7
    description: "Walk toward Quest Guide building (exact-arrival)"
    action: GOTO
    args: "3080 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3080,3120"
    timeout_ms: 60000

  - id: 8
    description: "Walk to Quest Guide door (exact-arrival for the door interact)"
    action: GOTO
    args: "3086 3125 0 exact"
    delay_before_ms: 500
    await_condition: "location:3086,3125"
    timeout_ms: 60000

  - id: 9
    description: "Open Quest Guide building door"
    action: INTERACT_OBJECT
    args: "Door Open"
    delay_before_ms: 1000
    delay_after_ms: 1000

  # ── QUEST-GUIDE COMPLETION SEQUENCE (varp-281 audit, 2026-07-19) ──────────────
  # OSRS wiki (RuneScape:Varplayer/281) confirms the EXACT varp-281 stage ladder
  # for the Quest-Guide segment, and the steps below implement it in order:
  #   200  Enter Quest Guide's house        <- steps 8-9 (open north door + enter)
  #   220  Talk to Quest Guide              <- step 10 (+ exhaust intro, step 11)
  #   230  Open the Quests tab              <- step 12  (TAB_OPEN quests)  ** THE GATE **
  #   240  Talk to Quest Guide AGAIN        <- step 12b (+ exhaust monologue, 12c)
  #   250  Take the ladder to mining area   <- steps 12d/12e/13
  # AUDIT RESULT: the routine is NOT missing the tab-open — opening the Quests tab
  # (230) then RE-talking the guide (240) is exactly what arms the ladder per the
  # wiki, and steps 12/12b already do both in the correct order. attempt #2's
  # ladder desync was NOT a missing step; it was (a) a resume from step 12b on an
  # already-desynced parked account and (b) the ladder-pin geometry bug now fixed
  # in 12d/12e. On a FRESH account run from step 1 this sequence advances 281
  # cleanly to 250. (This maps to 00_master's progress_gate: 250 for this section,
  # which is correct — the section is complete once 281 reaches 250.)
  # ──────────────────────────────────────────────────────────────────────────────
  - id: 10
    description: "Talk to Quest Guide (intro)"
    action: INTERACT_NPC
    args: "Quest_Guide Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 2000
    delay_after_ms: 1200

  - id: 11
    description: "Exhaust the Quest Guide's INTRO monologue (blind fixed-count)"
    action: KEY_PRESS
    args: "space"
    repeat: 12
    delay_before_ms: 900
    notes: |
      LIVE-CORRECTED 2026-07-19 (LANE-2). Do NOT use `repeat_until: no_dialogue`
      here: the Quest-Guide monologue transiently reports open=false BETWEEN
      pages (DEFECT-24 mid-monologue false-close), so the check-first no_dialogue
      loop STOPS after a single press and the section never completes -- exactly
      the stall observed live (guide replies "I don't think you're ready to go
      down there yet" at the ladder). A blind fixed-count `repeat` of KEY_PRESS
      space (NOT CLICK_CONTINUE -- DEFECT-8: space is the reliable advance) walks
      through every page; extra presses after the dialogue closes are inert.

  - id: 12
    description: "Open the Quest Journal tab (tutorial: 'click the flashing icon')"
    action: TAB_OPEN
    args: "quests"
    delay_before_ms: 1000
    delay_after_ms: 1000
    notes: "TAB_OPEN quests replaces the brittle CLICK_WIDGET 35913794 tab click."

  - id: 12b
    description: "RE-TALK to Quest Guide AFTER the journal is open (this opens the ladder gate)"
    action: INTERACT_NPC
    args: "Quest_Guide Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 1500
    delay_after_ms: 1200
    notes: |
      THE GATE-OPENER (live-proven 2026-07-19). The ladder stays inert after only
      the intro talk + journal open. Re-talking once the Quest Journal is open
      makes the guide give the completion monologue ("Now that you have the quest
      list open, you can see all the quests within it...") -- exhausting THIS
      monologue is what unlocks the Climb-down. Without this re-talk the ladder
      returns "I don't think you're ready to go down there yet."

  - id: 12c
    description: "Exhaust the Quest Guide's POST-JOURNAL completion monologue (blind fixed-count)"
    action: KEY_PRESS
    args: "space"
    repeat: 12
    delay_before_ms: 900
    notes: |
      Same blind-repeat rationale as step 11 (DEFECT-24 false-close). This
      monologue is the actual tutorial gate for the ladder; once it is fully
      cleared the Climb-down descends.

  # POSITION-PIN before the ladder (LADDER RE-PIN 2026-07-19, attempt #2 fix):
  # the ladder INTERACT is range-based. Attempt #2's pin `GOTO 3088 3119 exact`
  # targeted the ladder tile ITSELF, which is BLOCK_MOVEMENT_FULL (collision dump
  # flags=0x24120: FULLBLOCK) -- you cannot stand on it. Pathfinding to that
  # unwalkable tile EJECTED the player OUTSIDE the house's south wall to
  # (3088,3118) [y=3118 is the exterior row], from where the Climb-down returned
  # "I can't reach that!". The ONLY walkable tile adjacent to the ladder is
  # (3088,3120) (collision-confirmed walkable, directly NORTH of the ladder,
  # INSIDE the house). The player is already interior here (entered via the
  # north door in steps 8-10 to talk to the Quest Guide), so we route to the
  # ladder along the interior walkable row y=3120 (x=3084..3088 all walkable) --
  # seat first on an interior tile WEST of the ladder, then step east onto the
  # approach tile. This keeps the pathfinder INSIDE and off the south wall.
  - id: 12d
    description: "Seat on interior tile west of ladder, staying inside the house (exact-arrival)"
    action: GOTO
    args: "3086 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3086,3120"
    timeout_ms: 60000
    notes: |
      Interior walkable tile (collision-confirmed) on the same y=3120 row as the
      ladder approach. Seating here first forces the next hop to stay INSIDE and
      approach the ladder from the north (interior) rather than routing around
      the south wall to the unwalkable ladder tile.

  - id: 12e
    description: "Step onto the ladder's ONLY walkable adjacent tile, north of it (exact-arrival)"
    action: GOTO
    args: "3088 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3088,3120"
    timeout_ms: 60000
    notes: |
      (3088,3120) is the sole walkable tile adjacent to the ladder at (3088,3119)
      (collision dump: ladder tile = FULLBLOCK, this tile = walkable(0)). The
      Climb-down is issued from directly north of the ladder, in range, interior.

  - id: 13
    description: "Climb down ladder to mining section (gate now open)"
    action: INTERACT_OBJECT
    args: "Ladder Climb-down"
    delay_before_ms: 1500
    delay_after_ms: 2000
    await_condition: "location:3088,9520"
    timeout_ms: 30000
    notes: |
      Descends to the underground mining area (~3088, 9520 -- still plane 0,
      detect descent by the y-coordinate JUMP, NOT a plane change; there is NO
      plane change on this descent, so the await is a location y-jump, not
      `plane:1`). Gate is open only after the RE-TALK (12b) + its completion
      monologue (12c) are exhausted. Live-verified 2026-07-19: after that recipe
      one Climb-down landed the player at (3088, 9520).
      HONESTY NOTE: with strict_steps, if the gate did NOT open (dialogue desync)
      the player stays on the surface, this await times out, and the section
      FAILS honestly -- the chain STOPS instead of blind-marching into 40+ blind
      minutes (attempt #1). The next section (07_mining_smithing step 1:
      `GOTO 3080 9504 0 exact` await `location:3080,9504`) re-confirms as backup.

# PITFALLS DISCOVERED (2026-01-25, updated 2026-07-18):
# 1. MUST settle IN FRONT of cooking exit door at (3073, 3090) before INTERACT_OBJECT works
#    (arrival must settle -- add delay_after_ms; an un-settled arrival misses the Open click)
# 2. After opening the door, step ONTO the door tile (3072, 3090) BEFORE heading north.
#    NAV-DIRECT cannot dogleg west-through-door-then-north; use explicit waypoints.
#    USE `exact` MODE on this seat + every north hop (steps 1,3,4,5,6,7,8). PLAIN mode
#    is the wedge: the DEFECT-7 short-circuit (GotoCommand.java:152: distance <= 3 =>
#    SUCCESS without moving) leaves the player at (3074,3091), 2 tiles EAST of x=3072,
#    and every north hop then stalls "[NAV-LOOKAHEAD] Player didn't move ... path blocked
#    by wall/obstacle", re-detecting the open door WallObject at (3072,3090) as the
#    blocker (attempt #5 karldakilla; blast lane-2). `exact` skips the short-circuit and
#    refines onto x=3072 (≤8 hops within a 5-tile range) — the config attempt #1 passed on
#    (commit 402950b). The attempt-#3 walled-pocket that once justified reverting to plain
#    was the progress-gate skip (05_cooking gate 120 vs 04 reaching 130) running 05b with
#    the player OUTSIDE at a wrong start tile — fixed separately in 31504fb (gate ->170),
#    not an exact-mode fault. The `location:X,Y` awaits (3-tile Chebyshev, ROUTINE_SCHEMA.md
#    (c)) stay as secondary confirms after exact guarantees the literal tile.
# 3. Direct north paths from cooking are blocked by invisible fences -- hug the west edge (x=3072)
# 4. Navigate north in short (<=10-tile) hops, each with a plain GOTO + location await
# 5. Quest Guide dialogue has multiple "Click here to continue" screens. EXHAUST them
#    with a BLIND fixed-count `repeat: N` of KEY_PRESS space -- NOT `repeat_until:
#    no_dialogue`. The monologue transiently reports open=false BETWEEN pages
#    (DEFECT-24 mid-monologue false-close), so the check-first no_dialogue loop
#    stops after ONE press and the section stalls (live 2026-07-19).
# 6. Ladder gate (LIVE-CORRECTED 2026-07-19): the CORRECT sequence is
#    talk (10) -> exhaust intro (11) -> open journal (12) -> RE-TALK the guide (12b)
#    -> exhaust the post-journal completion monologue (12c) -> Climb-down (13).
#    The RE-TALK after the journal is open is MANDATORY: it triggers the "Now that
#    you have the quest list open..." completion monologue whose exhaustion is the
#    actual ladder gate. Without it the ladder returns "I don't think you're ready
#    to go down there yet" (the exact stall observed live before this fix). There is
#    NO "Quest Guide" dialogue OPTION to select -- widget 15138820 is the speaker-name
#    header, misreported as an option by the state writer (DEFECT-24). Do NOT add a
#    CLICK_DIALOGUE "Quest Guide" / CLICK_WIDGET 15138820 step: it is a silent no-op.
#
# After this routine:
# Player is underground in mining area at approximately (3088, 9520)
# Tutorial hint: "Mining and Smithing - Talk to the mining instructor"
# Ready for 07_mining_smithing.yaml
