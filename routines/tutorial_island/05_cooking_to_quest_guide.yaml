# Tutorial Island - Part 5: Cooking Exit to Quest Guide
# STATUS: REPAIRED 2026-07-19 (attempt #5 diagnosis — cooking-exit bridge GOTOs
#         restored to `exact`, reproducing the attempt-#1 passing config 402950b)
#         UPDATED 2026-07-20 (door-race fix, run 20260720T003818Z): the crossing
#         step (old step 3, exact-GOTO ONTO the door tile) is replaced by a plain
#         through-walk PAST the threshold. See DOOR-CROSSING v2 note below.
#
# This routine handles the navigation from the Cooking section to Quest Guide building.
# CRITICAL: The path from cooking exit requires going WEST (crossing the door
# threshold) first, then NORTH along the western edge in short hops. Direct north
# paths are blocked by invisible fences and NAV-DIRECT cannot dogleg
# west-through-door-then-north.
#
# DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z, desk-verified with log
# receipts): tutorial-island doors auto-close server-side ~5-7s after Open. Two
# patterns lose that race: (1) a redundant cross-section re-seat+re-open of the
# same door (removed 2026-07-20 -- 05_cooking.yaml no longer opens this door; see
# its trailing comment), and (2) `exact`-GOTO ONTO the door tile as the crossing
# step -- exact's per-hop refiner right-clicks "Walk here" on the door tile itself,
# which is BLOCKED once the door re-closes (empty menu), spinning to a 53s timeout.
# The fix pattern: exact seat on the threshold (unchanged doctrine) -> INTERACT
# Open -> immediately (no delay padding) a PLAIN GOTO to a tile PAST the threshold
# (never onto the door tile) so one through-click crosses during the open window.
# Exact stays for SEATS; the through-step is plain and targets beyond the doorway.
# Applied to both door crossings in this file (cooking-exit step 3, Quest Guide
# entry step 9b).
#
# EXACT-MODE RESTORE (2026-07-19, attempt #5 diagnosis): the cooking-exit leg GOTOs
# (steps 1,3,4,5,6,7,8) carry the ` exact` suffix AGAIN. History, corrected:
#   * Attempt #1 (punitpun) PASSED this leg first-contact — and it ran commit 402950b,
#     which had these GOTOs in `exact` mode (NOT plain; the earlier header claim that
#     attempt #1 used plain GOTOs was wrong — verified against the git blame/run time).
#   * The blast lane-2 regression run and attempt #5 (karldakilla) BOTH wedged on PLAIN
#     mode: `GOTO 3072 3090 0` (plain) left the player at (3074,3091), 2 tiles EAST of
#     the x=3072 corridor, and every northward hop then failed
#     "[NAV-LOOKAHEAD] Player didn't move ... path blocked by wall/obstacle". Root cause
#     is the DEFECT-7 short-circuit (GotoCommand.java:152): plain GOTO reports SUCCESS
#     without moving whenever it is already within 3 tiles, so `GOTO 3072 3090` never
#     steps the player the 2 tiles WEST onto the corridor; the follower then A*-hugs the
#     wall from the wrong (east) side and stalls, repeatedly re-detecting the (now open)
#     door WallObject at (3072,3090) as the blocker.
#   * The attempt-#3 walled-pocket that motivated the plain REVERT (070d159) was NOT
#     caused by exact mode — it was the progress-gate skip (05_cooking gate 120, which
#     section 04 already reached at 130) that ran 05b with the player OUTSIDE the kitchen
#     at a wrong start tile. That gate bug was fixed AFTER the revert (commit 31504fb,
#     gate 120->170). With the player correctly INSIDE (attempt #5 cooked in, door opened
#     16:53), exact-arrival seats x=3072 in ≤8 short hops within its 5-tile refine range
#     (NavigationHelpers.stepOntoExactTile) — exactly how attempt #1 crossed cleanly.
# The `location:X,Y` awaits (3-tile Chebyshev tolerance, ROUTINE_SCHEMA.md (c)) stay as
# secondary confirms; exact GOTO now guarantees the literal tile before they check.
# The ladder-pin legs (12d/12e, tile 3088,3120) are also `exact` (range-gated Climb-down).
#
# Previous section: 04_woodcutting_firemaking.yaml (ends with baking bread)
# Next section: 06_quest_guide.yaml (now merged into this file)

name: "Tutorial Island - Cooking to Quest Guide"
type: tutorial
phase: 5

# Key Locations (VALIDATED)
locations:
  cooking_exit_door: {x: 3072, y: 3090, plane: 0}    # Door to exit cooking building
  cooking_door_approach: {x: 3073, y: 3090, plane: 0}  # MUST settle here FIRST before opening door
  quest_guide_door: {x: 3086, y: 3126, plane: 0}
  quest_guide_npc: {x: 3084, y: 3121, plane: 0}
  ladder_down: {x: 3088, y: 3119, plane: 0}  # Surface side of the ladder; climbing down lands underground (see 07_mining_smithing.yaml, y~9500, still plane 0)

# Navigation waypoints (VALIDATED - plain through-walk past threshold, then short north hops)
# NOTE: not a schema key read by the executor (steps below walk this exact route)
#   {x: 3073, y: 3090, note: "Settle in front of cooking exit door (exact seat)"}
#   {x: 3072, y: 3096, note: "PLAIN through-walk PAST the door tile (3072,3090) -- v2 2026-07-20, never target the door tile itself"}
#   {x: 3072, y: 3106, note: "North hop 2"}
#   {x: 3072, y: 3112, note: "North hop 3"}
#   {x: 3080, y: 3120, note: "Toward Quest Guide building"}
#   {x: 3086, y: 3125, note: "At Quest Guide door"}

widgets:
  quest_journal_tab: 35913794  # Opens quest journal


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  # CRITICAL: settle IN FRONT of door before trying to open it
  - id: 1
    description: "Walk to cooking exit door and settle (exact-arrival)"
    action: GOTO
    args: "3073 3090 0 exact"
    await_condition: "location:3073,3090"
    timeout_ms: 60000
    delay_after_ms: 1500
    notes: |
      CRITICAL: Must settle directly in front of door before INTERACT_OBJECT works.
      The delay_after_ms lets arrival settle so the door interact registers (proven
      manual recipe -- an un-settled arrival makes the Open click miss).
      The door at (3072, 3090) leads OUT of the cooking building toward Quest Guide.

  # DOOR = cook building WEST exit door at (3072,3090). Doors are IDENTICAL objects;
  # INTERACT_OBJECT resolves name-only nearest-match (no coordinate qualifier exists --
  # InteractObjectCommand.java parses just <name> <action>) and the cook building has
  # more than one door. The exact seat on the threshold tile (3073,3090) in step 1,
  # location-await-CONFIRMED, is what guarantees nearest-match = THIS door. Never
  # separate this step from its seat step.
  - id: 2
    description: "Open cooking exit door at (3072,3090)"
    action: INTERACT_OBJECT
    args: "Door Open"
    notes: |
      DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z): no delay_before/after
      padding on this step or the through-walk (step 3) that follows it. Tutorial-
      island doors auto-close server-side ~5-7s after Open (desk-verified with log
      receipts, run 20260720T003818Z). The old recipe here padded 1000ms before AND
      after the Open, then GOTO'd `exact` ONTO the door tile (3072,3090) itself as
      the "step through" -- but `exact` mode's per-hop refiner right-clicks
      "Walk here" on each intermediate tile INCLUDING the destination, and once the
      door re-closes that click is BLOCKED (empty "Walk here" menu on a closed
      door tile), spinning to a 53s timeout failure. Fix: minimize the gap between
      Open and the crossing step, and never target the door tile itself with GOTO
      -- see step 3.

  - id: 3
    description: "Through-walk PAST the threshold into the west corridor (plain GOTO, not onto the door tile)"
    action: GOTO
    args: "3072 3096 0"
    await_condition: "location:3072,3096"
    timeout_ms: 60000
    notes: |
      DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z): this step replaces the
      old two-step "exact-GOTO onto the door tile (3072,3090), then exact-GOTO to
      the first north hop (3072,3096)" pair. The door tile is the one place exact
      mode is actively harmful: exact's per-hop refiner (stepOntoExactTile) issues
      a "Walk here" right-click on the door tile as an intermediate/final hop, and
      that click is BLOCKED once the door auto-closes (~5-7s after Open) -- empty
      menu, 53s timeout, confirmed live on run 20260720T003818Z. A single PLAIN
      GOTO straight to a tile PAST the threshold (3072,3096, reusing the old
      step-4 north-hop-1 target) crosses the door with ONE through-click during
      the still-open window, instead of stopping to click the door tile itself.
      Exact stays for SEATS (step 1); this crossing step is intentionally plain.
      The `location:3072,3096` await keeps its standard 3-tile Chebyshev tolerance
      (ROUTINE_SCHEMA.md (c)) as the confirm.

  - id: 5
    description: "North hop 2 along west edge (exact-arrival)"
    action: GOTO
    args: "3072 3106 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3106"
    timeout_ms: 60000

  - id: 6
    description: "North hop 3 along west edge (exact-arrival)"
    action: GOTO
    args: "3072 3112 0 exact"
    delay_before_ms: 500
    await_condition: "location:3072,3112"
    timeout_ms: 60000

  - id: 7
    description: "Walk toward Quest Guide building (exact-arrival)"
    action: GOTO
    args: "3080 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3080,3120"
    timeout_ms: 60000

  - id: 8
    description: "Walk to Quest Guide door (exact-arrival for the door interact)"
    action: GOTO
    args: "3086 3125 0 exact"
    delay_before_ms: 500
    await_condition: "location:3086,3125"
    timeout_ms: 60000

  # DOOR = Quest Guide building door at (3086,3126). Same identical-object rule:
  # nearest-match by name only, so the exact seat on the approach tile (3086,3125)
  # in step 8, location-await-CONFIRMED, is what pins the click to THIS door.
  - id: 9
    description: "Open Quest Guide building door at (3086,3126)"
    action: INTERACT_OBJECT
    args: "Door Open"
    notes: |
      DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z): no delay padding here --
      see step 9b, which now does the immediate plain through-walk past this door
      instead of a redundant re-seat on the same approach tile.

  # ── QUEST-GUIDE COMPLETION SEQUENCE (varp-281 audit, 2026-07-19) ──────────────
  # OSRS wiki (RuneScape:Varplayer/281) confirms the EXACT varp-281 stage ladder
  # for the Quest-Guide segment, and the steps below implement it in order:
  #   200  Enter Quest Guide's house        <- steps 8-9-9b (open north door + enter)
  #   220  Talk to Quest Guide              <- step 10 (+ exhaust intro, step 11)
  #   230  Open the Quests tab              <- step 12  (TAB_OPEN quests)  ** THE GATE **
  #   240  Talk to Quest Guide AGAIN        <- step 12b (+ exhaust monologue, 12c)
  #   250  Take the ladder to mining area   <- steps 12d/12e/13
  # AUDIT RESULT: the routine is NOT missing the tab-open — opening the Quests tab
  # (230) then RE-talking the guide (240) is exactly what arms the ladder per the
  # wiki, and steps 12/12b already do both in the correct order. attempt #2's
  # ladder desync was NOT a missing step; it was (a) a resume from step 12b on an
  # already-desynced parked account and (b) the ladder-pin geometry bug now fixed
  # in 12d/12e. On a FRESH account run from step 1 this sequence advances 281
  # cleanly to 250. (This maps to 00_master's progress_gate: 250 for this section,
  # which is correct — the section is complete once 281 reaches 250.)
  # ──────────────────────────────────────────────────────────────────────────────
  # DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z): this step USED TO be a
  # "proximity gate" that re-issued an `exact` GOTO back onto the SAME tile as the
  # step-8 seat (3086,3125) -- pure ceremony that never actually crossed the
  # threshold, leaving the actual crossing to step 10's INTERACT_NPC Talk-to,
  # whose own internal auto-path has to walk through the door itself. If the door
  # auto-closes (~5-7s after Open, desk-verified run 20260720T003818Z) before that
  # internal pathfind completes, Talk-to can lose the same race the cooking-exit
  # door did. Fixed the same way: immediately after Open, a PLAIN through-walk to
  # a tile INSIDE the house past the doorway -- reusing the `quest_guide_npc`
  # location already declared at the top of this file (3084,3121), not an invented
  # coordinate -- so the player is already past the door and standing next to the
  # Quest Guide before Talk-to ever needs to path through the doorway itself.
  # Retry structure preserved from the old proximity gate (attempt #5 karldakilla,
  # 2026-07-19): on_failure retry:2, then abort honestly (ROUTINE_SCHEMA.md (b))
  # rather than silently marching on with the player still stuck outside.
  - id: 9b
    description: "Through-walk PAST the Quest Guide doorway (plain GOTO to the NPC's tile, not the door tile)"
    action: GOTO
    args: "3084 3121 0"
    await_condition: "location:3084,3121"
    timeout_ms: 60000
    on_failure: "retry:2"

  - id: 10
    description: "Talk to Quest Guide (intro)"
    action: INTERACT_NPC
    args: "Quest_Guide Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 2000
    delay_after_ms: 1200
    on_failure: "retry:2"
    notes: |
      on_failure: retry:2 -- if the guide isn't found (player not in range) re-send
      up to twice, then abort honestly rather than march past this arming talk with
      the ladder left un-armed (attempt #5). The proximity gate (9b) should already
      have us in range; this is the belt-and-braces retry.

  - id: 11
    description: "Exhaust the Quest Guide's INTRO monologue (blind fixed-count)"
    action: KEY_PRESS
    args: "space"
    repeat: 12
    delay_before_ms: 900
    notes: |
      LIVE-CORRECTED 2026-07-19 (LANE-2). Do NOT use `repeat_until: no_dialogue`
      here: the Quest-Guide monologue transiently reports open=false BETWEEN
      pages (DEFECT-24 mid-monologue false-close), so the check-first no_dialogue
      loop STOPS after a single press and the section never completes -- exactly
      the stall observed live (guide replies "I don't think you're ready to go
      down there yet" at the ladder). A blind fixed-count `repeat` of KEY_PRESS
      space (NOT CLICK_CONTINUE -- DEFECT-8: space is the reliable advance) walks
      through every page; extra presses after the dialogue closes are inert.

  - id: 12
    description: "Open the Quest Journal tab (tutorial: 'click the flashing icon')"
    action: TAB_OPEN
    args: "quests"
    delay_before_ms: 1000
    delay_after_ms: 1000
    notes: "TAB_OPEN quests replaces the brittle CLICK_WIDGET 35913794 tab click."

  - id: 12b
    description: "RE-TALK to Quest Guide AFTER the journal is open (this opens the ladder gate)"
    action: INTERACT_NPC
    args: "Quest_Guide Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 1500
    delay_after_ms: 1200
    on_failure: "retry:2"
    notes: |
      on_failure: retry:2 -- this is the RE-TALK that drives varp 281 to 240->250
      and arms the ladder. If it can't find the guide, retry then abort honestly
      instead of marching to a never-armed ladder (attempt #5 karldakilla).
      THE GATE-OPENER (live-proven 2026-07-19). The ladder stays inert after only
      the intro talk + journal open. Re-talking once the Quest Journal is open
      makes the guide give the completion monologue ("Now that you have the quest
      list open, you can see all the quests within it...") -- exhausting THIS
      monologue is what unlocks the Climb-down. Without this re-talk the ladder
      returns "I don't think you're ready to go down there yet."

  - id: 12c
    description: "Exhaust the Quest Guide's POST-JOURNAL completion monologue (blind fixed-count)"
    action: KEY_PRESS
    args: "space"
    repeat: 12
    delay_before_ms: 900
    notes: |
      Same blind-repeat rationale as step 11 (DEFECT-24 false-close). This
      monologue is the actual tutorial gate for the ladder; once it is fully
      cleared the Climb-down descends.

  # POSITION-PIN before the ladder (LADDER RE-PIN 2026-07-19, attempt #2 fix):
  # the ladder INTERACT is range-based. Attempt #2's pin `GOTO 3088 3119 exact`
  # targeted the ladder tile ITSELF, which is BLOCK_MOVEMENT_FULL (collision dump
  # flags=0x24120: FULLBLOCK) -- you cannot stand on it. Pathfinding to that
  # unwalkable tile EJECTED the player OUTSIDE the house's south wall to
  # (3088,3118) [y=3118 is the exterior row], from where the Climb-down returned
  # "I can't reach that!". The ONLY walkable tile adjacent to the ladder is
  # (3088,3120) (collision-confirmed walkable, directly NORTH of the ladder,
  # INSIDE the house). The player is already interior here (entered via the
  # north door in steps 8-10 to talk to the Quest Guide), so we route to the
  # ladder along the interior walkable row y=3120 (x=3084..3088 all walkable) --
  # seat first on an interior tile WEST of the ladder, then step east onto the
  # approach tile. This keeps the pathfinder INSIDE and off the south wall.
  - id: 12d
    description: "Seat on interior tile west of ladder, staying inside the house (exact-arrival)"
    action: GOTO
    args: "3086 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3086,3120"
    timeout_ms: 60000
    notes: |
      Interior walkable tile (collision-confirmed) on the same y=3120 row as the
      ladder approach. Seating here first forces the next hop to stay INSIDE and
      approach the ladder from the north (interior) rather than routing around
      the south wall to the unwalkable ladder tile.

  - id: 12e
    description: "Step onto the ladder's ONLY walkable adjacent tile, north of it (exact-arrival)"
    action: GOTO
    args: "3088 3120 0 exact"
    delay_before_ms: 500
    await_condition: "location:3088,3120"
    timeout_ms: 60000
    notes: |
      (3088,3120) is the sole walkable tile adjacent to the ladder at (3088,3119)
      (collision dump: ladder tile = FULLBLOCK, this tile = walkable(0)). The
      Climb-down is issued from directly north of the ladder, in range, interior.

  # GROUND-TRUTH LADDER GATE (attempt #5 karldakilla, 2026-07-19): the FIRST
  # account ever to physically reach the ladder menu-clicked Climb-down 3x and it
  # silently no-op'd -- the ladder was never ARMED (varp 281 stuck at 200 because
  # the arming talks fired 30 tiles away and failed). This WAIT reads the plugin's
  # game-truth Tutorial-progress (state.tutorial.progress = varbit 281; the
  # tutorial_progress atom in monitoring.py, absent/null -> not satisfied) and, if
  # the ladder is NOT armed (progress < 250), FAILS HONESTLY at this named step.
  # on_failure: abort STOPS the run here rather than clicking a dead ladder at step
  # 13 and no-op'ing 3x. If armed (>=250) it passes instantly and the descent runs.
  - id: 12f
    description: "verify ladder armed (varp 281 >= 250)"
    action: WAIT
    await_condition: "tutorial_progress:>=250"
    timeout_ms: 15000
    on_failure: "abort"

  - id: 13
    description: "Climb down ladder to mining section (gate now open)"
    action: INTERACT_OBJECT
    args: "Ladder Climb-down"
    delay_before_ms: 1500
    delay_after_ms: 2000
    await_condition: "location:3088,9520"
    timeout_ms: 30000
    notes: |
      Descends to the underground mining area (~3088, 9520 -- still plane 0,
      detect descent by the y-coordinate JUMP, NOT a plane change; there is NO
      plane change on this descent, so the await is a location y-jump, not
      `plane:1`). Gate is open only after the RE-TALK (12b) + its completion
      monologue (12c) are exhausted. Live-verified 2026-07-19: after that recipe
      one Climb-down landed the player at (3088, 9520).
      HONESTY NOTE: with strict_steps, if the gate did NOT open (dialogue desync)
      the player stays on the surface, this await times out, and the section
      FAILS honestly -- the chain STOPS instead of blind-marching into 40+ blind
      minutes (attempt #1). The next section (07_mining_smithing step 1:
      `GOTO 3080 9504 0 exact` await `location:3080,9504`) re-confirms as backup.

# PITFALLS DISCOVERED (2026-01-25, updated 2026-07-18, updated 2026-07-20):
# 1. MUST settle IN FRONT of cooking exit door at (3073, 3090) before INTERACT_OBJECT works
#    (arrival must settle -- add delay_after_ms; an un-settled arrival misses the Open click)
# 2. [SUPERSEDED 2026-07-20, see pitfall #8] After opening the door, the OLD recipe stepped
#    ONTO the door tile (3072, 3090) itself with `exact` mode before heading north. That
#    correctly fixed the DEFECT-7 plain short-circuit (GotoCommand.java:152: distance <= 3
#    => SUCCESS without moving, leaving the player at (3074,3091) 2 tiles EAST of x=3072 --
#    attempt #5 karldakilla; blast lane-2) but introduced a NEW failure mode: exact's per-hop
#    refiner (stepOntoExactTile, ≤8 hops within a 5-tile range) right-clicks "Walk here" on
#    the door tile as the final hop, and doors auto-close ~5-7s after Open -- once closed,
#    that click is BLOCKED (empty menu), spinning to a 53s timeout (run 20260720T003818Z).
#    v2 fix (pitfall #8): keep `exact` for the SEAT (step 1) and the north hops (4-8), but
#    make the crossing step (3) a PLAIN GOTO to a tile PAST the door (3072,3096) instead of
#    onto the door tile -- one through-click during the still-open window. NAV-DIRECT still
#    cannot dogleg west-through-door-then-north, so the explicit waypoint stays; only the
#    door-tile target and the exact/plain choice on that one step changed.
# 3. Direct north paths from cooking are blocked by invisible fences -- hug the west edge (x=3072)
# 4. Navigate north in short (<=10-tile) hops, each with a plain GOTO + location await
# 5. Quest Guide dialogue has multiple "Click here to continue" screens. EXHAUST them
#    with a BLIND fixed-count `repeat: N` of KEY_PRESS space -- NOT `repeat_until:
#    no_dialogue`. The monologue transiently reports open=false BETWEEN pages
#    (DEFECT-24 mid-monologue false-close), so the check-first no_dialogue loop
#    stops after ONE press and the section stalls (live 2026-07-19).
# 6. Ladder gate (LIVE-CORRECTED 2026-07-19): the CORRECT sequence is
#    talk (10) -> exhaust intro (11) -> open journal (12) -> RE-TALK the guide (12b)
#    -> exhaust the post-journal completion monologue (12c) -> Climb-down (13).
#    The RE-TALK after the journal is open is MANDATORY: it triggers the "Now that
#    you have the quest list open..." completion monologue whose exhaustion is the
#    actual ladder gate. Without it the ladder returns "I don't think you're ready
#    to go down there yet" (the exact stall observed live before this fix). There is
#    NO "Quest Guide" dialogue OPTION to select -- widget 15138820 is the speaker-name
#    header, misreported as an option by the state writer (DEFECT-24). Do NOT add a
#    CLICK_DIALOGUE "Quest Guide" / CLICK_WIDGET 15138820 step: it is a silent no-op.
# 7. DOOR PINNING (user-proven method, 2026-07-19): in-game doors are IDENTICAL
#    objects -- their only defining feature is LOCATION. INTERACT_OBJECT has NO
#    coordinate/location qualifier (InteractObjectCommand.java parses only
#    <object_name> <action>; resolution is name-only nearest-match within 15 tiles).
#    Therefore EVERY door Open step must be immediately preceded by an exact GOTO
#    seat on that door's threshold/approach tile WITH a location await confirming
#    arrival -- the confirmed seat is what guarantees nearest-match resolves to the
#    intended door (steps 1->2 and 8->9 here). A coordinate-qualified INTERACT_OBJECT
#    is a candidate Java enhancement (interactWithGameObject(id, name, action,
#    WorldPoint) already exists internally, just not exposed as a command).
# 8. DOOR-CROSSING v2 (2026-07-20, run 20260720T003818Z, desk-verified with log
#    receipts): tutorial-island doors auto-close server-side ~5-7s after Open. Two
#    patterns lose that race, both fixed this date: (a) a redundant cross-section
#    double-open -- 05_cooking.yaml used to end by opening this same door, then this
#    file re-seated and re-opened it again in steps 1-2, burning ~10s of ceremony
#    while the door re-closed (fixed by deleting 05_cooking's trailing door-open
#    steps -- this file now owns the crossing exclusively); and (b) `exact`-GOTO ONTO
#    the door tile as the crossing step -- exact's per-hop "Walk here" refiner is
#    BLOCKED once the door re-closes, spinning to a 53s timeout (pitfall #2). THE FIX
#    PATTERN: exact seat on the threshold (doctrine unchanged) -> INTERACT Open ->
#    immediately (minimal delay_before/after) a PLAIN GOTO to a tile PAST the
#    threshold, never onto the door tile itself. Applied here to the cooking-exit
#    door (step 3, target 3072,3096) and the Quest Guide door (step 9b, target
#    3084,3121 -- the already-declared `quest_guide_npc` location, not invented).
#    Exact stays for SEATS; the through-step is always plain and targets beyond the
#    doorway. Prior art: the deleted Java `GateAction` (manny repo, `git show
#    34133c5^:tutorial_island/replay/GateAction.java`) was STATE-gated -- it checked
#    the gate's actual open/closed object ID and skipped the Open click if already
#    open. The durable future fix is a state-aware cross-door Java command that reads
#    door state directly instead of YAML timing ceremony; see MANNY_OVERSEER.md.
#
# After this routine:
# Player is underground in mining area at approximately (3088, 9520)
# Tutorial hint: "Mining and Smithing - Talk to the mining instructor"
# Ready for 07_mining_smithing.yaml
