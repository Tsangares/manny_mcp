#
# LADDER QUALIFIER (attempt #12 fix, same run): steps 2/3's `Ladder
# Climb-up`/`Climb-down` now also carry the `3123 3128` coordinate qualifier
# -- the same documented ladder tile the attempt #8 exact-seat fix (LADDER
# SEAT FIX above) was already built around, cited there as "the documented
# ladder (3123,3128)". Belt-and-suspenders: the qualifier alone would resolve
# nearest-match correctly among the three "Ladder" objects in range even
# without the seat, per the same doctrine that fixed the entry door above.
#
# PYTHON-SIDE CHECK (attempt #12 fix): `args` for INTERACT_OBJECT (and every
# other action) is a free-form string concatenated onto the command name and
# sent through unmodified (mcptools/tools/routine.py `_execute_step_once`:
# `command = f"{action} {args}".strip()`) -- no Python-side parsing/schema
# restricts its shape. `validate_routine_deep` (manny_tools.py
# `validate_routine_deep`) only special-cases GOTO's arg count; INTERACT_OBJECT
# args are unchecked. `dryrun.py`'s effect table matches on substrings
# ("Climb-up" in args, "Climb" in args) and never asserts arg count either.
# The trailing `[x y]` qualifier therefore requires ZERO Python-side changes --
# confirmed by reading, not assumed.
#
# WORKING PATTERNS:
# - Bank booth: INTERACT_OBJECT Bank_booth Use
# - Poll booth: INTERACT_OBJECT Poll_booth Use  (verb live-validated 2026-07-20)
# - Clear the poll message box: KEY_PRESS space (blind repeat), NOT CLICK_CONTINUE
# - Verify a tutorial stage: WAIT + await_condition tutorial_progress:>=N
# - Ambiguous-named objects (ladders, doors): coordinate-qualified
#   `INTERACT_OBJECT <name> <action> <x> <y>` (attempt #12 fix, jar >=
#   421c03e9) targets the object nearest that point regardless of decoys;
#   pair with an exact-mode seat adjacent to the SPECIFIC object,
#   location-await confirmed, as belt-and-suspenders before the interact.

