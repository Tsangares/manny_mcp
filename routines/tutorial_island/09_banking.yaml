# Tutorial Island - Part 9a: Banking (ladder, bank booth, poll booth)
# STATUS: VALIDATED (steps transcribed 2026-07-18 from
# journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md, Driver #4 ~01:55 PT --
# "BANK + ACCOUNT SECTIONS PASSED")
#
# This routine handles the Banking section:
# 1. Climb ladder to banking area (up then immediately down -- Tutorial Island
#    quirk: the bank entrance is only reachable via the roof)
# 2. Use bank booth
# 3. Use poll booth (auto-credits poll points)
#
# SECTION SPLIT (attempt #8, run 20260720T020701Z, 2026-07-20): this file used
# to also exit through the door to the Account Guide room, but that made a
# chain resume at progress 525 (poll booth already visited) wastefully re-run
# the whole ladder+bank+poll-booth leg for zero new progress -- see the
# LADDER SEAT FIX note below and 09_banking_to_account_guide.yaml (mirrors the
# 05/05b and 08/08b splits; 00_master.yaml progress_gate 525 for THIS file).
# The door-exit steps now live in 09_banking_to_account_guide.yaml.
#
# LADDER SEAT FIX (attempt #8, run 20260720T020701Z, 2026-07-20): live receipt
# -- account resumed at varp-281 progress 525 (poll booth already visited,
# from a prior attempt), the chain correctly re-ran this section from step 1
# (old gate was the section-end value 550, not the 525 this section itself
# produces -- see the split above), and step 2's ladder climb hit the
# AMBIGUOUS-NAME TRAP: three "Ladder" objects were in range; INTERACT_OBJECT's
# name-only nearest-match resolved to the ladder at (3116,3126) instead of
# this routine's documented ladder at (3123,3128). The click "succeeded" (a
# real ladder was climbed) but the plane never flipped to 1, so the honest
# `await_condition: plane:1` + `on_failure: abort` correctly stopped the run
# at the real fault instead of marching on desynced. Same identical-objects/
# location-is-identity problem as doors (9ade455) -- the fix is the same
# doctrine: seat in EXACT mode adjacent to the SPECIFIC object before
# INTERACT so nearest-match can only resolve to the intended object. New step
# 1b below seats at (3123,3127) -- not invented: it is the file's own
# `bank_roof`/`bank_floor` location (declared below, one tile due north of
# the ladder tile 3123,3128, used both after Climb-up and after Climb-down),
# derived here as the pre-climb approach tile between the door opened in
# step 1 (3124,3126) and the ladder itself.
#
# DRIVER #4 CONFIRMATION (defects log:214-244): "Route: Bank booth used (bank
# opened, 25gp) -> poll credit auto -> east door (3125,3124) -> Account Guide
# talks..." -- the exit_door coordinate (3125,3124) below is DIRECTLY
# confirmed by this run. Bank_booth/poll_booth coordinates were NOT
# re-transcribed with fresh numbers this run (driver validated by object
# name/action only); the pre-existing coordinates below are unchanged and not
# contradicted by anything in the journal.
#
# POLL-BOOTH FIX (attempt #8, 2026-07-20): the poll-booth message box is now
# cleared with a blind fixed-count SPACE drain (step 7) and the stage is proven
# by a WAIT tutorial_progress:>=525 gate (step 9) -- NOT by the interact's own
# success flag. Attempt #7 (run 20260720T014033Z) had no such gate: when the
# poll-booth interact failed it marched straight into the exit door's honest
# block. History of the drain: an even older step used the unsupported predicate
# `repeat_until: "poll_interface_open"`; a later edit switched it to
# `repeat_until: no_dialogue`, which can check-first false-close on a modal
# mesbox page (DEFECT-31, same class 08_combat.yaml fixed tonight). The blind
# drain + varp gate is the honest replacement. The engine DOES now implement a
# `tutorial_progress:>=N` await (mcptools/tools/monitoring.py _parse_condition).
#
# RISKS NOTED BUT NOT FIXABLE IN YAML (Java-side, deployment-frozen):
# - DEFECT-7: GOTO tolerance no-ops at distance <=3 tiles ("worse than
#   documented" per Driver #4 -- no-ops even at distance 3). Step 1b's ladder
#   seat GOTO (and the door-approach GOTO now in
#   09_banking_to_account_guide.yaml step 1) are short; await_condition
#   (location-based) is used to verify actual arrival rather than trusting
#   the GOTO command's own success flag.
# - DEFECT-11: INTERACT_OBJECT has no action-aware door filtering -- if an
#   open door and the target closed door are both in range, it can lock onto
#   the wrong one (blocked Driver #4's bank RE-ENTRY x3). This routine only
#   moves forward through each door once, so the failure mode Driver #4 hit
#   (backtracking) should not apply here, but is noted as a residual risk.
# - Doors on Tutorial Island auto-close behind the player (defects log:241) --
#   if this routine is ever resumed mid-section, re-verify door state before
#   assuming the ladder/door steps are no-ops.

name: "Tutorial Island - Banking (ladder / bank booth / poll booth)"
type: tutorial
phase: 9

# Key Locations
# NOTE: the Account Guide exit-door locations (exit_door_position 3124,3124 /
# exit_door 3125,3124) moved to 09_banking_to_account_guide.yaml with the
# steps that use them (SECTION SPLIT, see header).
locations:
  from_combat_ladder: {x: 3123, y: 3128, plane: 0}  # Ladder from combat area
  bank_roof: {x: 3123, y: 3127, plane: 1}           # After climbing up
  bank_floor: {x: 3123, y: 3127, plane: 0}          # After climbing down
  bank_booth: {x: 3120, y: 3123, plane: 0}
  poll_booth: {x: 3119, y: 3121, plane: 0}

# Key Objects
objects:
  bank_booth:
    name: "Bank booth"
    action: "Use"
  poll_booth:
    # VERB LIVE-VALIDATED 2026-07-20 (judeaislam/llama probe, run after attempt #7
    # 20260720T014033Z first ever reached this stage): SCAN_TILEOBJECTS on object
    # 26815 "Poll booth" @(3119,3121,0) returns actions=["Use"], and a live
    # INTERACT_OBJECT Poll_booth Use succeeded, opening the poll info mesbox and
    # (after the mesbox was cleared) advancing varp-281 520 -> 525.
    # HISTORY / receipts-rule correction: "Use" was a Jan-2026 DESK GUESS (1de0d2b,
    # then a TODO); the earlier "LIVE-VALIDATED 2026-07-19" note (be85665) only ever
    # validated the object NAME via a scan and NEVER clicked the verb -- the verb was
    # untested live until tonight. It happened to be correct. Name match is
    # substring so "Poll_booth" -> "Poll booth" is fine; verb match is exact
    # (case-insensitive); the id below is decorative (engine matches by name).
    name: "Poll_booth"
    id: 26815
    action: "Use"


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  # Phase 1: Navigate to banking area (DOOR-CROSSING v2 + coordinate-qualified
  # INTERACT_OBJECT -- see ENTRY-DOOR PIN FIX header note, attempt #12)
  - id: 1
    description: "Seat adjacent to the entry door (exact-mode seat)"
    action: GOTO
    args: "3123 3125 0 exact"
    await_condition: "location:3123,3125"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: |
      ENTRY-DOOR PIN FIX (attempt #12, run 20260720T043800Z): (3123,3125) is
      not invented -- it is the tile the failed run's own NAV-EXACT reached
      and stood on (confirmed walkable) one hop short of the real door,
      diagonally adjacent to the documented entry door (3124,3126) below.
      Multiple "Door" objects are in range (5 found live) -- this seat gets
      the player close before the coordinate-qualified Open (next step) does
      the actual disambiguation.

  - id: "1a"
    description: "Open entry door (coordinate-qualified -- targets the object nearest (3124,3126), not name-only nearest-player)"
    action: INTERACT_OBJECT
    args: "Door Open 3124 3126"
    delay_before_ms: 1000
    notes: |
      Door at (3124, 3126) blocks access to ladder. FIX (attempt #12, run
      20260720T043800Z): the un-qualified 2-arg form resolved name-only
      nearest-match to the WRONG door at (3118,3124) -- 5 "Door" TileObjects
      were within 15 tiles (journals/2026-07-20_tutorial_attempt12_
      malikreyes_llama.md, Verdict 3). The `[x y]` qualifier (jar >=
      421c03e9, manny 7f42b54, COMMAND_REFERENCE.md "Optional coordinate
      qualifier") targets the object NEAREST THAT POINT instead, pinning
      this interact to the documented (3124,3126) door regardless of decoys.
      DOOR-CROSSING v2: no delay_after padding -- minimize the gap before the
      through-walk (next step) so the crossing lands during the still-open
      window.

  - id: "1b"
    description: "Through-walk PAST the threshold to the bank floor / ladder seat (plain GOTO, not onto the door tile itself)"
    action: GOTO
    args: "3123 3127 0"
    await_condition: "location:3123,3127"
    timeout_ms: 60000
    delay_before_ms: 500
    on_failure: "retry:2"
    notes: |
      DOOR-CROSSING v2 (attempt #12 rework; mirrors 09_banking_to_
      account_guide.yaml / 10_prayer_magic.yaml): a PLAIN GOTO (not exact)
      straight to (3123,3127) -- this file's own `bank_roof`/`bank_floor`
      location, one tile due north of the ladder tile (3123,3128), walkable
      on both planes -- crosses the door with one through-click during the
      still-open window. Was exact-mode in the attempt #8 LADDER SEAT FIX
      (see header) to pin ladder identity via seat precision; that duty now
      belongs to the ladder's OWN coordinate qualifier (steps 2/3 below), so
      exact mode (whose per-hop refiner BLOCKS once a door re-closes,
      ~5-7s after Open) is no longer needed or safe here.

  - id: 2
    description: "Climb ladder up to roof (abort -- don't march to descent having never left plane 0)"
    action: INTERACT_OBJECT
    args: "Ladder Climb-up 3123 3128"
    await_condition: "plane:1"
    on_failure: abort
    timeout_ms: 15000
    delay_before_ms: 1000
    notes: |
      Ladder at (3123, 3128). Coordinate-qualified (attempt #12 fix,
      COMMAND_REFERENCE.md "Optional coordinate qualifier") on top of the
      step-1b seat -- belt-and-suspenders against the three "Ladder" objects
      documented in range (LADDER SEAT FIX above, attempt #8).

  - id: 3
    description: "Climb ladder down to bank floor"
    action: INTERACT_OBJECT
    args: "Ladder Climb-down 3123 3128"
    await_condition: "plane:0"
    timeout_ms: 15000
    delay_before_ms: 1000
    notes: |
      Climb down immediately after climbing up -- bank booth is on plane 0.
      Coordinate-qualified (attempt #12 fix) to the same documented ladder
      tile (3123,3128) as step 2 -- same object, same pin.

  # Phase 2: Use bank
  - id: 4
    description: "Use bank booth"
    action: INTERACT_OBJECT
    args: "Bank_booth Use"
    delay_before_ms: 1500
    notes: "Opens bank interface, tutorial dialogue appears. Driver #4 confirmed: bank opens with 25gp."

  - id: 5
    description: "Close bank interface"
    action: KEY_PRESS
    args: "Escape"
    delay_before_ms: 500
    delay_after_ms: 800
    notes: "delay_after settle so the bank window (and any bank tutorial mesbox) is fully closed before the poll-booth right-click menu is built -- a lingering modal is the most likely cause of attempt #7's 'Use not found'."

  # Phase 3: Use poll booth (varp 520 -> 525)
  - id: 6
    description: "Use poll booth (opens the poll info message box; credits the poll)"
    action: INTERACT_OBJECT
    args: "Poll_booth Use"
    on_failure: "retry:2"
    delay_before_ms: 1000
    notes: |
      Verb "Use" LIVE-VALIDATED 2026-07-20 (judeaislam/llama probe): actions=["Use"]
      on object 26815 and INTERACT_OBJECT Poll_booth Use succeeded, opening the
      "Poll booths are found in towns across the world..." mesbox. on_failure retry:2
      (plus the engine's own 3x menu retries) covers a transient bad-angle/closing-
      modal miss; step 9's WAIT gate is the honest backstop if it truly fails.

  - id: 7
    description: "Clear the poll-booth message box (blind space drain)"
    action: KEY_PRESS
    args: "space"
    repeat: 5
    delay_before_ms: 1000
    notes: |
      DEFECT-31/DEFECT-24 pattern (cf. 08_combat.yaml step 3): a check-first
      `repeat_until: no_dialogue` can false-close on a modal mesbox page and stop
      early, so this is a blind fixed-count drain instead. Live probe: the mesbox
      took ~3 space presses to close and credit the poll (CLICK_CONTINUE did NOT
      advance it -- SPACE did); varp then read 525 with the dialogue closed. Extra
      presses after close are inert on Tutorial Island.

  - id: 8
    description: "Close any residual interface (belt-and-suspenders no-op)"
    action: KEY_PRESS
    args: "Escape"
    delay_before_ms: 500
    notes: "The tutorial poll booth opens only an info mesbox (voting needs a higher level than the isle allows), so the space drain already closes everything; this Escape is a proven-benign safety close."

  # Phase 4 (section end): Verify the poll booth registered.
  # SECTION SPLIT (attempt #8, 20260720T020701Z): the door-crossing steps that
  # used to follow here (walk to 3124,3124 / open door at 3125,3124) now live
  # in 09_banking_to_account_guide.yaml -- this WAIT is this file's LAST step
  # and its own progress_gate value (00_master.yaml: 525) for the chain.
  - id: 9
    description: "VERIFY the poll booth was visited -- varp advanced to 525"
    action: WAIT
    await_condition: "tutorial_progress:>=525"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Wiki varp-281 ladder: 520 = "Close Bank and open Poll Booth", 525 =
      "WalkIntoDoorAccountGuide". Reaching 525 proves the poll booth was actually
      used -- the exit door (now 09_banking_to_account_guide.yaml step 1/2)
      honestly blocks ("You need to visit the poll booth before you can proceed
      through this door") until varp hits 525, which is exactly where attempt #7
      got stuck after a false-march. If the poll-booth use failed, varp stays
      520, this WAITs to timeout, and the section aborts honestly (strict_steps)
      at the REAL fault instead of the downstream door. This is also this
      file's progress_gate (00_master.yaml) -- a chain resume with progress
      >=525 skips this whole ladder+bank+poll-booth section as already done.

# PITFALLS DISCOVERED:
