# 4. Progress does NOT advance on the INTERACT alone -- it advances to 525 only
#    after the message box is cleared. Gate on tutorial_progress:>=525 (step 9),
#    not on the interact's own success flag (attempt #7's false-march lesson).
# 5. AMBIGUOUS-NAME LADDER TRAP (attempt #8, run 20260720T020701Z, 2026-07-20):
#    the ladder INTERACT resolves name-only nearest-match against THREE "Ladder"
#    objects in range; an un-seated click can silently climb the wrong one (a
#    real ladder, honest plane:1 await/abort caught the desync). FIX (attempt #8):
#    step 1b seated exact-mode at (3123,3127) -- adjacent to the documented
#    ladder (3123,3128) -- immediately before the interact. SUPERSEDED (attempt
#    #12): step 1b is now a plain through-walk (door-crossing v2) and steps 2/3
#    instead carry their own `3123 3128` coordinate qualifier -- same doctrine
#    (location is identity for identical objects, 9ade455), applied via the
#    qualifier instead of seat precision.
# 6. The exit door (now 09_banking_to_account_guide.yaml) honestly blocks until
#    varp 525 ("You need to visit the poll booth before you can proceed through
#    this door"). Step 9's WAIT gate catches a failed poll-booth use at the real
#    fault instead of the door.
# 7. ENTRY-DOOR AMBIGUITY (attempt #12, run 20260720T043800Z, 2026-07-20): the
#    entry door (step 1a, this file's Phase 1) had the SAME identical-objects
#    trap as the ladder -- 5 "Door" objects in range, name-only nearest-match
#    picked the wrong one at first contact. FIX: exact seat (step 1) +
#    coordinate-qualified `INTERACT_OBJECT Door Open 3124 3126` (step 1a). See
#    ENTRY-DOOR PIN FIX note below for the full receipt.

# ENTRY-DOOR PIN FIX (attempt #12, run 20260720T043800Z, 2026-07-20): s09a's
# FIRST EVER live contact found step 1's un-seated `INTERACT_OBJECT Door Open`
# resolved name-only nearest-match to the WRONG door -- log: "Found 5
# TileObjects matching 'Door' within 15 tiles", resolved to (3118,3124)
# instead of this file's own documented entry door (3124,3126) (see step 1's
# original notes / this header's Phase-1 comment history). The walk failed,
# the (then-exact) ladder seat GOTO was unreachable through the still-closed
# real door (player stuck at (3123,3125) after 16 exhausted hops), and the
# ladder Climb-up queued into the new jar's [MODAL-BLOCK] "I can't reach
# that!" diagnostic -- honest abort at the real fault (journals/2026-07-20_
# tutorial_attempt12_malikreyes_llama.md, Verdict 3; screenshot journals/
# images/2026-07-20_malikreyes_s09a_wrong_door_modal.png).
#
# FIX: door-crossing v2 (see 09_banking_to_account_guide.yaml header) PLUS
# the new coordinate-qualified INTERACT_OBJECT (jar >= 421c03e9, manny commit
# 7f42b54, COMMAND_REFERENCE.md "Optional coordinate qualifier": `args: "<name>
# <action> [x y]"` targets the object NEAREST THAT POINT instead of
# nearest-to-player). Step 1 now seats exact-mode at (3123,3125) -- not
# invented: the tile the failed run's own NAV-EXACT reached and confirmed
# walkable one hop short of the door (attempt #12 receipt above), diagonally
# adjacent to the documented door (3124,3126) -- before a coordinate-qualified
# `INTERACT_OBJECT Door Open 3124 3126` (step 1a) pins the correct door
# regardless of how many decoys are in range. The former ladder-seat step
# (old 1b, exact mode) is now a PLAIN through-walk to the same (3123,3127)
# bank_floor/bank_roof tile (door-crossing v2: never exact onto/through a
# door that may auto-close mid-path) -- disambiguation duty for the ladder
