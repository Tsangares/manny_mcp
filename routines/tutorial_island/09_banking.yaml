# 2. Poll booth VERB is "Use" -- LIVE-VALIDATED 2026-07-20 (judeaislam/llama probe:
#    scan actions=["Use"]; live INTERACT advanced varp 520->525). It was a Jan-2026
#    desk guess; the earlier "LIVE-VALIDATED 2026-07-19" note only ever validated
