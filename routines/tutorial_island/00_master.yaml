# Tutorial Island - MASTER CHAIN
# Runs the section routines 01 -> 10 in order as a single command:
#
#     ./run_routine.py routines/tutorial_island/00_master.yaml --account <acct>
#
# (A directory also works: `./run_routine.py routines/tutorial_island/` globs the
#  sections in sorted order, skipping this master and widget_reference.yaml.)
#
# SCOPE NOTE (2026-07-18, updated): this file wires the ENGINE + chain so the
# tutorial is runnable as one command. Sections 01-06 are directionally
# runnable. Sections 07-10 have now had the manual-drive knowledge from
# journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md (Drivers #1-#5, full island
# clear) transcribed into their YAMLs: real/confirmed coordinates, the
# combat-section exit-gate route, state-checked repeat_until awaits (mirroring
# 04's cook-shrimp fix) in place of blind delays, and the DEFECT-13 Home
# Teleport widget-id workaround (CLICK_WIDGET 14286854, not CAST_SPELL/
# TELEPORT_HOME). Two still-open Java-side plugin defects remain
# workaround-only (cannot be fixed from YAML, deployment-frozen):
# DEFECT-7 (GOTO short-move tolerance no-ops -- worked around here via
# location-based await_condition instead of trusting GOTO's own success flag)
# and DEFECT-11 (INTERACT_OBJECT has no action-aware door filtering -- a risk
# only if a section ever backtracks through a door it already opened). See
# journals/TUTORIAL_ROUTINE_READINESS_2026-07-18.md for the original gap
# analysis and journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md for the source
# driver logs these sections were transcribed from.
#
# progress_hint: metadata ONLY (section ordinal). Records the Tutorial-progress
# stage each section starts at (tutorial progress widget group 263). The chain
# runner LOGS it but does not gate on it.
#
# progress_gate: ACTIVE stage-gate (2026-07-19). The game-truth value of
# varplayer/varbit 281 ("Tutorial Island progress", exported by the plugin as
# state.tutorial.progress, 0..1000, 1000 == complete) at which the section is
# COMPLETE. run_chain reads the live progress before each section and SKIPS the
# section when progress >= its gate -- so a resume of 00_master is idempotent
# (already-cleared sections are skipped, not blindly re-run). Gates are
# monotonic section-END values, so a fresh run from 0 never skips. Absent
# tutorial section (old jar) or null progress (logged out) => no skip (safe).
#
# Varplayer-281 stage values are from the OSRS wiki (RuneScape:Varplayer/281,
# cross-checked against Tutorial_Island). Documented checkpoints and their events:
#   Gielinor Guide (1-10):   1 customization, 2/3 guide+settings, 7 guide convo,
#                            10 exit guide area.
#   Survival Expert (20-120): 20 meet expert, 30 open inventory, 40 fish,
#                            50 open skills tab, 60 woodcutting intro, 70 cut tree,
#                            80 make fire, 90 cook shrimp, 120 exit survival area
#                            (through the gate).
#   Master Chef (130-170):   130 enter kitchen (2nd building), 140 chef convo,
#                            150 make bread dough, 160 cook bread, 170 exit kitchen.
#   Quest Guide (200-240) -> Mining/Smithing (250-360) -> Combat (370-500) ->
#   Banking (510-540) -> Prayer/Brother Brace (550-610) -> Magic (620-670) ->
#   1000 tutorial complete.
#
# GATE INVARIANT (the fix, 2026-07-19 attempt #4 diagnosis): each section's
# progress_gate is the varp-281 value reached ONLY AT/AFTER that section is
# fully COMPLETE, and strictly ABOVE the max progress any PRIOR section drives a
# fresh account to. This guarantees: (1) a fresh run from 0 never skips a section
# (each gate > cumulative prior progress), and (2) a resume skips a section only
# once the game proves it finished. Erring the gate HIGH only re-runs a section
# (safe); erring it LOW -- below what earlier sections already reach -- WRONGLY
# skips, which is exactly what stranded attempts #3 and #4.
#
# THE DEFECT THIS FIXES: 05_cooking.yaml is the MASTER CHEF (2nd building,
# 130-170), NOT a sub-split of the Survival Expert. Its old gate 120 was the
# Survival-Expert EXIT value, which sections 03+04 already drive a fresh account
# to (observed live: progress 130 after section 04 -- attempt #3 journal +
# metrics_first_contact.csv "gate-skipped-progress130>=120"). So on a FRESH run
# the chain skipped Master Chef, leaving the player OUTSIDE the kitchen while
# 05b assumes it is INSIDE (fresh from cooking) -> minimap follower can't cross
# the compound fence -> nav trap at (3078,3097). Fixed: 05 gate 120->170 (Master
# Chef exit). 04 gate also corrected 80->120 (make-fire=80 is mid-section, not
# 04's completion; 04 finishes only when the player is through the survival gate
# = 120), so a resume can't wrongly skip 04 at progress 90-119 either. Every
# gate's source is annotated inline below (wiki stage vs live-observed).

name: "Tutorial Island - Master Chain (01 -> 10)"
type: chain
category: tutorial_island

chain:
  - routine: 01_character_creation.yaml
    description: "Section 1: Character creation"
    progress_hint: 0
    progress_gate: 3        # wiki: customization done (1-3). Prior progress 0 < 3.
  - routine: 01_experience_selection.yaml
    description: "Section 1b: Experience-mode selection"
    progress_hint: 1
    progress_gate: 7        # wiki: guide convo (7). Prior (01) ~3 < 7.
  - routine: 02_gielinor_guide.yaml
    description: "Section 2: Gielinor Guide"
    progress_hint: 2
    progress_gate: 20       # wiki: meet Survival Expert (20) = Gielinor Guide done. Prior ~7 < 20; obs 20.
  - routine: 03_survival_expert.yaml
    description: "Section 3: Survival Expert (fishing/fire/cooking)"
    progress_hint: 3
    progress_gate: 50       # wiki: open skills tab (50) = 03's last step. Prior (02) 20 < 50.
  - routine: 04_woodcutting_firemaking.yaml
    description: "Section 4: Woodcutting + Firemaking"
    progress_hint: 4
    progress_gate: 120      # FIX 80->120. wiki: exit survival area via gate (120) = 04's last step (make-fire=80 is mid-section). Prior (03) 50 < 120; obs fresh acct reads 120-130 after 04.
  - routine: 05_cooking.yaml
    description: "Section 5: Cooking (Master Chef / 2nd building)"
    progress_hint: 5
    progress_gate: 170      # FIX 120->170. wiki: exit Master Chef kitchen (170). Old 120 was the Survival-Expert exit that section 04 already reaches (obs 130) -> DEFECT wrongly skipped Master Chef on a fresh run. Prior (04) 130 < 170.
  - routine: 05_cooking_to_quest_guide.yaml
    description: "Section 5b+6: Cooking exit -> Quest Guide -> ladder down to mining"
    progress_hint: 5
    progress_gate: 250      # wiki: climb down ladder to mine (250) = 05b's last step. Prior (05) 170 < 250.
  # DOUBLE-RUN FIX (2026-07-18, Track D): 06_quest_guide.yaml is DELIBERATELY NOT
  # chained here. 05_cooking_to_quest_guide.yaml is the newer, merged bridge that
  # ALREADY performs the ENTIRE Quest Guide segment end to end -- it navigates
  # from the cooking exit to the Quest Guide building (via the validated
  # west-first route around the invisible fences), talks to the Quest Guide,
  # opens the Quest Journal tab, selects the "Quest Guide" dialogue option
  # (widget 15138820), and climbs DOWN the ladder into the underground mining
  # area (its own header even says "06_quest_guide.yaml (now merged into this
  # file)"). Chaining 06 after it re-ran that whole segment on a player who is
  # already underground: 06's naive direct-north re-navigation (which the bridge
  # was written to avoid) plus a SECOND ladder interaction desynced the
  # Tutorial-progress gate (widget group 263) and hung. 06 is kept on disk only
  # as the standalone reference for the Quest Guide dialogue flow.
  # --- Sections 07-10 gated on Wave 6 plugin fixes (see SCOPE NOTE) ---
  - routine: 07_mining_smithing.yaml
    description: "Section 7: Mining + Smithing"
    progress_hint: 7
    progress_gate: 370      # wiki: combat section starts (370) = mining/smithing done. Prior (05b) 250 < 370.
  # SPLIT 2026-07-20 (attempt #6, judeaislam): section 08 is now two chain
  # sections (mirroring 05 / 05b) so a restart is idempotent by this gate
  # mechanism, not a nonexistent per-step skip. See 08_combat.yaml header.
  # ROOT CAUSE (attempt #6 live transcript journals/2026-07-20_tutorial_attempt6_judeaislam_llama.md
  # + OSRS wiki varp-281 table): the combat section is a STRICT varp-gated action
  # ladder. The wiki (same source as the 120/170/250 gates) documents it exactly:
  #   370 talk Vannaka -> 390 open equipment tab -> 400 open equipment STATS ->
  #   405 equip Bronze dagger -> 410 exit interface + talk Vannaka (get sword/
  #   shield) -> 420 equip Wooden shield + Bronze sword -> 430 open combat styles
  #   tab -> 440 enter Rat cage -> 450 attack (melee) -> 460/470 rat dies+exit+
  #   talk -> 480 equip Shortbow+arrows+attack (ranged) -> 490/500 rat dies+exit
  #   -> 510 open bank.
  # The live run WEDGED at 400: it opened the worn-equipment TAB (390->400) then
  # equipped the dagger, but stage 400 wants the equipment-STATS panel opened
  # first -- an equip at 400 is a proven no-op (unequip/re-equip experiment kept
  # varp at 400). The missing "open equipment stats" action (400->405) is now
  # restored in 08_combat.yaml and every stage carries a wiki-varp verify-gate.
  - routine: 08_combat.yaml
    description: "Section 8a: Combat (equipment interface + dagger)"
    progress_hint: 8
    progress_gate: 410      # wiki varp-281: dagger equipped advances 405->410 ("exit interface + talk Vannaka"). 08a is complete once the dagger is equipped (progress 410). Prior (07) 370 < 410. A restart at the 400 wedge (<410) RE-RUNS 08a, which opens equipment stats then equips.
  - routine: 08_combat_sword_ranged.yaml
    description: "Section 8b: Combat (sword/shield, melee, bow, ranged, exit)"
    progress_hint: 8
    progress_gate: 510      # wiki varp-281: banking starts (510) = combat done. Prior (08a) 410 < 510.
  # SPLIT 2026-07-20 (attempt #8, run 20260720T020701Z): section 09 is now two
  # chain sections (mirroring 05/05b and 08a/08b) so a restart at progress 525
  # (poll booth already visited) is idempotent by this gate mechanism instead
  # of wastefully re-running the whole ladder+bank+poll-booth leg. ROOT CAUSE:
  # the old single-file gate was 550 (the Prayer/Brother Brace boundary), a
  # value 09_banking.yaml's own steps can never produce (Prayer is driven by
  # 10_prayer_magic.yaml) -- a resume at 525 therefore always saw 525 < 550
  # and re-ran the entire section from step 1, where the (co-discovered)
  # ladder ambiguous-name trap then hit: three "Ladder" objects in range,
  # un-seated INTERACT_OBJECT resolved to a decoy at (3116,3126) instead of
  # the documented ladder (3123,3128), caught by the honest plane:1 abort.
  # See 09_banking.yaml header for the ladder-seat fix.
  - routine: 09_banking.yaml
    description: "Section 9a: Banking (ladder, bank booth, poll booth)"
    progress_hint: 9
    progress_gate: 525      # wiki: "WalkIntoDoorAccountGuide" (525) = this section's own last action (poll booth visited, step 9 WAIT). Prior (08b) 510 < 525.
  - routine: 09_banking_to_account_guide.yaml
    description: "Section 9b: Banking exit -> Account Guide door"
    progress_hint: 9
    progress_gate: 530      # live receipt (attempt #8, run 20260720T020701Z, supervisor salvage): GOTO 3124,3124 + Door Open advances varp 525->530 -- the value THIS section's own door crossing produces (mirrors 05b/08b: gate == section's own proven output, not the next section's 550 Prayer boundary, which 10_prayer_magic.yaml drives). Prior (09a) 525 < 530.
  # SPLIT 2026-07-20 (attempt #18, malikreyes/llama, run 20260720T060923Z):
  # section 10 is now two chain sections (mirroring 05/05b, 08a/08b, 09a/09b)
  # so a restart at progress 550 is idempotent by this gate mechanism instead
  # of re-running the Account Guide ceremony. ROOT CAUSE: attempt #18 was the
  # first run to START section 10 at varp 550 (a mid-section resume). The old
  # single file re-ran its Phase 1-4 Account Guide steps unconditionally, and
  # step 1's exact re-seat at (3124,3124) -- the west-door threshold INSIDE the
  # bank building -- is UNREACHABLE from a 550 park outside it: the pathfinder
  # wedged at (3127,3129) against the north wall (8/8 exact hops hit empty
  # "Cancel" menus), honest DEFECT-27 + strict_steps abort. See 10_prayer_
  # magic.yaml / 10b_prayer_magic_boat.yaml headers + journals/2026-07-20_
  # tutorial_attempt18_malikreyes_llama.md. FIX: gate 10a at 550 so a resume at
  # >=550 SKIPS the Account Guide half and enters 10b at its outdoor chapel
  # approach (open-ground plain GOTO, reachable from any 550 park).
  - routine: 10_prayer_magic.yaml
    description: "Section 10a: Account Guide (tab click, east-door exit)"
    progress_hint: 10
    progress_gate: 550      # 10a's own last action: the east-door crossing advances varp 540->550 (step 15 verify gate, live receipt attempt #8). Prior (09b) 530 < 550. A resume at >=550 skips 10a (Account Guide already credited) and enters 10b directly, avoiding the unreachable west-door re-seat (attempt #18). Mirrors the 05b/08b/09b pattern: gate == what the section's own final action proves.
  - routine: 10b_prayer_magic_boat.yaml
    description: "Section 10b: Prayer/Brother Brace, Magic/Wind Strike, Ironman decline, mainland exit"
    progress_hint: 10
    progress_gate: 1000     # wiki: tutorial complete (1000). Prior (10a) 550 < 1000. Entry varp 550; opening nav (step 16) is plain GOTO to the outdoor chapel waypoint, reachable from any 550 park.
