# Tutorial Island - MASTER CHAIN
# Runs the section routines 01 -> 10 in order as a single command:
#
#     ./run_routine.py routines/tutorial_island/00_master.yaml --account <acct>
#
# (A directory also works: `./run_routine.py routines/tutorial_island/` globs the
#  sections in sorted order, skipping this master and widget_reference.yaml.)
#
# SCOPE NOTE (2026-07-18, updated): this file wires the ENGINE + chain so the
# tutorial is runnable as one command. Sections 01-06 are directionally
# runnable. Sections 07-10 have now had the manual-drive knowledge from
# journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md (Drivers #1-#5, full island
# clear) transcribed into their YAMLs: real/confirmed coordinates, the
# combat-section exit-gate route, state-checked repeat_until awaits (mirroring
# 04's cook-shrimp fix) in place of blind delays, and the DEFECT-13 Home
# Teleport widget-id workaround (CLICK_WIDGET 14286854, not CAST_SPELL/
# TELEPORT_HOME). Two still-open Java-side plugin defects remain
# workaround-only (cannot be fixed from YAML, deployment-frozen):
# DEFECT-7 (GOTO short-move tolerance no-ops -- worked around here via
# location-based await_condition instead of trusting GOTO's own success flag)
# and DEFECT-11 (INTERACT_OBJECT has no action-aware door filtering -- a risk
# only if a section ever backtracks through a door it already opened). See
# journals/TUTORIAL_ROUTINE_READINESS_2026-07-18.md for the original gap
# analysis and journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md for the source
# driver logs these sections were transcribed from.
#
# progress_hint: metadata ONLY (section ordinal). Records the Tutorial-progress
# stage each section starts at (tutorial progress widget group 263). The chain
# runner LOGS it but does not gate on it.
#
# progress_gate: ACTIVE stage-gate (2026-07-19). The game-truth value of
# varplayer/varbit 281 ("Tutorial Island progress", exported by the plugin as
# state.tutorial.progress, 0..1000, 1000 == complete) at which the section is
# COMPLETE. run_chain reads the live progress before each section and SKIPS the
# section when progress >= its gate -- so a resume of 00_master is idempotent
# (already-cleared sections are skipped, not blindly re-run). Gates are
# monotonic section-END values, so a fresh run from 0 never skips. Absent
# tutorial section (old jar) or null progress (logged out) => no skip (safe).
#
# Varbit-281 stage values are from the OSRS wiki (RuneScape:Varplayer/281). The
# documented checkpoint list is 1,2,3,7,10,20,30,40,50,60,70,80,90,120,130,140,
# 150,160,170,200,220,230,240,250,260,300,310,320,330,340,350,360,370,...,500,
# 510,520,...,540,550,...,610,620,...,670,1000. Instructor-transition bands:
# Gielinor Guide 1-10, Survival Expert 20-120, Master Chef 130-170, Quest Guide
# 200-240, Mining Instructor 250-360, Combat 370-500, Banking 510-540, Brother
# Brace/prayer 550-610, Magic Instructor 620-670, completion 1000. The
# per-section gates below map each routine to the varbit value at which its next
# section begins. The Survival-Expert sub-splits (03/04/05: fishing~50,
# woodcut+fire~80, cook-shrimp+gate~120) are best-estimate within the 20-120
# band; erring high only re-runs a section (safe), never wrongly skips.

name: "Tutorial Island - Master Chain (01 -> 10)"
type: chain
category: tutorial_island

chain:
  - routine: 01_character_creation.yaml
    description: "Section 1: Character creation"
    progress_hint: 0
    progress_gate: 3
  - routine: 01_experience_selection.yaml
    description: "Section 1b: Experience-mode selection"
    progress_hint: 1
    progress_gate: 7
  - routine: 02_gielinor_guide.yaml
    description: "Section 2: Gielinor Guide"
    progress_hint: 2
    progress_gate: 20
  - routine: 03_survival_expert.yaml
    description: "Section 3: Survival Expert (fishing/fire/cooking)"
    progress_hint: 3
    progress_gate: 50
  - routine: 04_woodcutting_firemaking.yaml
    description: "Section 4: Woodcutting + Firemaking"
    progress_hint: 4
    progress_gate: 80
  - routine: 05_cooking.yaml
    description: "Section 5: Cooking"
    progress_hint: 5
    progress_gate: 120
  - routine: 05_cooking_to_quest_guide.yaml
    description: "Section 5b+6: Cooking exit -> Quest Guide -> ladder down to mining"
    progress_hint: 5
    progress_gate: 250
  # DOUBLE-RUN FIX (2026-07-18, Track D): 06_quest_guide.yaml is DELIBERATELY NOT
  # chained here. 05_cooking_to_quest_guide.yaml is the newer, merged bridge that
  # ALREADY performs the ENTIRE Quest Guide segment end to end -- it navigates
  # from the cooking exit to the Quest Guide building (via the validated
  # west-first route around the invisible fences), talks to the Quest Guide,
  # opens the Quest Journal tab, selects the "Quest Guide" dialogue option
  # (widget 15138820), and climbs DOWN the ladder into the underground mining
  # area (its own header even says "06_quest_guide.yaml (now merged into this
  # file)"). Chaining 06 after it re-ran that whole segment on a player who is
  # already underground: 06's naive direct-north re-navigation (which the bridge
  # was written to avoid) plus a SECOND ladder interaction desynced the
  # Tutorial-progress gate (widget group 263) and hung. 06 is kept on disk only
  # as the standalone reference for the Quest Guide dialogue flow.
  # --- Sections 07-10 gated on Wave 6 plugin fixes (see SCOPE NOTE) ---
  - routine: 07_mining_smithing.yaml
    description: "Section 7: Mining + Smithing"
    progress_hint: 7
    progress_gate: 370
  - routine: 08_combat.yaml
    description: "Section 8: Combat"
    progress_hint: 8
    progress_gate: 510
  - routine: 09_banking.yaml
    description: "Section 9: Banking"
    progress_hint: 9
    progress_gate: 550
  - routine: 10_prayer_magic.yaml
    description: "Section 10: Prayer + Magic (exit Tutorial Island)"
    progress_hint: 10
    progress_gate: 1000
