# Tutorial Island - Part 8a: Combat (equipment interface + dagger)
# STATUS: REBUILT 2026-07-20 (attempt #6, judeaislam) against the OSRS wiki
# varp-281 action ladder + the attempt-#6 live transcript
# (journals/2026-07-20_tutorial_attempt6_judeaislam_llama.md).
#
# WHY THIS WAS REBUILT -- the varp-400 wedge, fully explained:
# The combat section is a STRICT varp-281-gated action ladder. The OSRS wiki
# (RuneScape:Varplayer/281 -- the SAME source the 120/170/250 gates came from)
# documents the exact sequence; the relevant slice for THIS sub-section is:
#   370  talk to Vannaka (Combat Instructor)      -> 390
#   390  open the equipment (Worn) tab            -> 400
#   400  open the equipment STATS panel           -> 405   <-- the missing action
#   405  equip the Bronze dagger                  -> 410
#   410  exit the interface + talk to Vannaka     -> 420 (handled in 08b)
# The attempt-#6 live run WEDGED at 400: it opened the worn-equipment TAB
# (390->400) and then equipped the dagger -- but stage 400 is waiting for the
# equipment-STATS panel to be opened, NOT for an equip. A live experiment proved
# it decisively: with varp at 400, a clean unequip + canonical re-equip of the
# dagger kept varp AT 400 (equip events do not advance stage 400). The old YAML
# had NO "open equipment stats" step, so it could never leave 400. Prior art
# confirms the missing action existed once: the old Driver #2
# (journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md:145) did "equipment tab +
# equip-stats panel + dagger equip (via panel)".
#
# THE ENCODING (per overseer directive): each stage does its wiki-documented
# action, then a WAIT gate VERIFIES varp-281 advanced to the expected band before
# the next action (the Quest-Guide arming pattern, 05b step 12f). A wrong/failed
# action therefore ABORTS HONESTLY at its verify gate instead of silently wedging
# -- strict_steps turns that into a chain stop the overseer/watchdog catches.
#
# SPLIT (mirrors 05 / 05b): section 08 is two chain sections so a restart is
# idempotent via the EXISTING progress_gate mechanism (00_master.yaml), not a
# nonexistent per-step skip. THIS file = the equipment-interface + dagger ladder
# (master gate 410 = dagger equipped). 08_combat_sword_ranged.yaml = everything
# after (master gate 510). A restart at the 400 wedge (<410) RE-RUNS this file,
# which this time opens the equipment-stats panel and clears the wedge.
#
# ONE OFFLINE-UNVERIFIABLE PIECE (flagged, self-verified): the exact widget for
# the "View equipment stats" button is not recorded anywhere offline (the journals
# document the panel's BEHAVIOUR -- dynamic -1,-1-bounds widgets, close with
# Escape -- but no widget id). Step 7 opens it with a text-matched click_widget;
# its verify gate (step 8, WAIT tutorial_progress:>=405) is what actually proves it
# worked. If a live find_widget shows a different handle, only step 7's args change.

name: "Tutorial Island - Combat (equipment interface + dagger)"
type: tutorial
phase: 8

# Key NPCs
npcs:
  combat_instructor:
    name: "Combat Instructor"   # Vannaka
    id: 3307
    location: {x: 3104, y: 9508, plane: 0}

# Key Locations
locations:
  combat_area_entrance: {x: 3104, y: 9509, plane: 0}

# Key Widgets
widgets:
  equipment_tab: 35913771       # find_and_click_widget(text="Worn Equipment") -- VALIDATED
  inventory_tab: 35913795       # Action "Inventory"


# STRICT-STEPS honesty gate: any failed step marks this SECTION failed so the
# master chain STOPS instead of false-passing into the next section on a desynced
# game. Every varp verify gate below relies on this to convert a stalled stage
# into an honest chain stop.
config:
  strict_steps: true

steps:
  # Phase 0: re-anchor (mining section 07 ends on an untranscribed waypoint).
  - id: 1
    description: "Walk to Combat Instructor / rat-cage entrance"
    action: GOTO
    args: "3104 9509 0"
    delay_before_ms: 500
    await_condition: "location:3104,9509"
    timeout_ms: 120000

  # --- Stage 370 -> 390: talk to Vannaka (receives the bronze dagger) ---
  - id: 2
    description: "Talk to Combat Instructor (Vannaka) -- stage 370"
    action: INTERACT_NPC
    args: "Combat_Instructor Talk-to"
    await_condition: "dialogue"
    on_failure: "retry:2"
    notes: "Player receives the bronze dagger during this dialogue."

  - id: 3
    description: "Advance the handover dialogue -- blind Space drain"
    action: KEY_PRESS
    args: "Space"
    repeat: 8
    delay_before_ms: 700
    notes: |
      DEFECT-31/DEFECT-24: was `repeat_until: no_dialogue`, which check-first
      no-ops on a modal/false-closed page. Blind fixed-count drain instead
      (journals/2026-07-19_tutorial_0810_hardening.md root pattern #1). Extra
      presses after the dialogue closes are inert on Tutorial Island.

  - id: 4
    description: "VERIFY varp advanced to the 'open equipment tab' stage (>=390)"
    action: WAIT
    await_condition: "tutorial_progress:>=390"
    timeout_ms: 15000
    on_failure: "abort"
    notes: "Wiki: talking to Vannaka (370) advances to 390. Honest abort if the talk didn't register."

  # --- Stage 390 -> 400: open the equipment (Worn) tab ---
  - id: 5
    description: "Open the equipment (Worn Equipment) tab -- stage 390 action"
    mcp_tool: click_widget
    args:
      text: "Worn Equipment"
    on_failure: "retry:2"
    notes: "Widget 35913771. Opening the worn tab advances 390->400."

  - id: 6
    description: "VERIFY varp advanced to the 'open equipment stats' stage (>=400)"
    action: WAIT
    await_condition: "tutorial_progress:>=400"
    timeout_ms: 15000
    on_failure: "abort"

  # --- Stage 400 -> 405: open the equipment STATS panel (THE MISSING ACTION) ---
  - id: 7
    description: "Open the equipment STATS panel -- stage 400 action (the wedge fix)"
    mcp_tool: click_widget
    args:
      text: "Equipment Stats"
    on_failure: "retry:2"
    notes: |
      THE ROOT FIX (attempt #6). Stage 400 is waiting for the equipment-STATS
      panel to be opened, NOT for an equip (proven: unequip/re-equip kept varp at
      400). This restores the "equip-stats panel" step the old Driver #2 used
      (TUTORIAL_TEST_DEFECTS_2026-07-17.md:145).
      TODO(live-confirm): the exact "View equipment stats" widget is not recorded
      offline. This text-matched click is the best offline guess; step 8's verify
      gate proves whether it worked. If a live find_widget(text="...stats") shows a
      different handle/action, change ONLY this step's args (e.g. to a CLICK_WIDGET
      <id> or an action match). Do NOT delete the step -- the varp ladder requires it.

  - id: 8
    description: "VERIFY varp advanced past the equipment-stats stage (>=405)"
    action: WAIT
    await_condition: "tutorial_progress:>=405"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Wiki: opening equipment stats (400) advances to 405. This is the gate that
      catches a wrong step-7 widget: if the stats panel never opened, varp stays at
      400, this WAITs to timeout, and the section aborts honestly (strict_steps)
      instead of marching into the old silent wedge.

  # --- Stage 405 -> 410: equip the Bronze dagger ---
  - id: 9
    description: "Close the equipment-stats panel so inventory items are clickable"
    action: KEY_PRESS
    args: "Escape"
    delay_after_ms: 600
    notes: |
      The equipment-stats panel uses dynamic widgets that make inventory items
      report -1,-1 bounds (journals/quests/tutorial_island_automation_lessons_2026-01-18.md
      item #6). Escape closes it BEFORE the equip so equip_item can find the dagger.

  - id: 10
    description: "Equip the Bronze dagger -- stage 405 action"
    mcp_tool: equip_item
    args:
      item_name: "Bronze dagger"
    on_failure: "retry:2"
    notes: |
      equip_item is now idempotent for chain restarts: an ALREADY-WORN dagger
      (worn slot, not inventory) returns success "already equipped (no action
      taken)" instead of the old false "not found in inventory" abort (attempt #6).

  - id: 11
    description: "VERIFY the dagger equip registered -- varp advanced to 410"
    action: WAIT
    await_condition: "tutorial_progress:>=410"
    timeout_ms: 15000
    on_failure: "abort"
    notes: |
      Wiki: equipping the dagger at stage 405 advances to 410 ("exit interface and
      talk to Vannaka"). Reaching 410 is THIS sub-section's completion (master gate
      410). Continue in 08_combat_sword_ranged.yaml for the sword/shield handover.
