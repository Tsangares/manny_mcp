# Tutorial Island - Part 5: Cooking
# STATUS: IN PROGRESS
#
# This routine handles the cooking section:
# 1. Enter cooking building
# 2. Talk to Master Chef
# 3. Make bread dough (flour + water)
# 4. Cook bread on range
# Door crossing to Quest Guide is owned entirely by
# 05_cooking_to_quest_guide.yaml (2026-07-20 door-race fix) -- see note above steps.

name: "Tutorial Island - Cooking"
type: tutorial
phase: 5


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  - id: 1
    description: "Enter cooking building"
    action: INTERACT_OBJECT
    args: "Door Open"

  - id: 2
    description: "Talk to Master Chef"
    action: INTERACT_NPC
    args: "Master_Chef Talk-to"
    delay_before_ms: 2000

  - id: 3
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 2000

  - id: 4
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 5
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 6
    description: "Continue dialogue (space)"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 1000

  - id: 7
    description: "Make bread dough"
    action: USE_ITEM_ON_ITEM
    args: "flour water"
    delay_before_ms: 1000
    notes: |
      CRITICAL: Use partial item names!
      - "flour" matches "Pot of flour"
      - "water" matches "Bucket of water"

  - id: 8
    description: "Continue dialogue after making dough"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 2000

  - id: 9
    description: "Cook bread on range"
    action: USE_ITEM_ON_OBJECT
    args: "dough Range"
    delay_before_ms: 1000
    notes: "Partial name 'dough' works to match 'Bread dough'"

  - id: 10
    description: "Continue dialogue after cooking"
    action: KEY_PRESS
    args: "Space"
    delay_before_ms: 3000

# DOOR CROSSING REMOVED (2026-07-20, door-race fix, run 20260720T003818Z): steps
# 11-12 used to walk to the north door and open it here, then
# 05_cooking_to_quest_guide.yaml (05b) re-seated and re-opened the SAME door in its
# own steps 1-2. Tutorial-island doors auto-close server-side ~5-7s after Open, so
# that redundant re-seat+re-open was pure ceremony that burned ~10s while the door
# re-closed under 05b — one contributor to the door-crossing failures diagnosed that
# run. This section's job now ends when cooking completes (step 10); 05b OWNS the
# entire door-crossing (seat -> Open -> immediate through-walk) as the sole actor,
# with no double-open race between sections. The player is left INSIDE the kitchen,
# which is exactly the precondition 05b's step 1 (exact seat at 3073,3090) expects.
# progress_gate 170 ("exit Master Chef kitchen", 00_master.yaml) is NOT asserted by
# this file -- it was never reached by this section's old steps 11-12 either (opening
# the door doesn't cross the threshold); it is reached inside 05b once its
# seat->Open->through-walk sequence actually steps the player outside. run_chain's
# progress_gate is a pre-section SKIP check only (run_routine.py: skip section if
# progress already >= gate), not a postcondition this file must satisfy.

