# Tutorial Island - Part 7: Mining & Smithing
# STATUS: VALIDATED (coords/steps transcribed 2026-07-18 from
# journals/TUTORIAL_TEST_DEFECTS_2026-07-17.md, Driver #2 ~23:50 PT checkpoint)
#
# This routine handles the Mining & Smithing section:
# 1. Talk to Mining Instructor (receive pickaxe)
# 2. Mine tin ore (NO Prospect step in this tutorial variant - see below)
# 3. Mine copper ore
# 4. Smelt bronze bar at furnace
# 5. Talk to Mining Instructor about smithing (receive hammer)
# 6. Smith bronze dagger at anvil
# 7. Continue to combat section (gate)
#
# DRIVER #2 CONFIRMATION (defects log lines 121-133): "this tutorial variant does
# NOT require Prospect (07 routine steps for prospecting are dead -- instruction
# goes straight to 'try mining some tin')" -- Prospect steps REMOVED below.
# "routine's estimated object coords all confirmed +/-1 tile" -- the tin/copper/
# furnace/anvil coordinates below are the SAME ones from the prior estimated
# file, now promoted from "estimated" to journal-confirmed (no exact re-scan
# numbers were given -- driver validated via screen hover-sweep, not by reading
# back world coordinates -- so these remain approximate-but-confirmed, not
# pixel-exact).
# DEFECT-1 (INTERACT_OBJECT camera-orient client-thread crash) is CONFIRMED
# FIXED on jar 2fcb602 (defects log line 327-329) -- INTERACT_OBJECT is used
# directly below instead of the driver's hover-sweep workaround.
#
# DEFECT (attempt #9 run 20260720T030434Z + attempt #10 run 20260720T033045Z,
# malikreyes): step 18's CLICK_WIDGET 20447241 (dagger) failed 5x right after
# step 17's anvil USE_ITEM_ON_OBJECT "succeeded". The attempt-#9 diagnosis
# (settle-race; fix 215f400 added delay_after_ms:1000 + retry:2 on the anvil
# step) is FALSIFIED by attempt #10: with 215f400 DEPLOYED the SAME failure
# recurred in ~3 min, and the receipt (journals/images/2026-07-20_malikreyes_
# attempt10_s07_smithing_fail.png) shows the smithing interface NOT open, an
# undismissed "Nothing interesting happens" mesbox on screen, and the tutorial
# hint "Click the anvil to begin smithing". A widget absent 31s after a
# "successful" interact was never a settle race.
#
# TRUE ROOT CAUSE (receipts): an undismissed modal MESSAGEBOX/OBJECTBOX blocks
# the anvil interaction. USE_ITEM_ON_OBJECT logs "Successfully used" (the click
# dispatched) while the game answers "Nothing interesting happens" and opens no
# interface -- the #1 defect class (command success != objective progress). The
# modal survives because DEFECT-31 (manny ad86afa) is COMMITTED BUT UNDEPLOYED
# (rides window #4); on the live jar d0668f58 these modals render
# dialogue.open:false (attempt #10's state JSON showed exactly this while the
# mesbox was on screen), so every check-first `repeat_until:no_dialogue` drain
# in this section no-ops ZERO presses against them and leaves the modal up.
# Attempt #6 PASSED on byte-identical YAML only because its fresh straight-
# through timing happened to clear the trailing modal; #9/#10 did not (and #10's
# resume at varp 340 re-ran the mine/smelt/talk steps at a stage where those
# objectives are already done, seeding extra "Nothing interesting happens"
# modals). Pass/fail was a timing lottery, not a stale id.
#
# FIX (this pass): (a) the pre-anvil dialogue drains (steps 15, 19) are now
# BLIND fixed-count Space (DEFECT-31 house pattern, cf. 08_combat step 3 /
# 09_banking step 7 / 10_prayer_magic), not check-first no_dialogue; (b) a
# dedicated blind Space drain (step 16b) clears any modal IMMEDIATELY before the
# anvil; (c) the loop SCOPE is fixed -- the anvil-open and dagger-click were
# separate steps so the dagger-click's repeat_until retried the widget click
# ALONE against a never-opened interface; steps 16b/17/18 are now wrapped in an
# inner loop (start 16b, end 18, exit has_item:"Bronze dagger") so each retry
# re-drains the modal AND re-uses the bar on the anvil AND re-clicks -- the FULL
# sequence. has_item:"Bronze dagger" stays the SOLE honest terminal gate; no
# speculative varp gate. The anvil verb stays USE_ITEM_ON_OBJECT (attempt #6
# receipt proves it opens the interface when not modal-blocked -- switching to
# INTERACT_OBJECT would be speculative). 215f400's settle delay_after_ms:1000 is
# kept on the anvil step; its now-redundant on_failure:retry:2 is dropped (the
# inner loop owns re-attempts).
#
# AUTHORING RULE (Track E phase-1b, live 2026-07-18): interact-by-name
# (INTERACT_OBJECT / INTERACT_NPC / USE_ITEM_ON_OBJECT) resolves to the NEAREST
# match, so it MUST be position-pinned with a preceding GOTO (+ location await)
# whenever the target name is ambiguous or shared. Here BOTH ore outcrops are
# named "Rocks"; without a GOTO to the copper outcrop the miner re-hit the tin
# rock forever (run 20260719T014238Z cascaded 5 failures from this single miss).
# Same bug class as the 05b door: name-only interact needs a position pin.

name: "Tutorial Island - Mining & Smithing"
type: tutorial
phase: 7

# Key NPCs
npcs:
  mining_instructor:
    name: "Mining Instructor"
    id: 3311
    location: {x: 3080, y: 9502, plane: 0}
    action: "Talk-to"

# Key Objects (journal-confirmed +/-1 tile, Driver #2)
objects:
  tin_rocks:
    name: "Rocks"  # Contains tin
    location: {x: 3076, y: 9504, plane: 0}
  copper_rocks:
    name: "Rocks"  # Contains copper
    location: {x: 3085, y: 9502, plane: 0}
  furnace:
    name: "Furnace"
    location: {x: 3079, y: 9496, plane: 0}
  anvil:
    name: "Anvil"
    location: {x: 3083, y: 9499, plane: 0}


# STRICT-STEPS honesty gate (engine finding #1a): any failed step marks this
# SECTION failed so the master chain STOPS instead of false-passing into the
# next section on a desynced game. Attempt #1's cascade came from a section
# that logged failed steps yet exited runner-status SUCCESS.
config:
  strict_steps: true

steps:
  - id: 1
    description: "Walk to Mining Instructor"
    action: GOTO
    args: "3080 9504 0"
    delay_before_ms: 500
    await_condition: "location:3080,9504"
    timeout_ms: 60000
    notes: "From ladder at (3088, 9520), walk south to mining area"

  - id: 2
    description: "Talk to Mining Instructor"
    action: INTERACT_NPC
    args: "Mining_Instructor Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 1000

  - id: 3
    description: "Advance dialogue (instructor intro, receive bronze pickaxe)"
    action: KEY_PRESS
    args: "Space"
    repeat_until: "no_dialogue"
    delay_before_ms: 1000
    notes: "Instructor introduces mining and hands over a bronze pickaxe"

  # NOTE: Prospect steps intentionally OMITTED here.
  # Driver #2 (defects log:126-129) confirmed this tutorial variant skips
  # Prospect entirely -- the tutorial instruction goes straight to
  # "try mining some tin ore from the rocks". Do not re-add prospect steps
  # without re-validating against a live run.

  # POSITION-PIN before mining tin: both tin and copper outcrops are named
  # "Rocks", so INTERACT_OBJECT picks the NEAREST -- must stand at the tin
  # outcrop first or it mines the wrong (or already-mined) rock. (See header note.)
  - id: 4
    description: "Walk to the TIN outcrop"
    action: GOTO
    args: "3076 9504 0"
    delay_before_ms: 500
    await_condition: "location:3076,9504"
    timeout_ms: 60000

  - id: 5
    description: "Mine tin ore (retries until ore is obtained)"
    action: INTERACT_OBJECT
    args: "Rocks Mine"
    delay_before_ms: 1000
    repeat_until: "has_item:Tin ore"
    repeat_until_timeout_ms: 6000
    max_iterations: 6
    notes: "Bluish rocks. State-checked await mirrors the 04 cook-shrimp fix -- mining has a multi-tick animation before the ore lands in inventory."

  - id: 6
    description: "Advance dialogue after first mine (if any)"
    action: KEY_PRESS
    args: "Space"
    repeat_until: "no_dialogue"
    delay_before_ms: 500

  # POSITION-PIN before mining copper: the copper outcrop is a SEPARATE "Rocks"
  # at (3085,9502). Without this GOTO the miner re-hits the nearest (tin) rock
  # and never gets copper -- the exact live failure on run 20260719T014238Z.
  - id: 7
    description: "Walk to the COPPER outcrop"
    action: GOTO
    args: "3085 9502 0"
    delay_before_ms: 500
    await_condition: "location:3085,9502"
    timeout_ms: 60000

  - id: 8
    description: "Mine copper ore (retries until ore is obtained)"
    action: INTERACT_OBJECT
    args: "Rocks Mine"
    delay_before_ms: 1000
    repeat_until: "has_item:Copper ore"
    repeat_until_timeout_ms: 6000
    max_iterations: 6
    notes: "Brown/orange rocks contain copper. tin and copper rocks are separate outcrops -- step 7 pins us at the copper one first."

  - id: 9
    description: "Advance dialogue after second mine (if any)"
    action: KEY_PRESS
    args: "Space"
    repeat_until: "no_dialogue"
    delay_before_ms: 500

  # POSITION-PIN before smelting: USE_ITEM_ON_OBJECT is range-based.
  - id: 10
    description: "Walk to the Furnace"
    action: GOTO
    args: "3079 9496 0"
    delay_before_ms: 500
    await_condition: "location:3079,9496"
    timeout_ms: 60000

  - id: 11
    description: "Smelt bronze bar at furnace (retries until bar is obtained)"
    action: USE_ITEM_ON_OBJECT
    args: "Tin ore Furnace"
    delay_before_ms: 1000
    repeat_until: "has_item:Bronze bar"
    repeat_until_timeout_ms: 8000
    max_iterations: 5
    notes: |
      ITEM NAME MUST BE THE FULL 'Tin ore' -- NOT the partial 'tin'.
      findItemIdByName uses substring .contains(): the partial 'tin' matches
      'Tinderbox' (carried since firemaking, slot 3) BEFORE 'Tin ore' (slot 8),
      so 'tin' used the TINDERBOX on the furnace -> no smelt -> repeat_until
      exhausted 5x. Live-proven failure: blast run 2026-07-19 00:19-00:20
      (log 'Target: Tinderbox -> Furnace'). The GOTO/seating was fine (furnace
      found at distance 2); the sole bug was the item-name collision.
      Smelting consumes both the tin and copper ore automatically.

  - id: 12
    description: "Advance dialogue after smelting"
    action: KEY_PRESS
    args: "Space"
    repeat_until: "no_dialogue"
    delay_before_ms: 1000

  # POSITION-PIN before talking: INTERACT_NPC is range-based; step 10 left us
  # at the furnace, so walk back to the instructor before talking.
  # LIVE 2026-07-18: approach the instructor from the CARDINAL-SOUTH tile
  # (3081,9503). The instructor's home is ~(3081,9504); approaching from the
  # east (by the rocks) or the diagonal 3080,9503 gives "I can't reach that!"
  # and the talk silently no-ops (no dialogue, no hammer). Talking is what hands
  # over the HAMMER, which is REQUIRED to smith -- without it USE_ITEM_ON_OBJECT
  # bronze Anvil succeeds but opens no interface ("you need a hammer").
  - id: 13
    description: "Walk to the Mining Instructor's cardinal-south tile"
    action: GOTO
    args: "3081 9503 0"
    delay_before_ms: 500
    await_condition: "location:3081,9503"
    timeout_ms: 60000

  - id: 14
    description: "Talk to Mining Instructor about smithing (receive hammer)"
    action: INTERACT_NPC
    args: "Mining_Instructor Talk-to"
    await_condition: "dialogue"
    delay_before_ms: 1000

  - id: 15
    description: "Advance smithing-intro dialogue -- blind Space drain (DEFECT-31)"
    action: KEY_PRESS
    args: "Space"
    repeat: 6
    delay_before_ms: 1000
    notes: |
      Was `repeat_until: no_dialogue`. DEFECT-31 (manny ad86afa, committed but
      UNDEPLOYED; live jar d0668f58 is blind to modal mesboxes): the instructor's
      smithing-intro can trail a MESSAGEBOX/OBJECTBOX that renders
      dialogue.open:false, so a check-first no_dialogue drain no-ops zero presses
      and leaves the modal UP -- and an undismissed modal then blocks the anvil
      ("Nothing interesting happens", attempt #10 screenshot). Blind fixed-count
      Space instead (house pattern: 08_combat step 3 / 09_banking step 7). Extra
      presses after the dialogue closes are inert on Tutorial Island.

  # POSITION-PIN before smithing: USE_ITEM_ON_OBJECT is range-based. Step 16
  # walks to the anvil ONCE (outside the inner loop); the widget-id click path
  # never moves the player, so re-attempts re-use this seating.
  - id: 16
    description: "Walk to the Anvil"
    action: GOTO
    args: "3083 9499 0"
    delay_before_ms: 500
    await_condition: "location:3083,9499"
    timeout_ms: 60000

  # --- ANVIL SEQUENCE: inner-loop re-attempted as ONE unit (see `loop:` at EOF).
  # Steps 16b/17/18 are the inner range; on failure the whole [drain -> anvil ->
  # click] re-runs, exit only on has_item:"Bronze dagger". THIS is the loop-scope
  # fix: the dagger-click used to retry ALONE against an interface that never
  # opened because a modal blocked the anvil.
  - id: 16b
    description: "Clear any modal mesbox before the anvil (blind Space drain)"
    action: KEY_PRESS
    args: "Space"
    repeat: 4
    delay_before_ms: 500
    notes: |
      DEFECT-31 pre-anvil drain -- THE core fix. At the "Click the anvil to begin
      smithing" stage a MESSAGEBOX/OBJECTBOX modal ("Nothing interesting happens"
      or a smithing-intro trailer) can be up; on the live (DEFECT-31-undeployed)
      jar d0668f58 it renders dialogue.open:false so no upstream no_dialogue drain
      cleared it, and a live modal BLOCKS the anvil interaction -> the USE_ITEM
      below logs "Successfully used" while the game opens no interface (attempt
      #10 screenshot receipt). This drain runs INSIDE the inner loop, so it
      re-clears a modal on EVERY re-attempt. Blind fixed-count (not check-first)
      precisely because DEFECT-31 makes the modal invisible to a no_dialogue gate.
      Extra presses after the modal closes are inert on Tutorial Island.

  - id: 17
    description: "Open smithing interface at anvil (bar-on-anvil)"
    action: USE_ITEM_ON_OBJECT
    args: "Bronze bar Anvil"
    delay_before_ms: 1000
    delay_after_ms: 1000
    notes: |
      ITEM NAME MUST BE THE FULL 'Bronze bar' -- NOT the partial 'bronze'.
      Same substring-collision class as step 11: 'bronze' .contains()-matches
      'Bronze axe' (slot 2, from woodcutting) and 'Bronze pickaxe' (slot 7)
      BEFORE 'Bronze bar', so the partial would use the AXE on the anvil and
      open no interface. Full 'Bronze bar' resolves uniquely.

      VERB IS EVIDENCE-BACKED: attempt #6 (judeaislam) smithed the dagger with
      exactly this USE_ITEM_ON_OBJECT Bronze bar Anvil -- proof the verb opens
      the smithing interface WHEN NOT modal-blocked. So the "Nothing interesting
      happens" failure in #9/#10 is the modal blocker (cleared by step 16b), NOT
      a wrong verb; switching to INTERACT_OBJECT Anvil would be speculative.

      SETTLE DELAY: delay_after_ms 1000 kept from 215f400 (a beat before the
      widget lookup). on_failure:retry:2 was DROPPED -- the inner loop (EOF) now
      owns re-attempts of this whole sequence, and 215f400's settle-race theory
      it was added for is falsified (attempt #10, see header).

  - id: 18
    description: "Smith the bronze dagger (real widget-ID click, NOT CLICK_AT)"
    mcp_tool: click_widget
    args:
      widget_id: 20447241
    repeat_until: "has_item:Bronze dagger"
    repeat_until_timeout_ms: 6000
    max_iterations: 5
    notes: |
      MUST click by widget_id (Mode 3 -> plain 'CLICK_WIDGET 20447241', no action).
      LIVE-PROVEN both accounts + blast 2026-07-19: this smiths the dagger.

      THE ID IS NOT THE DEFECT (id 20447241 confirmed good on 3+ sessions:
      blast-run discovery, judeaislam/#6, and the widget-tree group is static --
      see below). Attempt #9/#10's "Widget 20447241 not found or hidden" is the
      DOWNSTREAM symptom of a modal-blocked anvil: USE_ITEM_ON_OBJECT logged
      "Successfully used" but opened NO interface (attempt #10 screenshot), so
      there was no dagger cell for this click to find. The prior "timing race"
      verdict (fix 215f400: settle delay + retry on the anvil step) was FALSIFIED
      by attempt #10 -- the failure recurred in ~3 min WITH 215f400 deployed, and
      the interface was demonstrably never open. Root cause is the undismissed
      modal (DEFECT-31, header); the cure is step 16b's pre-anvil blind drain +
      the inner loop re-attempting the whole [drain -> anvil -> click] sequence,
      so this click now only ever fires against an interface that was actually
      opened on the same inner pass. This step's widget_id/mechanism is UNCHANGED.

      NO SPECULATIVE POST-SMITH PROGRESS GATE ADDED: checked 00_master.yaml's
      own wiki-sourced varp-281 ladder (in 08_combat.yaml's header and
      00_master.yaml's progress_gate comments) for a documented "dagger
      smithed" value to WAIT on here. The only two documented boundaries this
      section touches are 250 (climb down ladder, prior section) and 370
      ("combat section starts" = this section's own exit gate) -- and 370 is
      explicitly annotated elsewhere as "370 talk to Vannaka (Combat
      Instructor) -> 390", i.e. the FIRST action of the NEXT section
      (08_combat.yaml step 2), not an action inside this one. Attempt #9's own
      receipt shows varp only at 340 after mining+smelting, before the failed
      click -- no journal or wiki source in-tree gives a distinct varp value
      for "dagger smithed" specifically. Per the no-speculation rule, step 18
      keeps repeat_until has_item:"Bronze dagger" as its SOLE honest gate; no
      WAIT tutorial_progress step was added after it.

      DO NOT use text:/action: here. handle_click_widget with text="Dagger" or
      action="Smith" finds the cell but its SCAN bounds are INTERFACE-RELATIVE
      (x=23,y=78); the handler treats them as screen-absolute and fires
      'CLICK_AT 57 84', which lands on the game world near the top-left corner
      and WALKS THE PLAYER NORTH instead of smithing (blast run 20260719T073150Z:
      5x SCAN_WIDGETS, 0 daggers, player drifted to 3078,9514). See DEFECT
      candidate in journals. The widget_id path skips CLICK_AT entirely.

      The id 20447241 = packed group 312, child 9. Group 312 is the FIXED
      tutorial smithing interface, so this id is STABLE across sessions/accounts
      (the prior note's "IDs change between sessions" caution does not apply to a
      static interface group). If a future variant differs, SCAN_WIDGETS Dagger
      to read the id, then CLICK_WIDGET <id> with NO action (the proven form).

      HISTORY (superseded): step 18 previously used click_widget(text="Dagger"),
      which is what triggered the CLICK_AT-walk-north failure described above.

  - id: 19
    description: "Advance dialogue after smithing -- blind Space drain (DEFECT-31)"
    action: KEY_PRESS
    args: "Space"
    repeat: 6
    delay_before_ms: 1000
    notes: |
      Was `repeat_until: no_dialogue`. Same DEFECT-31 class as step 15: the
      post-smith completion message can be a modal invisible to a check-first
      no_dialogue drain, and a lingering modal here would block the gate 'Open'
      (step 21) that advances varp to 370 (section exit). Blind fixed-count Space;
      extra presses are inert on Tutorial Island. Reached only AFTER the inner
      loop exits with the dagger (on_exit: goto_step:19).

  # POSITION-PIN before the gate: INTERACT_OBJECT is range-based and step 16-18
  # left us at the anvil (~3083,9499), ~12 tiles from the gate. Without this
  # approach the gate 'Open' silently failed ("Could not find or interact with
  # Gate", blast run 20260719T073150Z step 20). Gate confirmed via
  # QUERY_TRANSITIONS at (3094,9502)+(3094,9503) plane 0, state closed, action
  # 'Open'. Approach from the WEST-adjacent tile (3093,9502).
  - id: 20
    description: "Walk to the gate's west-adjacent tile"
    action: GOTO
    args: "3093 9502 0"
    delay_before_ms: 500
    await_condition: "location:3093,9502"
    timeout_ms: 60000

  - id: 21
    description: "Open the gate to the combat training area"
    action: INTERACT_OBJECT
    args: "Gate Open"
    delay_before_ms: 1000
    notes: |
      Gate at (3094,9502/9503) leads east to combat. 08_combat.yaml step 1 adds
      a defensive GOTO to the combat instructor (3104,9509) as the safety net if
      this open doesn't fully seat the transition.

# ANVIL RE-ATTEMPT LOOP (the loop-scope fix, attempt #10 falsification of 215f400):
# steps 16b -> 18 ([blind modal drain] -> [use bar on anvil] -> [click dagger])
# are re-attempted AS ONE UNIT until the dagger is in inventory. Previously only
# the dagger-click (step 18) had a repeat_until, so it retried the widget click
# ALONE against an interface a modal had prevented from opening. Now a failed pass
# jumps back to step 16b and re-drains the modal + re-uses the bar + re-clicks.
# exit_conditions has_item:"Bronze dagger" is the SOLE honest terminal gate (no
# speculative varp gate). If 3 consecutive inner passes fail (the engine's
# max_inner_consecutive_failures), the loop exits via on_exit and strict_steps
# fails the section honestly -- no false pass, chain stops (as attempts #9/#10
# already did, but now only after re-attempting the FULL sequence, not the click).
# GOTO to the anvil (step 16) is OUTSIDE this range: the widget-id click never
# moves the player, so one seating suffices. on_exit lands on step 19 (post-smith
# drain), the first step after the anvil sequence.
loop:
  inner:
    enabled: true
    start_step: 16b
    end_step: 18
    exit_conditions:
      - "has_item:Bronze dagger"
    on_exit: "goto_step:19"

# PITFALLS DISCOVERED (carried over + Driver #2 2026-07-17):
# 1. Multiple rock types - identify tin (bluish) vs copper (brown/orange) by appearance
# 2. This tutorial variant does NOT require Prospect - confirmed dead code path, removed
# 3. Smithing interface: click the Dagger cell by widget_id (CLICK_WIDGET), NOT
#    by text/action (those route through CLICK_AT on relative bounds and walk the
#    player off into the world). See step 18 notes.
# 4. USE_ITEM_ON_OBJECT item names must be FULL & UNIQUE, not partials: the item
#    matcher is substring .contains() on the first inventory slot, so "tin" hits
#    Tinderbox before Tin ore and "bronze" hits Bronze axe before Bronze bar.
#    Use "Tin ore" and "Bronze bar". (Cooking got away with partials only because
#    no colliding item was carried.)
# 5. DEFECT-1 (INTERACT_OBJECT camera-orient crash): FIXED on jar 2fcb602, confirmed by Driver #3/#4.
#    INTERACT_OBJECT is used directly (no hover-sweep workaround needed).
