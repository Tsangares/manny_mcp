# Superheat Mining at Mining Guild
# Mine iron ore and cast Superheat Item to make iron bars
# Banks bars at Falador East Bank

name: "Superheat Mining - Mining Guild Iron"
type: skilling
skill: mining, magic, smithing
description: |
  Mine iron ore in the Mining Guild and cast Superheat Item to make iron bars.
  Trains Mining, Magic, and Smithing simultaneously.

  XP rates (approximate):
  - Mining: ~25-30k/hr (iron ore)
  - Magic: ~30k/hr (53 xp per Superheat)
  - Smithing: ~7k/hr (12.5 xp per iron bar)

  Rune costs: 4 Fire runes + 1 Nature rune per bar

# Requirements
requirements:
  mining_level: 60  # Mining Guild requirement
  magic_level: 43   # Superheat Item requirement
  smithing_level: 15  # Iron bar requirement
  items:
    - "Any pickaxe (rune recommended)"
    - "Nature runes (1 per bar)"
    - "Fire runes (4 per bar)"
    - "Fire staff (optional, saves fire runes)"

# Starting location
start_location:
  name: "Falador East Bank"
  x: 3013
  y: 3355
  plane: 0
  validated: true

# Key locations
locations:
  falador_east_bank:
    x: 3013
    y: 3355
    plane: 0
    description: "Falador East Bank for banking bars and getting runes"
    validated: true

  mining_guild_entrance:
    x: 3019
    y: 3337
    plane: 0
    description: "Above-ground Mining Guild entrance (ladder)"
    notes: "South-east of Falador East Bank"

  mining_guild_underground:
    x: 3019
    y: 9737
    plane: 0
    description: "Underground Mining Guild area"
    notes: "Y coordinate offset by -6400 for underground"

  iron_rocks_guild:
    x: 3029
    y: 9739
    plane: 0
    description: "Iron rock cluster in Mining Guild"
    notes: "Multiple iron rocks close together, fast respawn.
      FIXED 2026-07-19 (H-3): was (3030, 9720) -- documented MEMBERS-ONLY /
      UNREACHABLE by superheat_steel_bars.yaml:353-357 ('GOTO fails with
      UNREACHABLE... y-coords should be ~9735-9745'). Retargeted to (3029,
      9739), the reachable cluster used by mine_iron_ore.yaml and
      superheat_steel_bars.yaml."

# Step-by-step routine
steps:
  # ========== PHASE 1: BANK FOR SUPPLIES ==========
  - id: 1
    phase: "banking"
    action: GOTO
    args: "3013 3355 0"
    description: "Walk to Falador East Bank"
    await_condition: "location:3013,3355"
    timeout_ms: 120000

  - id: 2
    phase: "banking"
    action: BANK_OPEN
    args: ""
    description: "Open bank"
    delay_after_ms: 1000

  - id: 3
    phase: "banking"
    action: BANK_DEPOSIT_ALL
    args: ""
    description: "Deposit all items (bars, ore, etc)"
    delay_after_ms: 500
    notes: "Clear inventory before withdrawing supplies"

  - id: 4
    phase: "banking"
    action: BANK_WITHDRAW
    args: "Nature rune 27"
    description: "Withdraw 27 nature runes"
    delay_after_ms: 300
    notes: "1 nature rune per superheat cast"

  - id: 5
    phase: "banking"
    action: BANK_CLOSE
    args: ""
    description: "Close bank"
    delay_after_ms: 500
    notes: "Fire runes come from equipped fire staff, or withdraw fire runes too"

  # ========== PHASE 2: TRAVEL TO MINING GUILD ==========
  - id: 6
    phase: "travel"
    action: GOTO
    args: "3019 3337 0"
    description: "Walk to Mining Guild entrance"
    await_condition: "location:3019,3337"
    timeout_ms: 30000

  - id: 7
    phase: "travel"
    action: INTERACT_OBJECT
    args: "Ladder Climb-down"
    description: "Climb down ladder to Mining Guild"
    await_condition: "location:3019,9737"
    timeout_ms: 10000
    notes: "Requires 60 Mining to enter. await added 2026-07-19 (M-12): verify
      the underground landing (mining_guild_underground) before step 8's GOTO
      fires from an unverified position -- delay_after_ms:2000 alone did not
      confirm the descent."

  # ========== PHASE 3: WALK TO IRON ROCKS ==========
  - id: 8
    phase: "navigate"
    action: GOTO
    args: "3029 9739 0"
    description: "Walk to iron rock cluster in Mining Guild"
    await_condition: "location:3029,9739"
    timeout_ms: 15000

  # ========== PHASE 4: MINE AND SUPERHEAT LOOP ==========
  - id: 9
    phase: "mining"
    action: MINE_ORE
    args: "iron 1"
    description: "Mine one iron ore"
    timeout_ms: 45000
    notes: "MINE_ORE is blocking - no await_condition needed (matches
      mine_iron_ore.yaml step 7 and superheat_steel_bars.yaml steps 7-9).
      Was previously await_condition:has_item + timeout_ms:15000, which paired
      a redundant state-poll with a timeout too short for contested Mining
      Guild iron (observed 15-23s elsewhere in this corpus), risking spurious
      failures on the send_command_with_response dispatch itself.
      Args fixed 2026-07-18: was `args: \"iron\"` with no count -- per
      MineOreCommand.java's own doc comment, omitting [count] means
      targetCount=-1 = 'mine until inventory full', not 'mine one ore'. That
      silently broke the whole mine-then-superheat inner loop design (this
      step would try to fill the ENTIRE inventory with iron before ever
      reaching step 10's superheat cast, and outrun the 45s timeout doing
      it). Added the missing count=1, matching the identical, working
      pattern in mine_iron_ore.yaml and superheat_steel_bars.yaml."

  - id: 10
    phase: "superheat"
    action: CAST_SPELL_ON_INVENTORY_ITEM
    args: "Superheat_Item Iron_ore"
    description: "Cast Superheat Item on iron ore to make iron bar"
    await_condition: "no_item:Iron ore"
    timeout_ms: 15000
    notes: "Consumes 4 fire runes + 1 nature rune, produces iron bar.
      await added 2026-07-19 (H-4): the real cast takes ~3.5s but the step
      previously had only delay_after_ms:1800, so the inner-loop exit check ran
      ~1.7s early on stale inventory. Waiting on no_item:Iron ore (per
      ROUTINE_SCHEMA.md worked example j.3 and superheat_steel_bars.yaml step
      10) guarantees the ore is consumed before the exit_conditions are read."

  # ========== PHASE 5: REPEAT OR BANK ==========
  # The routine should loop steps 9-10 until:
  # - Out of nature runes, OR
  # - Inventory full of iron bars (27 bars max)

  - id: 11
    phase: "check"
    action: QUERY_INVENTORY
    args: ""
    description: "Check inventory state"
    notes: "Use this to decide if we need to bank"

  # ========== PHASE 6: EXIT MINE (when loop exits) ==========
  # Added 2026-07-18: the routine had no way back to the surface before
  # re-running step 1 (GOTO Falador East Bank) from underground -- GOTO
  # cannot path through a ladder transition on its own (CLAUDE.md Indoor
  # Navigation Protocol). Mirrors superheat_steel_bars.yaml steps 11-12,
  # using this file's own pre-recorded mining_guild_underground /
  # mining_guild_entrance coordinates.
  - id: 12
    phase: "exit"
    action: GOTO
    args: "3019 9737 0"
    description: "Walk to ladder in Mining Guild"
    await_condition: "location:3019,9737"
    timeout_ms: 15000

  - id: 13
    phase: "exit"
    action: INTERACT_OBJECT
    args: "Ladder Climb-up"
    description: "Climb up ladder to exit Mining Guild"
    await_condition: "location:3019,3337"
    timeout_ms: 10000
    notes: "Surface location after climbing up (mining_guild_entrance)"

# Loop configuration
loop:
  # Inner loop: Mine and superheat until inventory full or out of runes.
  # FIXED 2026-07-18: this was previously a FLAT loop block
  # (enabled/start_step/end_step/exit_conditions at the top level), but the
  # executor's flat-loop path (handle_execute_routine, routine.py) only reads
  # `enabled`, `repeat_from_step`, and `stop_conditions` -- start_step/
  # end_step/exit_conditions are ONLY meaningful nested under loop.inner/
  # loop.outer. The flat form silently ran ALL steps 1-11 every pass (full
  # re-bank after a single ore+superheat) instead of looping steps 9-10 until
  # full. Restructured to match the proven inner/outer schema already used by
  # mine_iron_ore.yaml and superheat_steel_bars.yaml.
  inner:
    enabled: true
    start_step: 9
    end_step: 10
    exit_conditions:
      - "inventory_full"
      - "no_item:Nature rune"
    on_exit: "goto_step:11"

  # Outer loop: full bank -> travel -> mine loop -> exit cycle repeats
  outer:
    enabled: true
    start_step: 1
    end_step: 13
    exit_conditions: []
    notes: |
      Loop mining and superheating (steps 9-10) until:
      - Inventory is full of iron bars (27), OR
      - Out of nature runes
      Then exit the mine (steps 12-13) and return to step 1 (banking phase).

# Execution notes
notes: |
  SUPERHEAT MINING WORKFLOW:

  1. Bank Phase: Get 27 nature runes (assumes fire staff equipped)
  2. Travel: Walk to Mining Guild, climb down ladder
  3. Mine Loop: Mine iron ore -> Superheat -> Repeat
  4. Bank: When out of runes or inventory full of bars

  RUNE REQUIREMENTS:
  - Fire staff: Eliminates fire rune cost (recommended)
  - Without fire staff: Need 4 fire runes per cast (108 fire runes for 27 bars)
  - Nature runes: 1 per cast (27 for full inventory)

  XP PER INVENTORY (27 iron bars):
  - Mining: ~945 XP (35 per ore)
  - Magic: ~1,431 XP (53 per cast)
  - Smithing: ~337.5 XP (12.5 per bar)

  TIPS:
  - Equip fire staff to save fire runes
  - Mining Guild has +7 invisible mining boost
  - Iron rocks respawn fast in Mining Guild
  - Consider using Varrock armour for double ore chance

# Troubleshooting
troubleshooting:
  - issue: "Can't enter Mining Guild"
    solutions:
      - "Requires 60 Mining (can be boosted with dwarven stout)"
      - "Make sure you're at the correct entrance"

  - issue: "Superheat fails"
    solutions:
      - "Check you have nature runes and fire runes (or fire staff)"
      - "Make sure iron ore is in inventory"
      - "Requires 43 Magic"

  - issue: "Not getting iron bars"
    solutions:
      - "Iron has ~50% success rate without ring of forging"
      - "Consider using ring of forging for 100% success"
      - "Failed superheats still consume runes but give magic xp"
