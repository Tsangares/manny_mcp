# Fishing at Draynor Village
# Auto-generated using the new MCP workflow tools!

name: "Fishing at Draynor Village"
type: skilling
skill: fishing
target_level: 40

# Quest item requirements
items_needed:
  - small_fishing_net

# Locations
locations:
  draynor_fishing_spot:
    x: 3087
    y: 3233
    plane: 0
    description: "Fishing spot at Draynor Village dock"

  lumbridge_bank:
    x: 3208
    y: 3220
    plane: 2
    description: "Lumbridge Castle bank (top floor)"

# Step-by-step routine
steps:
  # ========== PHASE 1: PREPARATION ==========
  - id: 1
    phase: "preparation"
    action: GOTO
    args: "3208 3220 2"
    description: "Walk to Lumbridge bank"
    location: lumbridge_bank
    await_condition: "location:3208,3220"
    timeout_ms: 120000

  - id: 2
    phase: "preparation"
    action: BANK_OPEN
    description: "Open bank"

  - id: 3
    phase: "preparation"
    action: BANK_DEPOSIT_ALL
    description: "Deposit all items to make space"
    delay_before_ms: 500
    expected_result: "Empty inventory"

  - id: 4
    phase: "preparation"
    action: BANK_WITHDRAW
    args: "Small fishing net 1"
    description: "Withdraw fishing net"
    notes: "Required for shrimp/anchovies"

  - id: 5
    phase: "preparation"
    action: BANK_CLOSE
    description: "Close bank interface"

  # ========== PHASE 2: FISH AT DRAYNOR ==========
  - id: 6
    phase: "fishing"
    action: FISH_DRAYNOR_LOOP
    args: "45"
    description: "Fish at Draynor until fishing level 45 is reached"
    location: draynor_fishing_spot
    timeout_ms: 14400000
    notes: "This command handles fishing + banking + travel entirely
      internally (FishDraynorLoopCommand.java: a single blocking
      while(true) that only returns once the target fishing level is
      reached or it's interrupted) -- like POWER_MINE, it's a full
      self-contained grind loop, not a one-trip action.

      Fixed 2026-07-18 (verified against source, not a guess): the '45' arg
      is a TARGET FISHING LEVEL, not an inventory-slot count -- the original
      description ('until inventory nearly full (45/28 slots)') misdescribed
      it. Also added timeout_ms: with no override this used the 30s step
      default, so run_routine.py would give up and exit (misreporting the
      run as finished) long before level 45 could be reached from a fresh
      account, leaving the client fishing completely unsupervised. 4hr
      ceiling; lower the '45' arg or raise the ceiling further for a longer
      unattended session."
    expected_result: "Fishing XP gained continuously; command itself returns
      only once fishing level 45 is reached or interrupted"

# Execution notes
notes: |
  This routine uses the FISH_DRAYNOR_LOOP command which:
  - Walks to Draynor fishing spot
  - Fishes shrimp/anchovies until inventory full
  - Walks to Lumbridge bank
  - Banks fish
  - Repeats until stopped

  Created using the new MCP workflow:
  1. list_available_commands(search="FISH") - discovered FISH_DRAYNOR_LOOP
  2. validate_routine_deep() - verified all commands exist
  3. Ready to run!
