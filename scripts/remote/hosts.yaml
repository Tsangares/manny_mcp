# hosts.yaml — manny remote-run host registry  [PROTOTYPE]
#
# One entry per machine that can run the manny RuneLite client. The orchestrator
# (a Claude session on the laptop) reads this to know HOW to reach each host and
# WHERE things live on it. `mannyctl <host> <cmd>` looks the host up here and
# either runs locally (local: true) or wraps the command in `ssh <ssh>`.
#
# KEY CONSTRAINT (do not "fix" by sharing /tmp over the network): the plugin's
# IPC files (/tmp/manny_<acct>_command.txt / _response.json / _state.json) MUST
# be on the SAME machine as the client. So run_routine.py + the client both run
# ON the target host; the orchestrator only drives over SSH. See
# journals/REMOTE_CLIENT_ARCHITECTURE.md.
#
# SCHEMA (per host):
#   local          bool   — true = this IS the orchestrator box, run commands
#                           directly (no ssh). Exactly one host should be local.
#   ssh            str    — ssh destination (alias from ~/.ssh/config, or
#                           user@host, or user@tailscale-ip). Ignored if local.
#   jdk            str    — absolute path to the java 21 binary (must run the
#                           major-65 shaded jar; JDK17 will NOT).
#   display        str    — default Xvfb display, e.g. ":2" (parity with
#                           client.sh). Used when an account has no per-account
#                           display below.
#   account_displays map   — OPTIONAL per-account Xvfb display override
#                           (account_id -> ":N"). Lets two clients run at once
#                           on one host, each on its own framebuffer (lane-2).
#                           mannyctl resolves account -> display and forwards it
#                           as XVFB_DISPLAY; unmapped accounts fall back to
#                           `display`. NEVER map two accounts to the same
#                           display (clients would fight over one screen).
#   staging_dir    str    — where the manny_mcp repo lives on the host.
#   runelite_libs  str    — dir containing the *-shaded.jar on the host.
#   venv_python    str    — python inside the host's venv (usually
#                           <staging_dir>/venv/bin/python).
#   temp_refuse_c  int    — refuse to launch at/above this package temp.
#   temp_warn_c    int    — warn (but proceed) at/above this.
#   egress         str    — human note on this host's outbound IP identity
#                           (ban-risk surface). Not enforced; documentation.
#   viewer_host    str    — address to reach the mjpeg viewer / x11vnc from the
#                           orchestrator (LAN IP or Tailscale IP; 127.0.0.1 for
#                           local).
#   viewer_port    int    — mjpeg viewer port.
#   notes          str    — free-form.

hosts:

  # ---- localhost: the laptop (taxi). Behaves exactly like today. ----------
  laptop:
    local: true
    ssh: null
    jdk: /usr/lib/jvm/java-21-openjdk/bin/java
    display: ":2"
    staging_dir: /home/wil/Desktop/manny_mcp
    runelite_libs: /home/wil/Desktop/runelite/runelite-client/build/libs
    venv_python: /home/wil/Desktop/manny_mcp/venv/bin/python
    temp_refuse_c: 88
    temp_warn_c: 80
    egress: "local — laptop's own IP (short-burst/dev only; overheats at 90C in ~2min under grind)"
    viewer_host: 127.0.0.1
    viewer_port: 8787
    notes: "Dev/short-burst box. Keep client.sh's local flow intact; this entry mirrors it."

  # ---- diort: 2011 iMac, LAN + Tailscale, residential IP, real cooling. ----
  diort:
    local: false
    ssh: diort                      # or wil@100.91.42.96 (Tailscale) / wil@10.0.0.13 (LAN)
    jdk: /usr/lib/jvm/java-21-openjdk/bin/java
    display: ":2"
    # Lane-2: two clients coexist on diort, each on its own Xvfb screen.
    # newbakshesh keeps the historical :2; blast gets :3. Add more accounts as
    # new displays (:4, :5 ...) — never reuse a display for two live accounts.
    account_displays:
      newbakshesh: ":2"
      blast: ":3"
      new: ":4"          # BANNED alias — display for the zero-risk ban-detection login gate only
      punitpun: ":5"     # reserved clean spare — tutorial island launch lane
    staging_dir: /home/wil/Desktop/manny_mcp
    runelite_libs: /home/wil/Desktop/runelite-client-libs
    venv_python: /home/wil/Desktop/manny_mcp/venv/bin/python
    temp_refuse_c: 88
    temp_warn_c: 80
    egress: "home residential IP (the point of the migration — no datacenter-IP ban risk)"
    viewer_host: 100.91.42.96       # Tailscale (works off-LAN); LAN alt: 10.0.0.13
    viewer_port: 8787
    notes: "Shared desktop (couchdb/docker also run here). Treat client as a guest: stop when idle."

  # ---- llama: brabra desktop (Arch, 6C/12T, ~40GB free RAM), LAN. ----------
  llama:
    local: false
    ssh: llama                      # 10.0.0.99 (/etc/hosts), user wil, key-based.
                                    # Login shell is FISH — mannyctl/provision wrap
                                    # remote cmds in bash (keep it that way).
    # Java: NO jdk21 on this host and NO passwordless sudo (provision's pacman
    # fallback would fail). System java is OpenJDK 26 (/usr/bin/java), which runs
    # the major-65 shaded jar. If a user-space Temurin 21 is ever needed instead,
    # extract to ~/jdk21 and point this at /home/wil/jdk21/bin/java.
    jdk: /usr/bin/java
    display: ":2"
    # Same never-reuse-a-display rule as diort. punitpun keeps :5 for parity
    # with its diort mapping (tutorial island launch lane).
    account_displays:
      punitpun: ":5"     # reserved clean spare — tutorial island launch lane
    staging_dir: /home/wil/Desktop/manny_mcp
    runelite_libs: /home/wil/Desktop/runelite-client-libs
    venv_python: /home/wil/Desktop/manny_mcp/venv/bin/python
    temp_refuse_c: 85
    temp_warn_c: 78
    egress: "home residential IP 96.39.231.108 (same egress that burned new/newbakshesh — proxy posture still applies before sustained live contact)"
    viewer_host: 10.0.0.99
    viewer_port: 8787
    notes: "Fresh 2026-07-19. Stale artifacts from an old attempt (~/runelite.jar, ~/.runelite/, ~/Desktop/manny/, ~/manny-mcp/) — do NOT trust or delete them; this entry provisions fresh alongside."

  # ---- mat: Debian 13 VPS, datacenter IP => PROXY MANDATORY. ---------------
  mat:
    local: false
    ssh: mat                        # /etc/hosts 157.254.18.86, Tailscale 100.123.10.30,
                                    # key-based, user wil. Login shell is FISH (like diort/llama)
                                    # — mannyctl/provision wrap remote cmds in bash. Keep it that way.
    # Debian, NOT Arch: provision.sh Step 1 uses pacman, so JDK 21 + Xvfb are
    # pre-installed via apt (openjdk-21-jdk-headless, xvfb) and this jdk path is
    # set so provision's `test -x` guard makes Step 1 a no-op. sudo is NOPASSWD.
    jdk: /usr/lib/jvm/java-21-openjdk-amd64/bin/java
    display: ":2"
    account_displays:
      punitpun: ":5"     # reserved clean spare — tutorial island launch lane
    staging_dir: /home/wil/Desktop/manny_mcp
    runelite_libs: /home/wil/Desktop/runelite-client-libs
    venv_python: /home/wil/Desktop/manny_mcp/venv/bin/python
    temp_refuse_c: 88
    temp_warn_c: 80
    # force_proxy: MANDATORY. mat's bare IP is DATACENTER (157.254.18.86) = instant
    # ban-poison for OSRS, so EVERY client launch must egress through the dataimpulse
    # residential relay. mannyctl forces MANNY_PROXY=1 for this host and
    # client_remote.sh fails CLOSED (aborts the launch) if the relay is down — the
    # datacenter IP can never leak. proxies.yaml must be pushed first
    # (mannyctl mat push-proxy). NOTE the residential proxy blocks the raw game
    # socket (TCP 43594) at the provider level — see the bringup journal — so a live
    # game login is gated on a dataimpulse port-unblock request; HTTP (login screen)
    # traverses fine.
    force_proxy: true
    egress: "datacenter 157.254.18.86 (BAN-POISON) — never bare; always via dataimpulse residential relay (force_proxy)"
    viewer_host: 100.123.10.30       # Tailscale (works off-LAN)
    viewer_port: 8787
    notes: "Debian 13 VPS. Runs the user's production Docker (couchdb for Obsidian LiveSync, jellyseerr) — do NOT touch those containers/ports. Client is a guest: stop when idle. Provisioned 2026-07-19."

# ---- proxy_lanes: account -> dataimpulse gateway PORT (port-per-lane sticky) --
#
# dataimpulse stickiness is PER GATEWAY PORT: gw.dataimpulse.com ports 10000,
# 10001, 10002, ... are each an INDEPENDENT sticky session with its own stable
# residential exit IP. Proven empirically 2026-07-19 (4 curls/port over ~2 min):
#   10000 -> 73.184.107.212 (Atlanta GA, Comcast)   [default lane, sessid token]
#   10001 -> 184.58.105.38  (Columbus OH, Charter)
#   10002 -> 82.40.87.121   (Birmingham GB)  <-- see GEO CAVEAT
# Stable within a port, distinct across ports. This is simpler than the sessid
# token (no ~30-min TTL to re-issue) and lets every concurrent client have its
# OWN stable residential IP — just give each account a different gateway port.
#
# MODEL: an account listed here egresses via upstream gw.dataimpulse.com:<port>.
# mannyctl sets MANNY_SOCKS_PORT=<port> (local loopback relay listen + JVM
# -DsocksProxyPort) AND MANNY_UPSTREAM_PORT=<port> when launching that account
# with proxy on; proxy_relay.sh then runs the relay with --upstream-port <port>
# --no-session (the PORT provides stickiness; the cr.us geo pin is kept). The
# local port == the upstream port for 1:1 clarity, so two lanes on one host
# never collide on 127.0.0.1. Accounts NOT listed use the shared default lane
# (local :1080 -> upstream :10000, which keeps its sessid token) — unchanged.
#
# GEO CAVEAT: the cr.us US pin is honored on a FRESH port session, but a sticky
# port REUSES whatever exit it already holds until its ~30-min TTL lapses — so a
# port that was previously claimed with a non-US session can egress non-US for a
# while (that is why 10002 shows GB above). `proxy status` prints the exit
# COUNTRY and warns if it is not US; if a lane egresses non-US at launch time,
# reassign it to a fresh (higher, unclaimed) port here, or wait out the TTL.
#
# TTL: within the ~5-min test window every port's IP held steady; provider docs
# put the sticky TTL at ~30 min. A new session (port first-claim, or TTL lapse)
# re-rolls to a different residential IP — so the IP is stable WITHIN a play
# session, best-effort across days. Fine for concurrency isolation (the goal).
proxy_lanes:
  # account_alias: gateway_port   # keep unique; assign sequentially from 10001
  punitpun: 10001                 # tutorial-island launch lane
  blast: 10002                    # lane-2 spare (verify US at launch — see caveat)
